<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
<title>Register - Annotation Tool</title>

<style>
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
}

body {
    background: #F5F5F0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
}

.container {
    width: 360px;
    max-width: 100%;
    background: white;
    padding: 40px 32px;
    border-radius: 28px;
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
}

h2 {
    font-size: 24px;
    font-weight: 590;
    letter-spacing: -0.3px;
    margin-bottom: 28px;
    color: #1C1C1A;
}

.input-group {
    margin-bottom: 4px;
    position: relative;
}

.input-wrapper {
    position: relative;
    margin-bottom: 4px;
}

input {
    width: 100%;
    padding: 14px 12px;
    border: 1.5px solid #E5E5DE;
    border-radius: 16px;
    font-size: 15px;
    transition: all 0.2s ease;
    background: #FFFFFF;
}

.password-input {
    padding-right: 85px;
}

input:focus {
    outline: none;
    border-color: #2C6E49;
}

.show-btn {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    color: #8E8E88;
    font-size: 13px;
    cursor: pointer;
    padding: 6px 10px;
    border-radius: 30px;
    font-weight: 500;
}

.show-btn:hover {
    color: #2C6E49;
    background: #F0F0EB;
}

button {
    width: 100%;
    padding: 14px;
    background: #2C6E49;
    color: white;
    border: none;
    border-radius: 44px;
    font-size: 16px;
    font-weight: 590;
    cursor: pointer;
    margin-top: 16px;
    transition: all 0.2s ease;
}

button:hover {
    background: #215A3A;
    transform: scale(0.98);
}

p {
    margin-top: 20px;
    font-size: 13px;
    color: #6E6E68;
    text-align: center;
}

a {
    color: #2C6E49;
    text-decoration: none;
    font-weight: 500;
}

a:hover {
    text-decoration: underline;
}

button:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    transform: none;
}

.validation-message {
    font-size: 11px;
    margin-top: 4px;
    margin-bottom: 10px;
    padding-left: 8px;
    min-height: 24px;
    line-height: 1.3;
}

.error-message {
    background: #FDE9E7;
    color: #B13E3A;
    padding: 12px;
    border-radius: 16px;
    font-size: 13px;
    margin-bottom: 20px;
    text-align: center;
}
</style>
</head>
<body>

<div class="container">
    <h2>Create Account</h2>
    
    <div id="errorMsg" class="error-message" style="display: none;"></div>

    <div class="input-group">
        <input id="user" placeholder="Username" oninput="checkForm()">
        <div id="usernameMsg" class="validation-message"></div>
    </div>

    <div class="input-group">
        <div class="input-wrapper">
            <input id="pass" type="password" placeholder="Password" class="password-input" oninput="checkForm()">
            <button type="button" class="show-btn" onclick="togglePassword('pass', this)">Show</button>
        </div>
        <div id="passMsg" class="validation-message"></div>
    </div>

    <div class="input-group">
        <div class="input-wrapper">
            <input id="company_pass" type="password" placeholder="Company Password" class="password-input" oninput="checkForm()">
            <button type="button" class="show-btn" onclick="togglePassword('company_pass', this)">Show</button>
        </div>
        <div id="companyPassMsg" class="validation-message"></div>
    </div>

    <div class="input-group">
        <input id="phone" placeholder="Phone Number" oninput="checkForm()" maxlength="10">
        <div id="phoneMsg" class="validation-message"></div>
    </div>

    <button id="registerBtn" onclick="register()" disabled>Register</button>

    <p>
        Already have an account? <a href="/mobile-annotator/login">Sign in</a>
    </p>
</div>

<script>
const BASE_PATH = "/mobile-annotator";

function togglePassword(fieldId, btn) {
    let field = document.getElementById(fieldId);
    if (field.type === "password") {
        field.type = "text";
        btn.textContent = "Hide";
    } else {
        field.type = "password";
        btn.textContent = "Show";
    }
}

function checkForm() {
    let usernameRaw = document.getElementById("user").value;
    let username = usernameRaw.trim();
    let phone = document.getElementById("phone").value.trim();
    let password = document.getElementById("pass").value.trim();
    let company_password = document.getElementById("company_pass").value.trim();

    let btn = document.getElementById("registerBtn");
    let phoneInput = document.getElementById("phone");
    let usernameInput = document.getElementById("user");
    
    let usernameMsg = document.getElementById("usernameMsg");
    let phoneMsg = document.getElementById("phoneMsg");
    let passMsg = document.getElementById("passMsg");
    let companyPassMsg = document.getElementById("companyPassMsg");

    if(passMsg) passMsg.innerHTML = "";
    if(companyPassMsg) companyPassMsg.innerHTML = "";

    let phoneValid = /^[0-9]{10}$/.test(phone);
    let usernameValid = /^[a-zA-Z0-9_]+$/.test(username);
    let hasSpaces = /\s/.test(usernameRaw);

    if(username === "") {
        usernameMsg.innerHTML = "";
        usernameInput.style.borderColor = "#E5E5DE";
    } else if(hasSpaces) {
        usernameMsg.innerHTML = "Username cannot contain spaces";
        usernameMsg.style.color = "#B13E3A";
        usernameInput.style.borderColor = "#B13E3A";
    } else if(!usernameValid) {
        usernameMsg.innerHTML = "Letters, numbers, and underscore only";
        usernameMsg.style.color = "#B13E3A";
        usernameInput.style.borderColor = "#B13E3A";
    } else {
        usernameMsg.innerHTML = "Username available";
        usernameMsg.style.color = "#2E7D32";
        usernameInput.style.borderColor = "#2C6E49";
    }
    
    if(phone === "") {
        phoneMsg.innerHTML = "";
        phoneInput.style.borderColor = "#E5E5DE";
    } else if(!phoneValid) {
        phoneMsg.innerHTML = "Exactly 10 digits required";
        phoneMsg.style.color = "#B13E3A";
        phoneInput.style.borderColor = "#B13E3A";
    } else {
        phoneMsg.innerHTML = "Phone number valid";
        phoneMsg.style.color = "#2E7D32";
        phoneInput.style.borderColor = "#2C6E49";
    }
    
    if(usernameRaw !== username) {
        usernameInput.value = username;
        return checkForm();
    }
    
    let finalUsernameValid = usernameValid && !hasSpaces && username !== "";
    
    if(username && password && company_password && phoneValid && finalUsernameValid) {
        btn.disabled = false;
    } else {
        btn.disabled = true;
    }
}

async function register() {
    let username = document.getElementById("user").value;
    let phone = document.getElementById("phone").value;
    let password = document.getElementById("pass").value;
    let company_password = document.getElementById("company_pass").value;
    let errorDiv = document.getElementById("errorMsg");
    
    errorDiv.style.display = "none";
    
    let response = await fetch(`${BASE_PATH}/api/register`, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({username, phone, password, company_password})
    });
    
    let data = await response.json();
    
    if(response.ok && data.message) {
        alert("Account created successfully!");
        window.location.href = `${BASE_PATH}/login`;
    } else {
        errorDiv.style.display = "block";
        errorDiv.innerText = data.error || "Registration failed";
    }
}
</script>
</body>
</html>
