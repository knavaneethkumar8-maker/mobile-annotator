<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
<title>3-Tier Annotation Tool</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Helvetica, Arial, sans-serif;
  background: #F5F5F0;
  padding: 16px 0px;
  color: #1C1C1A;
  line-height: 1.4;
}

.container {
  max-width: 100%;
  margin: 0 auto;
  background: #FFFFFF;
  border-radius: 28px;
  box-shadow: 0 4px 20px rgba(0, 0, 0, 0.02), 0 2px 6px rgba(0, 0, 0, 0.05);
  overflow: hidden;
  padding: 20px 18px 28px;
}

.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 18px;
  flex-wrap: wrap;
  gap: 12px;
}

.header-left h2 {
  font-size: 1.65rem;
  font-weight: 590;
  letter-spacing: -0.02em;
  color: #1C1C1A;
  margin: 0;
}

.header-right {
  display: flex;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
}

.user-info {
  display: flex;
  align-items: center;
  gap: 12px;
  background: #F0F0EB;
  padding: 6px 14px;
  border-radius: 40px;
}

.user-name {
  font-weight: 550;
  font-size: 0.85rem;
  color: #2C6E49;
}

.logout-btn {
  background: none;
  border: none;
  color: #8E8E88;
  font-size: 0.75rem;
  cursor: pointer;
  padding: 4px 8px;
  font-weight: 500;
  margin: 0;
  width: auto;
}

.logout-btn:hover { color: #B13E3A; }

.stats-btn {
  background: #2C6E49;
  border: none;
  color: white;
  font-size: 0.75rem;
  cursor: pointer;
  padding: 6px 14px;
  font-weight: 500;
  margin: 0;
  width: auto;
  border-radius: 40px;
  text-decoration: none;
  display: inline-block;
}

.stats-btn:hover { background: #215A3A; }

.self-record-btn {
  background: #4A6FA5;
  border: none;
  color: white;
  font-size: 0.75rem;
  cursor: pointer;
  padding: 6px 14px;
  font-weight: 500;
  margin: 0;
  width: auto;
  border-radius: 40px;
  text-decoration: none;
  display: inline-block;
}

.self-record-btn:hover { background: #3A5A8A; }

.live-stream-btn {
  background: #B13E3A;
  border: none;
  color: white;
  font-size: 0.75rem;
  cursor: pointer;
  padding: 6px 14px;
  font-weight: 500;
  margin: 0;
  width: auto;
  border-radius: 40px;
  text-decoration: none;
  display: inline-block;
}

.live-stream-btn:hover { background: #8B2C2A; }

.training-btn {
  background: #9B59B6;
  border: none;
  color: white;
  font-size: 0.75rem;
  cursor: pointer;
  padding: 6px 14px;
  font-weight: 500;
  margin: 0;
  width: auto;
  border-radius: 40px;
  text-decoration: none;
  display: inline-block;
}

.training-btn:hover { background: #8E44AD; }

.remaining-badge {
  background: #E8E8E3;
  padding: 6px 14px;
  border-radius: 40px;
  font-size: 0.8rem;
  font-weight: 500;
  color: #2C2C2A;
}

.progress-section { margin-bottom: 12px; }

.progress-bar {
  background: #EBEBE4;
  height: 6px;
  border-radius: 12px;
  overflow: hidden;
}

.progress-fill {
  background: #2C6E49;
  height: 100%;
  width: 0%;
  transition: width 0.25s ease-out;
  border-radius: 12px;
}

.stats-cards {
  display: flex;
  gap: 12px;
  margin: 12px 0 8px;
}

.stat-card {
  flex: 1;
  background: #F8F8F4;
  border-radius: 20px;
  padding: 12px;
  text-align: center;
  border: 1px solid #E9E9E2;
}

.stat-card-label {
  font-size: 0.7rem;
  color: #8E8E88;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 6px;
}

.stat-card-value {
  font-size: 1.3rem;
  font-weight: 600;
  color: #2C6E49;
}

.stat-card-sub {
  font-size: 0.65rem;
  color: #8E8E88;
  margin-top: 4px;
}

.audio-wrapper { margin: 16px 0 18px; }

/* Full audio play button styles */
.full-audio-controls {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 12px;
  padding: 10px 16px;
  background: #2C6E49;
  border-radius: 48px;
  justify-content: space-between;
}

.play-full-btn {
  background: white;
  border: none;
  width: 48px;
  height: 48px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: all 0.2s ease;
  box-shadow: 0 2px 8px rgba(0,0,0,0.15);
}

.play-full-btn:hover {
  transform: scale(1.05);
  background: #f0f0f0;
}

.play-full-btn:active {
  transform: scale(0.95);
}

.play-full-btn svg {
  width: 24px;
  height: 24px;
  fill: #2C6E49;
}

.play-full-btn.playing svg {
  fill: #B13E3A;
}

.full-audio-info {
  flex: 1;
  color: white;
  font-size: 0.85rem;
  font-weight: 500;
}

.full-audio-info span {
  opacity: 0.8;
  font-size: 0.7rem;
}

.progress-bar-full {
  flex: 2;
  height: 4px;
  background: rgba(255,255,255,0.3);
  border-radius: 4px;
  cursor: pointer;
  position: relative;
}

.progress-bar-full .progress-fill-full {
  width: 0%;
  height: 100%;
  background: white;
  border-radius: 4px;
  transition: width 0.1s linear;
}

.time-display {
  color: white;
  font-size: 0.75rem;
  font-family: monospace;
  min-width: 80px;
  text-align: center;
}

.volume-control {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-top: 12px;
  padding: 8px 12px;
  background: #F8F8F4;
  border-radius: 40px;
  border: 1px solid #E9E9E2;
}

.volume-icon { font-size: 1.2rem; line-height: 1; color: #6E6E68; }

.volume-slider {
  flex: 1;
  height: 4px;
  -webkit-appearance: none;
  appearance: none;
  background: #DCDCD4;
  border-radius: 4px;
  outline: none;
}

.volume-slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  appearance: none;
  width: 18px;
  height: 18px;
  border-radius: 50%;
  background: #2C6E49;
  cursor: pointer;
}

.volume-value {
  min-width: 52px;
  font-size: 0.8rem;
  font-weight: 500;
  color: #2C6E49;
  text-align: right;
}

audio {
  width: 100%;
  border-radius: 44px;
  background: #F9F9F6;
  outline: none;
  display: none;
}

.current-file-card {
  background: #F8F8F4;
  border-radius: 24px;
  padding: 14px 18px;
  margin: 12px 0 16px;
  font-size: 0.9rem;
  border: 1px solid #E9E9E2;
  color: #2E2E2A;
}

.current-file-card strong {
  font-weight: 590;
  color: #1A4D3A;
}

/* ========== 3-TIER GRID (Like Desktop - 3 Horizontal Rows) ========== */
.three-tier-section {
  margin: 16px 0;
  border: 1px solid #eef2f8;
  border-radius: 20px;
  background: #ffffff;
  overflow-x: auto;
  overflow-y: hidden;
  -webkit-overflow-scrolling: touch;
}

.tier-row {
  display: flex;
  gap: 10px;
  padding: 16px 20px;
  border-bottom: 1px solid #ecf3fa;
  background: white;
  min-width: min-content;
}

.tier-row:last-child { border-bottom: none; }

/* Row headers - Tier names */
.tier-header {
  writing-mode: horizontal-tb;
  white-space: nowrap;
  padding: 10px 12px;
  background: #EBF2EA;
  border-radius: 16px;
  font-size: 0.75rem;
  font-weight: 550;
  color: #2C6E49;
  text-align: center;
  min-width: 80px;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-right: 10px;
}

/* 216ms cells (वायु) */
.tier-row-216 .cell-216 {
  flex: 0 0 370px;
  min-width: 370px;
  border: 2px solid #d1e0f0;
  border-radius: 16px;
  padding: 16px 10px;
}

/* 108ms cells (अग्नि) */
.tier-row-108 .cell-108 {
  flex: 0 0 180px;
  min-width: 180px;
  border: 2px solid #e2edf7;
  border-radius: 14px;
  padding: 14px 8px;
}

/* 54ms cells (आकाश) */
.tier-row-54 .cell-54 {
  flex: 0 0 85px;
  min-width: 85px;
  border: 1.5px solid #e2e8f0;
  border-radius: 12px;
  padding: 12px 4px;
}

/* Common cell styles */
.cell-216, .cell-108, .cell-54 {
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  transition: all 0.1s;
  background: white;
}

.cell-216.selected, .cell-108.selected, .cell-54.selected {
  background: #eff6ff;
  border-color: #3b82f6;
  box-shadow: 0 0 0 2px rgba(59,130,246,0.2);
}

.cell-216:hover, .cell-108:hover, .cell-54:hover {
  border-color: #cbd5e1;
  background: #f8fafc;
  transform: scale(1.01);
}

.cell-216.playing, .cell-108.playing, .cell-54.playing {
  background: #e6f7ec;
  border-color: #10b981;
  animation: pulse 0.2s ease;
}

.cell-216.current-play, .cell-108.current-play, .cell-54.current-play {
  background: #fffbeb;
  border-color: #f59e0b;
  transform: scale(1.01);
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.7; }
}

.time-label {
  font-size: 10px;
  background: #f1f5f9;
  padding: 3px 10px;
  border-radius: 30px;
  color: #334155;
  font-weight: 500;
  white-space: nowrap;
}

.grid-input {
  width: 100%;
  text-align: center;
  background: #fafcff;
  border: 1.5px solid #e2e8f0;
  border-radius: 10px;
  font-weight: 600;
  font-family: 'Noto Sans Devanagari', monospace;
  transition: border-color 0.15s, background 0.15s;
}

.cell-54 .grid-input { font-size: 0.9rem; padding: 8px 2px; }
.cell-108 .grid-input { font-size: 1rem; padding: 10px 4px; }
.cell-216 .grid-input { font-size: 1.2rem; padding: 12px 6px; }

.grid-input:focus {
  outline: none;
  border-color: #3b82f6;
  background: white;
  box-shadow: 0 0 0 2px rgba(59,130,246,0.1);
}

.grid-input.saved {
  border-color: #10b981;
  background: #f0fdf4;
}

/* Speed Control */
.speed-control {
  display: flex;
  gap: 8px;
  margin-top: 12px;
  justify-content: center;
}

.speed-btn {
  padding: 6px 16px;
  border-radius: 30px;
  border: 1.5px solid #cbd5e1;
  background: white;
  cursor: pointer;
  font-size: 13px;
  font-weight: 500;
  transition: all 0.2s;
}

.speed-btn.active {
  background: #2C6E49;
  border-color: #2C6E49;
  color: white;
}

/* Multi-select toolbar */
.multi-bar {
  display: none;
  align-items: center;
  justify-content: space-between;
  background: #1A4D3A;
  color: #fff;
  border-radius: 40px;
  padding: 10px 16px;
  margin: 16px 0;
  gap: 10px;
  font-size: 0.82rem;
  font-weight: 540;
}

.multi-bar.visible { display: flex; }

.multi-bar-label { flex: 1; }

.multi-bar-btn {
  background: rgba(255,255,255,0.15);
  border: none;
  color: #fff;
  font-size: 0.78rem;
  padding: 6px 14px;
  border-radius: 30px;
  cursor: pointer;
}

.multi-bar-btn.play {
  background: #FFFFFF;
  color: #1A4D3A;
}

.akshar-set-section {
  margin: 8px 0 20px;
  background: #F8F8F4;
  border-radius: 20px;
  padding: 12px 16px;
  border: 1px solid #E9E9E2;
}

.akshar-title {
  font-weight: 590;
  font-size: 0.75rem;
  color: #2C6E49;
  margin-bottom: 10px;
}

.akshar-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}

.akshar-item {
  background: #FFFFFF;
  border: 1px solid #E5E5DE;
  border-radius: 12px;
  padding: 8px 12px;
  font-size: 1rem;
  font-weight: 500;
  color: #1C1C1A;
  min-width: 42px;
  text-align: center;
  font-family: monospace;
  cursor: grab;
  user-select: none;
  transition: all 0.15s ease;
  touch-action: none;
}

.akshar-item:active { cursor: grabbing; transform: scale(0.95); }

.button-group {
  display: flex;
  gap: 14px;
  margin: 16px 0;
}

.btn {
  flex: 1;
  padding: 14px 8px;
  border: none;
  border-radius: 44px;
  font-size: 1rem;
  font-weight: 520;
  cursor: pointer;
  background: #F2F2EC;
  color: #2C2C2A;
}

.btn-submit {
  background: #2C6E49;
  color: white;
}

.btn-skip {
  background: #E8E8E3;
  color: #3A3A36;
}

.message-area { margin-top: 12px; }

.message {
  padding: 12px;
  border-radius: 20px;
  text-align: center;
  font-size: 0.85rem;
}

.message.success { background: #E0F0E6; color: #1E5631; }
.message.error   { background: #FDE9E7; color: #B13E3A; }
.message.info    { background: #E9EDF2; color: #2B4F6C; }

.loading {
  text-align: center;
  padding: 48px 20px;
  font-size: 1rem;
  color: #6E6E68;
}

.empty-hint {
  font-size: 0.7rem;
  color: #8E8E88;
  text-align: right;
  margin-top: 6px;
}

/* ========== MOBILE RESPONSIVE - REDUCED WIDTH FOR MORE CELLS ========== */
@media (max-width: 560px) {
  .container { padding: 10px; }
  
  .tier-row {
    gap: 6px;
    padding: 10px;
  }
  
  .tier-header {
    min-width: 45px;
    font-size: 0.6rem;
    padding: 5px 4px;
    margin-right: 6px;
  }
  
  /* REDUCED CELL WIDTHS - fits more cells on screen */
  .cell-216 {
    flex: 0 0 180px;
    min-width: 180px;
    padding: 10px 6px;
  }
  
  .cell-108 {
    flex: 0 0 90px;
    min-width: 90px;
    padding: 8px 4px;
  }
  
  .cell-54 {
    flex: 0 0 50px;
    min-width: 50px;
    padding: 6px 3px;
  }
  
  /* Smaller fonts for reduced cells */
  .cell-54 .grid-input { 
    font-size: 0.7rem; 
    padding: 4px 1px; 
  }
  .cell-108 .grid-input { 
    font-size: 0.75rem; 
    padding: 6px 2px; 
  }
  .cell-216 .grid-input { 
    font-size: 0.8rem; 
    padding: 8px 3px; 
  }
  
  .time-label {
    font-size: 7px;
    padding: 2px 4px;
  }
  
  /* Touch feedback */
  .cell-216:active, .cell-108:active, .cell-54:active {
    transform: scale(0.98);
    background: #f0f0f0;
  }
  
  /* Stack header on mobile */
  .header {
    flex-direction: column;
    align-items: stretch;
  }
  
  .header-right {
    flex-wrap: wrap;
    justify-content: space-between;
  }
  
  .stats-cards {
    gap: 6px;
  }
  
  .stat-card {
    padding: 6px;
  }
  
  .stat-card-value {
    font-size: 1rem;
  }
  
  .stat-card-label {
    font-size: 0.6rem;
  }
  
  .speed-btn {
    padding: 4px 10px;
    font-size: 10px;
  }
  
  .akshar-item {
    padding: 5px 8px;
    font-size: 0.8rem;
    min-width: 32px;
  }
  
  .btn {
    padding: 10px 6px;
    font-size: 0.8rem;
  }
  
  .stats-btn, .self-record-btn, .live-stream-btn, .training-btn {
    padding: 3px 6px;
    font-size: 0.6rem;
  }
  
  .current-file-card {
    padding: 8px 12px;
    font-size: 0.75rem;
  }
  
  .volume-control {
    padding: 6px 10px;
  }
  
  .volume-value {
    min-width: 40px;
    font-size: 0.7rem;
  }
  
  .full-audio-controls {
    padding: 8px 12px;
  }
  
  .play-full-btn {
    width: 40px;
    height: 40px;
  }
  
  .play-full-btn svg {
    width: 20px;
    height: 20px;
  }
  
  .time-display {
    font-size: 0.7rem;
    min-width: 70px;
  }
}

/* Touch device optimizations */
@media (hover: none) and (pointer: coarse) {
  .cell-216.selected, .cell-108.selected, .cell-54.selected {
    background: #dbeafe;
    border-color: #2563eb;
    border-width: 2px;
  }
  
  .grid-input {
    min-height: 32px;
  }
}

/* Scrollbar styling */
.three-tier-section::-webkit-scrollbar {
  height: 6px;
}
.three-tier-section::-webkit-scrollbar-track {
  background: #EFEFE9;
  border-radius: 8px;
}
.three-tier-section::-webkit-scrollbar-thumb {
  background: #BDBDB3;
  border-radius: 8px;
}
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <div class="header-left">
      <h2>3-Tier Annotation</h2>
    </div>
    <div class="header-right">
      <button class="self-record-btn" onclick="window.location.href='{{ url_for_path('self-record') }}'">Self</button>
      <button class="live-stream-btn" onclick="window.location.href='{{ url_for_path('live-stream') }}'">Live</button>
      <button class="stats-btn" onclick="window.location.href='{{ url_for_path('stats') }}'">Stats</button>
      <button class="stats-btn" onclick="window.location.href='{{ url_for_path('verify') }}'">Verify</button>
      <button class="training-btn" onclick="window.location.href='{{ url_for_path('mobile-training') }}'">Training</button>
      <div class="user-info">
        <span class="user-name" id="usernameDisplay">Loading...</span>
        <button class="logout-btn" onclick="logout()">Sign out</button>
      </div>
      <div class="remaining-badge" id="remainingBadge">—</div>
    </div>
  </div>

  <div class="progress-section">
    <div class="progress-bar">
      <div class="progress-fill" id="progressFill"></div>
    </div>
  </div>

  <div class="stats-cards">
    <div class="stat-card">
      <div class="stat-card-label">Today</div>
      <div class="stat-card-value" id="todayFiles">0</div>
      <div class="stat-card-sub" id="todayDuration">0s</div>
    </div>
    <div class="stat-card">
      <div class="stat-card-label">Total</div>
      <div class="stat-card-value" id="totalFiles">0</div>
      <div class="stat-card-sub" id="totalDuration">0s</div>
    </div>
  </div>

  <div id="content">
    <div class="loading">Loading next sample...</div>
  </div>
</div>

<script>
const BASE_PATH = "{{ base_path }}";

const AKSHAR_SET = [
  "अ", "आ", "इ", "उ", "ए", "ओ",
  "क", "ख", "ग", "घ", "च", "छ", "ज", "झ",
  "ट", "ठ", "ड", "ढ", "त", "थ", "द", "ध",
  "प", "फ", "ब", "भ",
  "न", "म",
  "य", "र", "ल", "व",
  "स", "ह", "०"
];

let currentData = null;
let currentAudio = null;
let currentPlayTimeout = null;
let currentUsername = '';
let audioContext = null;
let gainNode = null;
let currentVolume = 1.0;
const MAX_VOLUME = 6.0;
let audioUnlocked = false;
let playbackSpeed = 1.0;

// Full audio play tracking
let isFullAudioPlaying = false;
let fullAudioProgressInterval = null;

// Store frames for each tier
let framesData = {
  tier_216: [],
  tier_108: [],
  tier_54: []
};

let selectedSegments = {
  tier_216: new Set(),
  tier_108: new Set(),
  tier_54: new Set()
};

let currentTier = 'tier_216';
let multiPlayQueue = [];
let multiPlayIndex = 0;
let multiPlayTimeout = null;

function unlockAudio() {
  if (audioUnlocked) return;
  if (audioContext && audioContext.state === 'suspended') {
    audioContext.resume().then(() => { audioUnlocked = true; }).catch(() => {});
  }
  if (currentAudio) {
    currentAudio.play().then(() => { currentAudio.pause(); currentAudio.currentTime = 0; }).catch(() => {});
  }
}

function setupAudioUnlock() {
  const h = () => { unlockAudio(); document.removeEventListener('touchstart', h); document.removeEventListener('click', h); };
  document.addEventListener('touchstart', h);
  document.addEventListener('click', h);
}

function initAudioContext() {
  if (!audioContext && currentAudio) {
    try {
      audioContext = new (window.AudioContext || window.webkitAudioContext)();
      const source = audioContext.createMediaElementSource(currentAudio);
      gainNode = audioContext.createGain();
      source.connect(gainNode);
      gainNode.connect(audioContext.destination);
      gainNode.gain.value = currentVolume;
    } catch (e) { console.warn('Web Audio init failed:', e); }
  }
}

function updateVolume(value) {
  currentVolume = value;
  const volumeSpan = document.getElementById('volumeValue');
  if (volumeSpan) volumeSpan.innerText = Math.round(value * 100) + '%';
  if (gainNode) gainNode.gain.value = value;
  if (currentAudio && !gainNode) currentAudio.volume = Math.min(value, 1.0);
}

function setPlaybackSpeed(speed) {
  playbackSpeed = speed;
  if (currentAudio) currentAudio.playbackRate = speed;
  document.querySelectorAll('.speed-btn').forEach(btn => {
    if (parseFloat(btn.dataset.speed) === speed) btn.classList.add('active');
    else btn.classList.remove('active');
  });
  showMessage(`Speed: ${speed}x`, 'info');
}

function playSegmentAudio(startMs, endMs) {
  if (!currentAudio) return;
  
  // Stop full audio if it's playing
  stopFullAudioPlayback();
  
  const startSec = startMs / 1000;
  const durationSec = (endMs - startMs) / 1000;
  if (currentPlayTimeout) clearTimeout(currentPlayTimeout);
  
  const doPlay = () => {
    currentAudio.pause();
    currentAudio.currentTime = startSec;
    currentAudio.play().then(() => {
      currentPlayTimeout = setTimeout(() => {
        if (currentAudio && !currentAudio.paused) currentAudio.pause();
      }, durationSec * 1000 / playbackSpeed);
    }).catch(() => {});
  };
  
  if (audioContext && audioContext.state === 'suspended') audioContext.resume().then(doPlay);
  else doPlay();
}

function stopPlayback() {
  if (currentPlayTimeout) clearTimeout(currentPlayTimeout);
  if (multiPlayTimeout) clearTimeout(multiPlayTimeout);
  if (currentAudio && !currentAudio.paused) currentAudio.pause();
  document.querySelectorAll('.cell-216.playing, .cell-108.playing, .cell-54.playing').forEach(c => c.classList.remove('playing'));
}

// ========== FULL AUDIO PLAYBACK FUNCTIONS ==========
function toggleFullAudioPlayback() {
  if (!currentAudio) return;
  
  if (isFullAudioPlaying) {
    stopFullAudioPlayback();
  } else {
    startFullAudioPlayback();
  }
}

function startFullAudioPlayback() {
  if (!currentAudio) return;
  
  // Stop any segment playback
  if (currentPlayTimeout) clearTimeout(currentPlayTimeout);
  if (multiPlayTimeout) clearTimeout(multiPlayTimeout);
  
  const doPlay = () => {
    currentAudio.playbackRate = playbackSpeed;
    currentAudio.play().then(() => {
      isFullAudioPlaying = true;
      updatePlayButtonUI(true);
      startProgressTracking();
    }).catch(err => {
      console.log('Playback error:', err);
    });
  };
  
  if (audioContext && audioContext.state === 'suspended') {
    audioContext.resume().then(doPlay);
  } else {
    doPlay();
  }
}

function stopFullAudioPlayback() {
  if (!currentAudio) return;
  currentAudio.pause();
  isFullAudioPlaying = false;
  updatePlayButtonUI(false);
  stopProgressTracking();
}

function updatePlayButtonUI(isPlaying) {
  const playBtn = document.getElementById('playFullBtn');
  if (!playBtn) return;
  
  if (isPlaying) {
    playBtn.classList.add('playing');
    playBtn.innerHTML = `<svg viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>`;
  } else {
    playBtn.classList.remove('playing');
    playBtn.innerHTML = `<svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>`;
  }
}

function startProgressTracking() {
  if (fullAudioProgressInterval) clearInterval(fullAudioProgressInterval);
  
  fullAudioProgressInterval = setInterval(() => {
    if (!currentAudio || currentAudio.paused) {
      if (isFullAudioPlaying) {
        isFullAudioPlaying = false;
        updatePlayButtonUI(false);
      }
      stopProgressTracking();
      return;
    }
    
    const currentTime = currentAudio.currentTime;
    const duration = currentAudio.duration || 0;
    const progressPercent = (currentTime / duration) * 100;
    
    const progressFill = document.getElementById('progressFillFull');
    if (progressFill) progressFill.style.width = progressPercent + '%';
    
    const timeDisplay = document.getElementById('timeDisplay');
    if (timeDisplay) {
      const currentMin = Math.floor(currentTime / 60);
      const currentSec = Math.floor(currentTime % 60);
      const durationMin = Math.floor(duration / 60);
      const durationSec = Math.floor(duration % 60);
      timeDisplay.textContent = `${currentMin}:${currentSec.toString().padStart(2,'0')} / ${durationMin}:${durationSec.toString().padStart(2,'0')}`;
    }
    
    if (currentTime >= duration) {
      stopFullAudioPlayback();
    }
  }, 100);
}

function stopProgressTracking() {
  if (fullAudioProgressInterval) {
    clearInterval(fullAudioProgressInterval);
    fullAudioProgressInterval = null;
  }
}

function seekToPosition(e) {
  if (!currentAudio) return;
  const progressBar = document.getElementById('progressBarFull');
  if (!progressBar) return;
  
  const rect = progressBar.getBoundingClientRect();
  let clientX;
  if (e.touches) {
    clientX = e.touches[0].clientX;
  } else {
    clientX = e.clientX;
  }
  const clickX = clientX - rect.left;
  const width = rect.width;
  const clickPercent = clickX / width;
  const duration = currentAudio.duration || 0;
  const seekTime = clickPercent * duration;
  currentAudio.currentTime = seekTime;
}
// ========== END FULL AUDIO PLAYBACK FUNCTIONS ==========

function playCellAudio(tier, index) {
  const frame = framesData[tier][index];
  if (!frame) return;
  playSegmentAudio(frame.start_ms, frame.end_ms);
  
  const cellClass = tier === 'tier_216' ? 'cell-216' : (tier === 'tier_108' ? 'cell-108' : 'cell-54');
  const cell = document.querySelector(`.${cellClass}[data-idx="${index}"]`);
  if (cell) {
    cell.classList.add('playing');
    setTimeout(() => cell.classList.remove('playing'), 300);
  }
}

function toggleSegmentSelection(tier, index) {
  const cellClass = tier === 'tier_216' ? 'cell-216' : (tier === 'tier_108' ? 'cell-108' : 'cell-54');
  const cell = document.querySelector(`.${cellClass}[data-idx="${index}"]`);
  if (!cell) return;
  
  if (selectedSegments[tier].has(index)) {
    selectedSegments[tier].delete(index);
    cell.classList.remove('selected');
  } else {
    selectedSegments[tier].add(index);
    cell.classList.add('selected');
  }
  updateMultiBar();
}

function updateMultiBar() {
  const bar = document.getElementById('multiBar');
  if (!bar) return;
  let totalSelected = selectedSegments.tier_216.size + selectedSegments.tier_108.size + selectedSegments.tier_54.size;
  if (totalSelected === 0) {
    bar.classList.remove('visible');
  } else {
    bar.classList.add('visible');
    bar.querySelector('.multi-bar-label').textContent = `${totalSelected} segment${totalSelected > 1 ? 's' : ''} selected across all tiers`;
  }
}

function clearSelection() {
  selectedSegments.tier_216.clear();
  selectedSegments.tier_108.clear();
  selectedSegments.tier_54.clear();
  document.querySelectorAll('.cell-216.selected, .cell-108.selected, .cell-54.selected').forEach(c => c.classList.remove('selected'));
  updateMultiBar();
}

function playSelectedSegments() {
  let allSelected = [];
  for (let tier of ['tier_216', 'tier_108', 'tier_54']) {
    for (let idx of selectedSegments[tier]) {
      allSelected.push({ tier, index: idx });
    }
  }
  if (allSelected.length === 0 || !currentAudio) return;
  
  stopPlayback();
  stopFullAudioPlayback();
  
  allSelected.sort((a, b) => framesData[a.tier][a.index].start_ms - framesData[b.tier][b.index].start_ms);
  
  multiPlayQueue = allSelected;
  multiPlayIndex = 0;
  playNextInQueueDesktop();
}

function playNextInQueueDesktop() {
  if (multiPlayIndex >= multiPlayQueue.length) {
    document.querySelectorAll('.cell-216.playing, .cell-108.playing, .cell-54.playing').forEach(c => c.classList.remove('playing'));
    return;
  }
  const item = multiPlayQueue[multiPlayIndex];
  const frame = framesData[item.tier][item.index];
  if (!frame) { multiPlayIndex++; playNextInQueueDesktop(); return; }

  const cellClass = item.tier === 'tier_216' ? 'cell-216' : (item.tier === 'tier_108' ? 'cell-108' : 'cell-54');
  document.querySelectorAll(`.${cellClass}.playing`).forEach(c => c.classList.remove('playing'));
  const cell = document.querySelector(`.${cellClass}[data-idx="${item.index}"]`);
  if (cell) cell.classList.add('playing');

  playSegmentAudio(frame.start_ms, frame.end_ms);
  
  multiPlayTimeout = setTimeout(() => {
    multiPlayIndex++;
    playNextInQueueDesktop();
  }, (frame.end_ms - frame.start_ms) / playbackSpeed);
}

// ========== GENERATE FRAMES ==========
function generateFramesForTier(durationMs, frameSizeMs) {
  const numFrames = Math.ceil(durationMs / frameSizeMs);
  const frames = [];
  for (let i = 0; i < numFrames; i++) {
    frames.push({
      index: i,
      start_ms: i * frameSizeMs,
      end_ms: Math.min((i + 1) * frameSizeMs, durationMs),
      text: ""
    });
  }
  return frames;
}

// Generate 3 tiers from original 108ms frames
function generateAllTiers(originalFrames, durationMs) {
  let sourceFrames = originalFrames;
  if (!sourceFrames || sourceFrames.length === 0) {
    sourceFrames = generateFramesForTier(durationMs, 108);
  }
  
  // tier_216: merge every 2 frames (108+108=216)
  const tier216 = [];
  for (let i = 0; i < sourceFrames.length; i += 2) {
    const start = sourceFrames[i].start_ms;
    const end = i + 1 < sourceFrames.length ? sourceFrames[i + 1].end_ms : sourceFrames[i].end_ms;
    const text1 = sourceFrames[i].text || "";
    const text2 = i + 1 < sourceFrames.length ? (sourceFrames[i + 1].text || "") : "";
    tier216.push({
      index: tier216.length,
      start_ms: start,
      end_ms: end,
      text: (text1 + text2).slice(0, 4)
    });
  }
  
  // tier_108: same as source
  const tier108 = sourceFrames.map((f, idx) => ({ ...f, index: idx }));
  
  // tier_54: split each 108ms frame into 2
  const tier54 = [];
  for (let i = 0; i < sourceFrames.length; i++) {
    const f = sourceFrames[i];
    const half = (f.end_ms - f.start_ms) / 2;
    tier54.push({
      index: tier54.length,
      start_ms: f.start_ms,
      end_ms: f.start_ms + half,
      text: f.text || ""
    });
    tier54.push({
      index: tier54.length,
      start_ms: f.start_ms + half,
      end_ms: f.end_ms,
      text: ""
    });
  }
  
  return { tier_216: tier216, tier_108: tier108, tier_54: tier54 };
}

// ========== Load data into tiers ==========
function loadDataIntoTiers(audioData) {
    let sourceFrames = audioData.frames_108 || audioData.frames || [];
    
    if (sourceFrames.length === 0) {
        const durationMs = audioData.duration_ms || 5000;
        sourceFrames = generateFramesForTier(durationMs, 108);
    }
    
    const allTiers = generateAllTiers(sourceFrames, audioData.duration_ms || 5000);
    framesData = allTiers;
    
    renderThreeTierGrid();
    
    if (currentAudio) {
        currentAudio.pause();
        currentAudio.src = `${BASE_PATH}/audio/${audioData.wav_file}`;
        currentAudio.load();
        initAudioContext();
        updateVolume(currentVolume);
        setPlaybackSpeed(playbackSpeed);
        
        // Reset full audio UI
        stopFullAudioPlayback();
        const duration = currentAudio.duration || 0;
        const durationMin = Math.floor(duration / 60);
        const durationSec = Math.floor(duration % 60);
        const timeDisplay = document.getElementById('timeDisplay');
        if (timeDisplay) timeDisplay.textContent = `0:00 / ${durationMin}:${durationSec.toString().padStart(2,'0')}`;
        const progressFill = document.getElementById('progressFillFull');
        if (progressFill) progressFill.style.width = '0%';
    }
}

// ========== RENDER 3-TIER GRID ==========
function renderThreeTierGrid() {
  const tier216Row = document.getElementById('tier216Row');
  const tier108Row = document.getElementById('tier108Row');
  const tier54Row = document.getElementById('tier54Row');
  
  if (!tier216Row) return;
  
  tier216Row.innerHTML = '';
  tier108Row.innerHTML = '';
  tier54Row.innerHTML = '';
  
  // Add header labels
  const header216 = document.createElement('div');
  header216.className = 'tier-header';
  header216.innerText = 'वायु (216ms)';
  tier216Row.appendChild(header216);
  
  const header108 = document.createElement('div');
  header108.className = 'tier-header';
  header108.innerText = 'अग्नि (108ms)';
  tier108Row.appendChild(header108);
  
  const header54 = document.createElement('div');
  header54.className = 'tier-header';
  header54.innerText = 'आकाश (54ms)';
  tier54Row.appendChild(header54);
  
  // Render 216ms cells
  framesData.tier_216.forEach((frame, idx) => {
    const div = createCell(frame, idx, '216');
    tier216Row.appendChild(div);
  });
  
  // Render 108ms cells
  framesData.tier_108.forEach((frame, idx) => {
    const div = createCell(frame, idx, '108');
    tier108Row.appendChild(div);
  });
  
  // Render 54ms cells
  framesData.tier_54.forEach((frame, idx) => {
    const div = createCell(frame, idx, '54');
    tier54Row.appendChild(div);
  });
}

function createCell(frame, idx, tier) {
  const div = document.createElement('div');
  div.className = `cell-${tier}`;
  div.setAttribute('data-idx', idx);
  div.setAttribute('data-tier', `tier_${tier}`);
  
  const timeSpan = document.createElement('div');
  timeSpan.className = 'time-label';
  timeSpan.innerText = `${(frame.start_ms / 1000).toFixed(2)}s`;
  
  const input = document.createElement('input');
  input.type = 'text';
  input.className = 'grid-input';
  input.value = frame.text || '';
  input.placeholder = '';
  input.setAttribute('data-idx', idx);
  input.setAttribute('data-tier', `tier_${tier}`);
  
  input.addEventListener('focus', () => {});
  input.addEventListener('input', (e) => {
    let val = e.target.value;
    if (val.length > 4) val = val.slice(0, 4);
    e.target.value = val;
    framesData[`tier_${tier}`][idx].text = val;
  });
  
  div.appendChild(timeSpan);
  div.appendChild(input);
  
  // Click to play (works on both desktop and mobile)
  div.addEventListener('click', (e) => {
    if (e.target === input) return;
    playCellAudio(`tier_${tier}`, idx);
  });
  
  input.addEventListener('click', (e) => {
    e.stopPropagation();
    playCellAudio(`tier_${tier}`, idx);
  });
  
  // Selection via long-press on mobile, click on desktop
  let pressTimer = null;
  
  div.addEventListener('touchstart', (e) => {
    if (e.target === input) return;
    pressTimer = setTimeout(() => {
      toggleSegmentSelection(`tier_${tier}`, idx);
      if (window.navigator && window.navigator.vibrate) {
        window.navigator.vibrate(50);
      }
      pressTimer = null;
    }, 500);
  });
  
  div.addEventListener('touchend', () => {
    if (pressTimer) {
      clearTimeout(pressTimer);
      pressTimer = null;
    }
  });
  
  div.addEventListener('touchmove', () => {
    if (pressTimer) {
      clearTimeout(pressTimer);
      pressTimer = null;
    }
  });
  
  // Desktop selection (mouse down)
  div.addEventListener('mousedown', (e) => {
    if (e.target === input) return;
    toggleSegmentSelection(`tier_${tier}`, idx);
  });
  
  // Prevent context menu on long press
  div.addEventListener('contextmenu', (e) => {
    e.preventDefault();
    return false;
  });
  
  return div;
}

async function checkAuth() {

    currentUsername = d.username;
    document.getElementById('usernameDisplay').innerText = d.username;
    return true;
  } catch { window.location.href = `${BASE_PATH}/login`; return false; }
}

async function logout() {
  await fetch(`${BASE_PATH}/api/logout`, { method: 'POST' });
  window.location.href = `${BASE_PATH}/login`;
}

async function loadProgress() {
  try {
    const r = await fetch(`${BASE_PATH}/progress`);
    if (r.status === 401) { window.location.href = `${BASE_PATH}/login`; return; }
    const d = await r.json();
    const pct = d.total > 0 ? (d.completed / d.total * 100).toFixed(1) : 0;
    document.getElementById('progressFill').style.width = pct + '%';
    document.getElementById('remainingBadge').innerHTML = `${d.remaining} remaining`;
    if (d.user_stats) {
      document.getElementById('totalFiles').innerText = d.user_stats.total_files_completed || 0;
      let totalSecs = d.user_stats.total_duration_seconds || 0;
      if (totalSecs < 60) {
        document.getElementById('totalDuration').innerText = `${totalSecs.toFixed(1)}s`;
      } else if (totalSecs < 3600) {
        let mins = Math.floor(totalSecs / 60);
        let secs = Math.floor(totalSecs % 60);
        document.getElementById('totalDuration').innerText = `${mins}m ${secs}s`;
      } else {
        let hours = Math.floor(totalSecs / 3600);
        let mins = Math.floor((totalSecs % 3600) / 60);
        document.getElementById('totalDuration').innerText = `${hours}h ${mins}m`;
      }
    }
    if (d.user_daily_stats && d.user_daily_stats.daily) {
      const today = new Date().toISOString().split('T')[0];
      const todayStats = d.user_daily_stats.daily[today] || { files_completed: 0, duration_seconds: 0 };
      document.getElementById('todayFiles').innerText = todayStats.files_completed || 0;
      let todaySecs = todayStats.duration_seconds || 0;
      if (todaySecs < 60) {
        document.getElementById('todayDuration').innerText = `${todaySecs.toFixed(1)}s`;
      } else if (todaySecs < 3600) {
        let mins = Math.floor(todaySecs / 60);
        let secs = Math.floor(todaySecs % 60);
        document.getElementById('todayDuration').innerText = `${mins}m ${secs}s`;
      } else {
        let hours = Math.floor(todaySecs / 3600);
        let mins = Math.floor((todaySecs % 3600) / 60);
        document.getElementById('todayDuration').innerText = `${hours}h ${mins}m`;
      }
    }
  } catch(e) { console.error('Progress load error:', e); }
}

function showMessage(msg, type) {
  let msgDiv = document.getElementById('messageArea');
  if (!msgDiv) {
    msgDiv = document.createElement('div');
    msgDiv.id = 'messageArea';
    msgDiv.className = 'message-area';
    document.getElementById('content').appendChild(msgDiv);
  }
  msgDiv.innerHTML = `<div class="message ${type}">${msg}</div>`;
  setTimeout(() => {
    if (msgDiv.innerHTML.includes(msg)) msgDiv.innerHTML = '';
  }, 3000);
}

async function loadNextSample() {
  try {
    const response = await fetch(`${BASE_PATH}/get-next-file`);
    if (!response.ok) throw new Error('Failed to load');
    const data = await response.json();
    if (data.completed) {
      document.getElementById('content').innerHTML = `<div class="message success">${data.message || 'All files completed!'}</div>`;
      return;
    }
    if (data.error) {
      document.getElementById('content').innerHTML = `<div class="message error">${data.error}</div>`;
      return;
    }
    
    currentData = data;
    
    const audioUrl = `${BASE_PATH}/audio/${data.wav_file}`;
    if (currentAudio) {
      currentAudio.pause();
      currentAudio.src = audioUrl;
    } else {
      currentAudio = new Audio(audioUrl);
      currentAudio.crossOrigin = "anonymous";
      setupAudioUnlock();
    }
    currentAudio.load();
    
    loadDataIntoTiers(data);
    
    const fileCard = document.querySelector('.current-file-card');
    if (fileCard) {
      const durationSec = (data.duration_ms / 1000).toFixed(1);
      fileCard.innerHTML = `<strong>${data.json_file || 'Current File'}</strong> — ${durationSec} seconds`;
    }
    
    initAudioContext();
    updateVolume(currentVolume);
    setPlaybackSpeed(playbackSpeed);
    
  } catch (error) {
    console.error('Error loading sample:', error);
    document.getElementById('content').innerHTML = `<div class="message error">Error loading sample. Please refresh.</div>`;
  }
}

async function submitAnnotation() {
  const frames_54 = framesData.tier_54.map(f => ({ text: f.text, start_ms: f.start_ms, end_ms: f.end_ms }));
  const frames_108 = framesData.tier_108.map(f => ({ text: f.text, start_ms: f.start_ms, end_ms: f.end_ms }));
  const frames_216 = framesData.tier_216.map(f => ({ text: f.text, start_ms: f.start_ms, end_ms: f.end_ms }));
  
  const fullSequence = frames_108.map(f => f.text).filter(t => t).join(' ');
  
  const submitData = {
    json_file: currentData.json_file,
    wav_file: currentData.wav_file,
    duration_ms: currentData.duration_ms,
    frames_54: frames_54,
    frames_108: frames_108,
    frames_216: frames_216,
    full_sequence: fullSequence,
    sentence: currentData.sentence || ''
  };
  
  try {
    const response = await fetch(`${BASE_PATH}/submit-3-tier`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(submitData)
    });
    const result = await response.json();
    if (result.message) {
      showMessage(result.message, 'success');
      await loadProgress();
      await loadNextSample();
      clearSelection();
    } else {
      showMessage(result.error || 'Submission failed', 'error');
    }
  } catch (error) {
    showMessage('Error submitting annotation', 'error');
  }
}

async function skipFile() {
  if (!currentData || !currentData.json_file) {
    showMessage('No file to skip', 'error');
    return;
  }
  try {
    const response = await fetch(`${BASE_PATH}/skip-file`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ json_file: currentData.json_file })
    });
    const result = await response.json();
    if (result.message) {
      showMessage(result.message, 'info');
      await loadNextSample();
      clearSelection();
    }
  } catch (error) {
    showMessage('Error skipping file', 'error');
  }
}

    <div class="akshar-set-section">
      <div class="akshar-title">Tap to insert | Long press cell to select</div>
      <div class="akshar-grid" id="aksharGrid"></div>
    </div>
    
    <div class="button-group">
      <button class="btn btn-submit" onclick="submitAnnotation()">✓ Submit</button>
      <button class="btn btn-skip" onclick="skipFile()">⏭ Skip</button>
    </div>
  `;
  
  const volumeSlider = document.getElementById('volumeSlider');
  if (volumeSlider) {
    volumeSlider.addEventListener('input', (e) => updateVolume(parseFloat(e.target.value)));
  }
  
  document.querySelectorAll('.speed-btn').forEach(btn => {
    btn.addEventListener('click', () => setPlaybackSpeed(parseFloat(btn.dataset.speed)));
  });
  
  // Make functions globally available for onclick
  window.toggleFullAudioPlayback = toggleFullAudioPlayback;
  window.seekToPosition = seekToPosition;
  window.playSelectedSegments = playSelectedSegments;
  window.clearSelection = clearSelection;
  window.submitAnnotation = submitAnnotation;
  window.skipFile = skipFile;
  
  const aksharGrid = document.getElementById('aksharGrid');
  AKSHAR_SET.forEach(akshar => {
    const span = document.createElement('span');
    span.className = 'akshar-item';
    span.textContent = akshar;
    span.setAttribute('draggable', 'true');
    span.setAttribute('data-akshar', akshar);
    
    span.addEventListener('dragstart', (e) => {
      e.dataTransfer.setData('text/plain', akshar);
      e.dataTransfer.effectAllowed = 'copy';
    });
    
    span.addEventListener('click', (e) => {
      const activeElement = document.activeElement;
      if (activeElement && activeElement.tagName === 'INPUT' && activeElement.classList.contains('grid-input')) {
        const start = activeElement.selectionStart;
        const end = activeElement.selectionEnd;
        const value = activeElement.value;
        activeElement.value = value.substring(0, start) + akshar + value.substring(end);
        activeElement.dispatchEvent(new Event('input', { bubbles: true }));
        activeElement.focus();
      }
    });
    
    aksharGrid.appendChild(span);
  });
  
  document.addEventListener('dragover', (e) => e.preventDefault());
  document.addEventListener('drop', (e) => {
    e.preventDefault();
    const target = e.target;
    if (target && target.tagName === 'INPUT' && target.classList.contains('grid-input')) {
      const akshar = e.dataTransfer.getData('text/plain');
      if (akshar) {
        const start = target.selectionStart;
        const end = target.selectionEnd;
        const value = target.value;
        target.value = value.substring(0, start) + akshar + value.substring(end);
        target.dispatchEvent(new Event('input', { bubbles: true }));
        target.focus();
      }
    }
  });
  
  await loadNextSample();
}

// Start the app
init();
</script>
</body>
</html>
