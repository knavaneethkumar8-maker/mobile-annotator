<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
<title>Live News Annotation</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
  background: #F5F5F0;
  padding: 16px 0px;
  color: #1C1C1A;
  line-height: 1.4;
}
.container {
  max-width: 680px;
  margin: 0 auto;
  background: #FFFFFF;
  border-radius: 28px;
  box-shadow: 0 4px 20px rgba(0, 0, 0, 0.02);
  overflow: hidden;
  padding: 20px 18px 28px;
}
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 18px;
  flex-wrap: wrap;
  gap: 12px;
}
.header-left h2 {
  font-size: 1.65rem;
  font-weight: 590;
  color: #1C1C1A;
  margin: 0;
}
.header-right {
  display: flex;
  align-items: center;
  gap: 12px;
}
.user-info {
  display: flex;
  align-items: center;
  gap: 12px;
  background: #F0F0EB;
  padding: 6px 14px;
  border-radius: 40px;
}
.user-name {
  font-weight: 550;
  font-size: 0.85rem;
  color: #2C6E49;
}
.back-btn {
  background: none;
  border: none;
  color: #2C6E49;
  font-size: 0.85rem;
  cursor: pointer;
  padding: 6px 12px;
  text-decoration: none;
}
.live-badge {
  background: #dc2626;
  color: white;
  padding: 4px 12px;
  border-radius: 20px;
  font-size: 0.7rem;
  font-weight: 600;
  animation: pulse 1s infinite;
  display: inline-block;
  margin-left: 10px;
}
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.6; }
}
.language-selector {
  margin-bottom: 20px;
}
.language-label {
  font-size: 0.85rem;
  font-weight: 550;
  color: #1C1C1A;
  margin-bottom: 10px;
  display: block;
}
.language-options {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
}
.lang-btn {
  padding: 10px 20px;
  border: 2px solid #E5E5DE;
  border-radius: 40px;
  background: white;
  font-size: 0.9rem;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s ease;
}
.lang-btn.selected {
  background: #2C6E49;
  border-color: #2C6E49;
  color: white;
}
.stream-card {
  background: #FEFEFC;
  border: 1px solid #E5E5DE;
  border-radius: 24px;
  padding: 20px;
  margin-bottom: 20px;
}
.clip-info {
  text-align: center;
  margin-bottom: 16px;
  padding: 10px;
  background: #F8F8F4;
  border-radius: 40px;
}
.clip-duration {
  font-size: 0.8rem;
  color: #2C6E49;
  font-weight: 500;
}
.audio-player {
  width: 100%;
  margin: 16px 0;
  border-radius: 44px;
}
.volume-control {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-top: 12px;
  padding: 8px 12px;
  background: #F8F8F4;
  border-radius: 40px;
  border: 1px solid #E9E9E2;
}
.volume-icon { font-size: 1.2rem; }
.volume-slider {
  flex: 1;
  height: 4px;
  -webkit-appearance: none;
  background: #DCDCD4;
  border-radius: 4px;
}
.volume-slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 18px;
  height: 18px;
  border-radius: 50%;
  background: #2C6E49;
  cursor: pointer;
}
.volume-value {
  min-width: 52px;
  font-size: 0.8rem;
  font-weight: 500;
  color: #2C6E49;
}
.button-group {
  display: flex;
  gap: 12px;
  margin-top: 20px;
}
.btn {
  flex: 1;
  padding: 14px;
  border-radius: 44px;
  border: none;
  font-size: 1rem;
  font-weight: 550;
  cursor: pointer;
  transition: all 0.2s ease;
}
.btn-primary {
  background: #2C6E49;
  color: white;
}
.btn-primary:active { transform: scale(0.97); }
.btn-secondary {
  background: #F0F0EB;
  color: #6E6E68;
}
.btn:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}
.frames-grid {
  display: flex;
  flex-direction: column;
  gap: 12px;
  max-height: 400px;
  overflow-y: auto;
  margin: 16px 0;
}
.frame-card {
  background: #FEFEFC;
  border: 1px solid #E5E5DE;
  border-radius: 16px;
  padding: 12px;
  cursor: pointer;
}
.frame-card.playing {
  background: #D6EFE0;
  border-color: #2C6E49;
}
.frame-card.selected {
  background: #F0FAF3;
  border: 2px solid #2C6E49;
}
.frame-header {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 8px;
  font-size: 0.7rem;
  color: #6E6E68;
}
.frame-time {
  font-family: monospace;
}
.frame-input {
  width: 100%;
  padding: 10px;
  font-size: 1rem;
  border: 1px solid #E5E5DE;
  border-radius: 12px;
  font-family: monospace;
  background: white;
}
.frame-input:focus {
  outline: none;
  border-color: #2C6E49;
}
.akshar-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin: 16px 0;
}
.akshar-item {
  background: #F0F0EB;
  border: 1px solid #E5E5DE;
  border-radius: 12px;
  padding: 8px 12px;
  font-size: 1rem;
  font-weight: 500;
  text-align: center;
  cursor: pointer;
  transition: all 0.1s ease;
}
.akshar-item:active {
  transform: scale(0.95);
  background: #2C6E49;
  color: white;
}
.multi-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: #1A4D3A;
  color: #fff;
  border-radius: 40px;
  padding: 10px 16px;
  margin-bottom: 10px;
  gap: 10px;
  font-size: 0.82rem;
}
.multi-bar.hidden { display: none; }
.multi-bar-label { flex: 1; }
.multi-bar-btn {
  background: rgba(255,255,255,0.15);
  border: none;
  color: #fff;
  font-size: 0.78rem;
  padding: 6px 14px;
  border-radius: 30px;
  cursor: pointer;
}
.sel-dot {
  width: 9px;
  height: 9px;
  border-radius: 50%;
  border: 2px solid #2C6E49;
  background: transparent;
  display: inline-block;
  margin-right: 6px;
}
.frame-card.selected .sel-dot {
  background: #2C6E49;
}
.play-full-btn {
  background: #4A6FA5;
  color: white;
  border: none;
  padding: 10px 20px;
  border-radius: 40px;
  font-size: 0.9rem;
  font-weight: 550;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  margin-bottom: 16px;
  width: 100%;
}
.message {
  padding: 12px;
  border-radius: 20px;
  text-align: center;
  margin-top: 12px;
  font-size: 0.85rem;
}
.message.success { background: #E0F0E6; color: #1E5631; }
.message.error { background: #FDE9E7; color: #B13E3A; }
.message.info { background: #E9EDF2; color: #2B4F6C; }
.hidden { display: none; }
@media (max-width: 560px) {
  .container { padding: 16px; }
  .lang-btn { padding: 8px 16px; font-size: 0.8rem; }
}
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <div class="header-left">
      <h2>Live News <span class="live-badge">LIVE</span></h2>
    </div>
    <div class="header-right">
      <div class="user-info">
        <span class="user-name" id="usernameDisplay">Loading...</span>
        <a href="{{ url_for_path('') }}" class="back-btn">Back</a>
      </div>
    </div>
  </div>

  <div id="content">
    <div class="language-selector">
      <div class="language-label">Select News Language</div>
      <div class="language-options" id="languageOptions">
        <button class="lang-btn" data-lang="hi">हिंदी</button>
        <button class="lang-btn" data-lang="te">తెలుగు</button>
        <button class="lang-btn" data-lang="ta">தமிழ்</button>
        <button class="lang-btn" data-lang="bn">বাংলা</button>
        <button class="lang-btn" data-lang="gu">ગુજરાતી</button>
        <button class="lang-btn" data-lang="mr">मराठी</button>
      </div>
    </div>

    <div class="stream-card">
      <div class="clip-info">
        <span class="clip-duration" id="clipDuration">📺 Fetching live news clip...</span>
      </div>

      <audio id="audioPlayer" class="audio-player" controls playsinline style="width:100%"></audio>
      
      <div class="volume-control">
        <span class="volume-icon">🔊</span>
        <input type="range" id="volumeSlider" class="volume-slider" min="0" max="6" step="0.05" value="1.0">
        <span class="volume-value" id="volumeValue">100%</span>
      </div>

      <div class="button-group">
        <button class="btn btn-primary" id="fetchBtn">🎙️ Fetch Live News</button>
        <button class="btn btn-secondary" id="annotateBtn" disabled>✍️ Annotate Clip</button>
      </div>
    </div>

    <div id="annotationSection" class="hidden">
      <div class="stream-card">
        <h3 style="margin-bottom: 16px;">Annotate Frames</h3>
        
        <button class="play-full-btn" id="playFullBtn">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="white">
            <path d="M8 5v14l11-7z"/>
          </svg>
          Play Full Audio
        </button>

        <div class="akshar-grid" id="aksharGrid"></div>
        
        <div class="multi-bar hidden" id="multiBar">
          <span class="multi-bar-label">0 segments selected</span>
          <button class="multi-bar-btn" id="playSelectedBtn">▶ Play selected</button>
          <button class="multi-bar-btn" id="clearSelectionBtn">✕ Clear</button>
        </div>
        
        <div class="frames-grid" id="framesGrid"></div>
        
        <div class="button-group">
          <button class="btn btn-primary" id="submitBtn">Submit Annotation</button>
          <button class="btn btn-secondary" id="cancelBtn">Cancel</button>
        </div>
      </div>
    </div>
  </div>
  
  <div id="messageArea"></div>
</div>

<script>
const BASE_PATH = "{{ base_path }}";
const CLIP_DURATION = 7;  // 7 seconds for desktop
const FRAME_SIZE_MS = 108;
const AKSHAR_SET = [
  "अ", "आ", "इ", "उ", "ए", "ओ",
  "क", "ख", "ग", "घ", "च", "छ", "ज", "झ",
  "ट", "ठ", "ड", "ढ", "त", "थ", "द", "ध",
  "प", "फ", "ब", "भ", "न", "म", "य", "र", "ल", "व", "स", "ह", "०"
];

let currentUsername = '';
let currentLanguage = 'hi';
let currentAudio = null;
let currentAudioBlob = null;
let currentVolume = 1.0;
let audioContext = null;
let gainNode = null;
let currentPlayTimeout = null;
let audioUnlocked = false;
let currentFrames = [];
let selectedSegments = new Set();
let multiPlayQueue = [];
let multiPlayIndex = 0;
let multiPlayTimeout = null;
let activeFrameIndex = null;

async function init() {
  await checkAuth();
  setupEventListeners();
  renderAksharSet();
  setupAudioUnlock();
}

async function checkAuth() {
  try {
    const r = await fetch(`${BASE_PATH}/api/current-user`);
    const d = await r.json();
    if (!d.logged_in) {
      window.location.href = `${BASE_PATH}/login`;
      return false;
    }
    currentUsername = d.username;
    document.getElementById('usernameDisplay').innerText = d.username;
    return true;
  } catch {
    window.location.href = `${BASE_PATH}/login`;
    return false;
  }
}

function setupAudioUnlock() {
  const h = () => { unlockAudio(); document.removeEventListener('touchstart', h); document.removeEventListener('click', h); };
  document.addEventListener('touchstart', h);
  document.addEventListener('click', h);
}

function unlockAudio() {
  if (audioUnlocked) return;
  if (audioContext && audioContext.state === 'suspended') {
    audioContext.resume().then(() => { audioUnlocked = true; }).catch(() => {});
  }
  if (currentAudio) {
    currentAudio.play().then(() => { currentAudio.pause(); currentAudio.currentTime = 0; }).catch(() => {});
  }
}

function initAudioContext() {
  if (!audioContext && currentAudio) {
    try {
      audioContext = new (window.AudioContext || window.webkitAudioContext)();
      const source = audioContext.createMediaElementSource(currentAudio);
      gainNode = audioContext.createGain();
      source.connect(gainNode);
      gainNode.connect(audioContext.destination);
      gainNode.gain.value = currentVolume;
    } catch (e) { console.warn('Web Audio init failed:', e); }
  }
}

function updateVolume(value) {
  currentVolume = value;
  document.getElementById('volumeValue').innerText = Math.round(value * 100) + '%';
  if (gainNode) gainNode.gain.value = value;
  if (currentAudio && !gainNode) currentAudio.volume = Math.min(value, 1.0);
}

function setupEventListeners() {
  document.querySelectorAll('.lang-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      currentLanguage = btn.dataset.lang;
    });
  });
  
  document.getElementById('fetchBtn').addEventListener('click', fetchLiveNews);
  document.getElementById('annotateBtn').addEventListener('click', startAnnotation);
  document.getElementById('submitBtn').addEventListener('click', submitAnnotation);
  document.getElementById('cancelBtn').addEventListener('click', cancelAnnotation);
  document.getElementById('playFullBtn')?.addEventListener('click', playFullAudio);
  
  const playSelectedBtn = document.getElementById('playSelectedBtn');
  const clearSelectionBtn = document.getElementById('clearSelectionBtn');
  if (playSelectedBtn) playSelectedBtn.addEventListener('click', playSelectedSegments);
  if (clearSelectionBtn) clearSelectionBtn.addEventListener('click', clearSelection);
  
  const volumeSlider = document.getElementById('volumeSlider');
  if (volumeSlider) {
    volumeSlider.addEventListener('input', e => updateVolume(parseFloat(e.target.value)));
  }
}

function playFullAudio() {
  if (!currentAudio) { showMessage('Audio not ready', 'error'); return; }
  stopPlayback();
  currentAudio.currentTime = 0;
  currentAudio.play().catch(err => showMessage('Tap the play button first', 'info'));
}

function stopPlayback() {
  if (currentPlayTimeout) clearTimeout(currentPlayTimeout);
  if (multiPlayTimeout) clearTimeout(multiPlayTimeout);
  if (currentAudio && !currentAudio.paused) currentAudio.pause();
  document.querySelectorAll('.frame-card.playing').forEach(c => c.classList.remove('playing'));
}

function playSegmentAudio(startMs, endMs) {
  if (!currentAudio) return;
  const startSec = startMs / 1000;
  const durationSec = (endMs - startMs) / 1000;
  if (currentPlayTimeout) clearTimeout(currentPlayTimeout);
  
  const doPlay = () => {
    currentAudio.pause();
    currentAudio.currentTime = startSec;
    currentAudio.play().then(() => {
      currentPlayTimeout = setTimeout(() => {
        if (currentAudio && !currentAudio.paused) currentAudio.pause();
      }, durationSec * 1000);
    }).catch(() => {});
  };
  
  if (audioContext && audioContext.state === 'suspended') audioContext.resume().then(doPlay);
  else doPlay();
}

async function fetchLiveNews() {
  showMessage(`Fetching live ${currentLanguage} news...`, 'info');
  document.getElementById('fetchBtn').disabled = true;
  document.getElementById('annotateBtn').disabled = true;
  
  try {
    const response = await fetch(`${BASE_PATH}/api/live-stream/fetch?lang=${currentLanguage}&duration=${CLIP_DURATION}`);
    
    if (!response.ok) {
      throw new Error('Failed to fetch news clip');
    }
    
    currentAudioBlob = await response.blob();
    const audioUrl = URL.createObjectURL(currentAudioBlob);
    
    if (currentAudio) {
      currentAudio.pause();
      URL.revokeObjectURL(currentAudio.src);
    }
    currentAudio = document.getElementById('audioPlayer');
    currentAudio.src = audioUrl;
    currentAudio.load();
    
    document.getElementById('clipDuration').innerHTML = `📺 ${CLIP_DURATION} sec live news clip (${currentLanguage.toUpperCase()})`;
    document.getElementById('annotateBtn').disabled = false;
    showMessage(`Live news clip ready! ${CLIP_DURATION} seconds. Click "Annotate Clip".`, 'success');
    
  } catch (err) {
    showMessage('Error fetching news: ' + err.message, 'error');
  } finally {
    document.getElementById('fetchBtn').disabled = false;
  }
}

function startAnnotation() {
  if (!currentAudioBlob) {
    showMessage('No clip to annotate', 'error');
    return;
  }
  
  const numFrames = Math.floor((CLIP_DURATION * 1000) / FRAME_SIZE_MS);
  currentFrames = [];
  for (let i = 0; i < numFrames; i++) {
    currentFrames.push({
      index: i,
      start_ms: i * FRAME_SIZE_MS,
      end_ms: (i + 1) * FRAME_SIZE_MS,
      text: ""
    });
  }
  
  renderAnnotationFrames();
  initAudioContext();
  document.getElementById('annotationSection').classList.remove('hidden');
  showMessage(`Ready! ${numFrames} frames to annotate.`, 'success');
}

function renderAksharSet() {
  const container = document.getElementById('aksharGrid');
  if (!container) return;
  container.innerHTML = '';
  AKSHAR_SET.forEach(akshar => {
    const span = document.createElement('span');
    span.className = 'akshar-item';
    span.textContent = akshar;
    span.onclick = () => insertAkshar(akshar);
    container.appendChild(span);
  });
}

function insertAkshar(akshar) {
  if (activeFrameIndex !== null && currentFrames[activeFrameIndex]) {
    const input = document.querySelector(`.frame-input[data-index="${activeFrameIndex}"]`);
    if (input) {
      let newText = (currentFrames[activeFrameIndex].text || '') + akshar;
      if (newText.length <= 4) {
        input.value = newText;
        currentFrames[activeFrameIndex].text = newText;
      } else {
        showMessage('Maximum 2 akshars per frame!', 'warning');
      }
    }
  }
}

function toggleSegmentSelection(frameIndex) {
  const card = document.querySelector(`.frame-card[data-frame-index="${frameIndex}"]`);
  if (!card) return;
  if (selectedSegments.has(frameIndex)) {
    selectedSegments.delete(frameIndex);
    card.classList.remove('selected');
  } else {
    selectedSegments.add(frameIndex);
    card.classList.add('selected');
  }
  updateMultiBar();
}

function updateMultiBar() {
  const bar = document.getElementById('multiBar');
  if (!bar) return;
  if (selectedSegments.size === 0) {
    bar.classList.add('hidden');
  } else {
    bar.classList.remove('hidden');
    bar.querySelector('.multi-bar-label').textContent = `${selectedSegments.size} segment${selectedSegments.size > 1 ? 's' : ''} selected`;
  }
}

function clearSelection() {
  selectedSegments.clear();
  document.querySelectorAll('.frame-card.selected').forEach(c => c.classList.remove('selected'));
  updateMultiBar();
}

function playSelectedSegments() {
  if (selectedSegments.size === 0 || !currentAudio) return;
  stopPlayback();
  multiPlayQueue = Array.from(selectedSegments).sort((a, b) => a - b);
  multiPlayIndex = 0;
  playNextInQueue();
}

function playNextInQueue() {
  if (multiPlayIndex >= multiPlayQueue.length) {
    document.querySelectorAll('.frame-card.playing').forEach(c => c.classList.remove('playing'));
    return;
  }
  const frameIndex = multiPlayQueue[multiPlayIndex];
  const frame = currentFrames[frameIndex];
  if (!frame) { multiPlayIndex++; playNextInQueue(); return; }

  document.querySelectorAll('.frame-card.playing').forEach(c => c.classList.remove('playing'));
  const card = document.querySelector(`.frame-card[data-frame-index="${frameIndex}"]`);
  if (card) card.classList.add('playing');

  playSegmentAudio(frame.start_ms, frame.end_ms);
  
  multiPlayTimeout = setTimeout(() => {
    multiPlayIndex++;
    playNextInQueue();
  }, (frame.end_ms - frame.start_ms));
}

function playSegmentByIndex(frameIndex) {
  if (!currentFrames || !currentAudio) return;
  const frame = currentFrames[frameIndex];
  if (!frame) return;
  
  stopPlayback();
  const card = document.querySelector(`.frame-card[data-frame-index="${frameIndex}"]`);
  playSegmentAudio(frame.start_ms, frame.end_ms);
  if (card) {
    card.classList.add('playing');
    setTimeout(() => card.classList.remove('playing'), frame.end_ms - frame.start_ms);
  }
}

function renderAnnotationFrames() {
  const framesGrid = document.getElementById('framesGrid');
  framesGrid.innerHTML = '';
  
  currentFrames.forEach((frame, idx) => {
    const card = document.createElement('div');
    card.className = 'frame-card';
    card.setAttribute('data-frame-index', idx);
    
    const headerDiv = document.createElement('div');
    headerDiv.className = 'frame-header';
    headerDiv.innerHTML = `
      <span class="frame-label"><span class="sel-dot"></span> ${idx+1}</span>
      <span class="frame-time">${frame.start_ms}–${frame.end_ms} ms</span>
    `;
    
    const input = document.createElement('input');
    input.type = 'text';
    input.className = 'frame-input';
    input.placeholder = 'Akshars (max 2)';
    input.value = frame.text || '';
    input.setAttribute('data-index', idx);
    
    input.addEventListener('focus', () => { activeFrameIndex = idx; });
    input.addEventListener('input', (e) => {
      let value = e.target.value;
      if (value.length > 4) {
        value = value.slice(0, 4);
        e.target.value = value;
        showMessage('Maximum 2 akshars per frame!', 'warning');
      }
      currentFrames[idx].text = value;
    });
    input.addEventListener('click', (e) => {
      e.stopPropagation();
      playSegmentByIndex(idx);
    });
    
    card.addEventListener('click', (e) => {
      if (e.target === input || input.contains(e.target)) return;
      toggleSegmentSelection(idx);
    });
    
    card.appendChild(headerDiv);
    card.appendChild(input);
    framesGrid.appendChild(card);
  });
}

async function submitAnnotation() {
  if (!currentFrames || currentFrames.length === 0) {
    showMessage('No clip to submit', 'error');
    return;
  }
  
  showMessage('Submitting...', 'info');
  document.getElementById('submitBtn').disabled = true;
  
  try {
    const formData = new FormData();
    formData.append('audio', currentAudioBlob, `live_${currentLanguage}_${Date.now()}.wav`);
    formData.append('duration', CLIP_DURATION);
    formData.append('language', currentLanguage);
    formData.append('frames', JSON.stringify(currentFrames));
    
    const response = await fetch(`${BASE_PATH}/api/live-stream/submit`, {
      method: 'POST',
      body: formData
    });
    
    const data = await response.json();
    if (data.success) {
      showMessage(`Submitted! Added ${data.akshar_count} akshars`, 'success');
      cancelAnnotation();
      fetchLiveNews();
    } else {
      throw new Error(data.error);
    }
  } catch (err) {
    showMessage('Error: ' + err.message, 'error');
  } finally {
    document.getElementById('submitBtn').disabled = false;
  }
}

function cancelAnnotation() {
  currentFrames = [];
  selectedSegments.clear();
  document.getElementById('annotationSection').classList.add('hidden');
  document.getElementById('framesGrid').innerHTML = '';
  showMessage('Cancelled', 'info');
}

function showMessage(text, type) {
  const msgDiv = document.getElementById('messageArea');
  msgDiv.innerHTML = `<div class="message ${type}">${text}</div>`;
  setTimeout(() => {
    if (msgDiv.firstChild && msgDiv.firstChild.innerText === text) {
      msgDiv.innerHTML = '';
    }
  }, 3000);
}

init();
</script>
