<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
<title>Live News Annotation</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
  background: #F5F5F0;
  padding: 16px 0px;
  color: #1C1C1A;
  line-height: 1.4;
}
.container {
  max-width: 680px;
  margin: 0 auto;
  background: #FFFFFF;
  border-radius: 28px;
  box-shadow: 0 4px 20px rgba(0, 0, 0, 0.02);
  overflow: hidden;
  padding: 20px 18px 28px;
}
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 18px;
  flex-wrap: wrap;
  gap: 12px;
}
.header-left h2 {
  font-size: 1.65rem;
  font-weight: 590;
  color: #1C1C1A;
  margin: 0;
}
.header-right {
  display: flex;
  align-items: center;
  gap: 12px;
}
.user-info {
  display: flex;
  align-items: center;
  gap: 12px;
  background: #F0F0EB;
  padding: 6px 14px;
  border-radius: 40px;
}
.user-name {
  font-weight: 550;
  font-size: 0.85rem;
  color: #2C6E49;
}
.back-btn {
  background: none;
  border: none;
  color: #2C6E49;
  font-size: 0.85rem;
  cursor: pointer;
  padding: 6px 12px;
  text-decoration: none;
}
.live-badge {
  background: #dc2626;
  color: white;
  padding: 4px 12px;
  border-radius: 20px;
  font-size: 0.7rem;
  font-weight: 600;
  animation: pulse 1s infinite;
  display: inline-block;
  margin-left: 10px;
}
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.6; }
}
.language-selector {
  margin-bottom: 20px;
}
.language-label {
  font-size: 0.85rem;
  font-weight: 550;
  color: #1C1C1A;
  margin-bottom: 10px;
  display: block;
}
.language-options {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
}
.lang-btn {
  padding: 10px 20px;
  border: 2px solid #E5E5DE;
  border-radius: 40px;
  background: white;
  font-size: 0.9rem;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s ease;
}
.lang-btn.selected {
  background: #2C6E49;
  border-color: #2C6E49;
  color: white;
}
.stream-card {
  background: #FEFEFC;
  border: 1px solid #E5E5DE;
  border-radius: 24px;
  padding: 20px;
  margin-bottom: 20px;
}
.clip-info {
  text-align: center;
  margin-bottom: 16px;
  padding: 10px;
  background: #F8F8F4;
  border-radius: 40px;
}
.clip-duration {
  font-size: 0.8rem;
  color: #2C6E49;
  font-weight: 500;
}
.audio-player {
  width: 100%;
  margin: 16px 0;
  border-radius: 44px;
}
.volume-control {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-top: 12px;
  padding: 8px 12px;
  background: #F8F8F4;
  border-radius: 40px;
  border: 1px solid #E9E9E2;
}
.volume-icon { font-size: 1.2rem; }
.volume-slider {
  flex: 1;
  height: 4px;
  -webkit-appearance: none;
  background: #DCDCD4;
  border-radius: 4px;
}
.volume-slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 18px;
  height: 18px;
  border-radius: 50%;
  background: #2C6E49;
  cursor: pointer;
}
.volume-value {
  min-width: 52px;
  font-size: 0.8rem;
  font-weight: 500;
  color: #2C6E49;
}
.button-group {
  display: flex;
  gap: 12px;
  margin-top: 20px;
}
.btn {
  flex: 1;
  padding: 14px;
  border-radius: 44px;
  border: none;
  font-size: 1rem;
  font-weight: 550;
  cursor: pointer;
  transition: all 0.2s ease;
}
.btn-primary {
  background: #2C6E49;
  color: white;
}
.btn-primary:active { transform: scale(0.97); }
.btn-secondary {
  background: #F0F0EB;
  color: #6E6E68;
}
.btn:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}
.frames-grid {
  display: flex;
  flex-direction: column;
  gap: 12px;
  max-height: 400px;
  overflow-y: auto;
  margin: 16px 0;
}
.frame-card {
  background: #FEFEFC;
  border: 1px solid #E5E5DE;
  border-radius: 16px;
  padding: 12px;
  cursor: pointer;
}
.frame-card.playing {
  background: #D6EFE0;
  border-color: #2C6E49;
}
.frame-card.selected {
  background: #F0FAF3;
  border: 2px solid #2C6E49;
}
.frame-header {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 8px;
  font-size: 0.7rem;
  color: #6E6E68;
}
.frame-time {
  font-family: monospace;
}
.frame-input {
  width: 100%;
  padding: 10px;
  font-size: 1rem;
  border: 1px solid #E5E5DE;
  border-radius: 12px;
  font-family: monospace;
  background: white;
}
.frame-input:focus {
  outline: none;
  border-color: #2C6E49;
}
.akshar-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin: 16px 0;
}
.akshar-item {
  background: #F0F0EB;
  border: 1px solid #E5E5DE;
  border-radius: 12px;
  padding: 8px 12px;
  font-size: 1rem;
  font-weight: 500;
  text-align: center;
  cursor: pointer;
  transition: all 0.1s ease;
}
.akshar-item:active {
  transform: scale(0.95);
  background: #2C6E49;
  color: white;
}
.multi-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: #1A4D3A;
  color: #fff;
  border-radius: 40px;
  padding: 10px 16px;
  margin-bottom: 10px;
  gap: 10px;
  font-size: 0.82rem;
}
.multi-bar.hidden { display: none; }
.multi-bar-label { flex: 1; }
.multi-bar-btn {
  background: rgba(255,255,255,0.15);
  border: none;
  color: #fff;
  font-size: 0.78rem;
  padding: 6px 14px;
  border-radius: 30px;
  cursor: pointer;
}
.sel-dot {
  width: 9px;
  height: 9px;
  border-radius: 50%;
  border: 2px solid #2C6E49;
  background: transparent;
  display: inline-block;
  margin-right: 6px;
}
.frame-card.selected .sel-dot {
  background: #2C6E49;
}
.play-full-btn {
  background: #4A6FA5;
  color: white;
  border: none;
  padding: 10px 20px;
  border-radius: 40px;
  font-size: 0.9rem;
  font-weight: 550;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  margin-bottom: 16px;
  width: 100%;
}
.message {
  padding: 12px;
  border-radius: 20px;
  text-align: center;
  margin-top: 12px;
  font-size: 0.85rem;
  animation: slideIn 0.3s ease;
}
@keyframes slideIn {
  from {
    transform: translateY(-10px);
    opacity: 0;
  }
  to {
    transform: translateY(0);
    opacity: 1;
  }
}
.message.success { background: #D1FAE5; color: #065F46; border-left: 4px solid #10B981; }
.message.error { background: #FEE2E2; color: #991B1B; border-left: 4px solid #EF4444; }
.message.info { background: #DBEAFE; color: #1E40AF; border-left: 4px solid #3B82F6; }
.message.warning { background: #FEF3C7; color: #92400E; border-left: 4px solid #F59E0B; }
.hidden { display: none; }
.fetch-indicator {
  display: inline-block;
  width: 16px;
  height: 16px;
  border: 2px solid #2C6E49;
  border-top-color: transparent;
  border-radius: 50%;
  animation: spin 0.6s linear infinite;
  margin-right: 8px;
  vertical-align: middle;
}
@keyframes spin {
  to { transform: rotate(360deg); }
}

/* Success Popup Modal Styles */
.modal-overlay {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: rgba(0, 0, 0, 0.5);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 1000;
  animation: fadeIn 0.2s ease;
}
@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}
.success-modal {
  background: white;
  border-radius: 32px;
  padding: 32px 24px;
  max-width: 320px;
  width: 90%;
  text-align: center;
  animation: popIn 0.3s cubic-bezier(0.34, 1.2, 0.64, 1);
  box-shadow: 0 20px 35px -10px rgba(0, 0, 0, 0.3);
}
@keyframes popIn {
  from {
    transform: scale(0.9);
    opacity: 0;
  }
  to {
    transform: scale(1);
    opacity: 1;
  }
}
.success-icon {
  width: 72px;
  height: 72px;
  background: #10B981;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 20px;
  animation: bounce 0.5s ease;
}
@keyframes bounce {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.1); }
}
.success-icon svg {
  width: 40px;
  height: 40px;
  color: white;
}
.success-modal h3 {
  font-size: 1.5rem;
  font-weight: 600;
  color: #1C1C1A;
  margin-bottom: 8px;
}
.success-modal p {
  color: #6B7280;
  font-size: 0.9rem;
  margin-bottom: 20px;
}
.success-stats {
  background: #F3F4F6;
  border-radius: 20px;
  padding: 16px;
  margin-bottom: 20px;
}
.stat-item {
  display: flex;
  justify-content: space-between;
  font-size: 0.85rem;
  margin-bottom: 8px;
}
.stat-label {
  color: #6B7280;
}
.stat-value {
  font-weight: 600;
  color: #2C6E49;
}
.modal-close-btn {
  background: #2C6E49;
  color: white;
  border: none;
  padding: 12px 24px;
  border-radius: 40px;
  font-size: 1rem;
  font-weight: 550;
  cursor: pointer;
  width: 100%;
  transition: all 0.2s;
}
.modal-close-btn:active {
  transform: scale(0.97);
}

@media (max-width: 560px) {
  .container { padding: 16px; }
  .lang-btn { padding: 8px 16px; font-size: 0.8rem; }
  .success-modal { padding: 24px 20px; }
  .success-icon { width: 60px; height: 60px; }
  .success-icon svg { width: 32px; height: 32px; }
}
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <div class="header-left">
      <h2>Live News <span class="live-badge">LIVE</span></h2>
    </div>
    <div class="header-right">
      <div class="user-info">
        <span class="user-name" id="usernameDisplay">Loading...</span>
        <a href="{{ url_for_path('') }}" class="back-btn">Back</a>
      </div>
    </div>
  </div>

  <div id="content">
    <div class="language-selector">
      <div class="language-label">Select News Language</div>
      <div class="language-options" id="languageOptions">
        <button class="lang-btn" data-lang="hi">हिंदी</button>
        <button class="lang-btn" data-lang="ta">தமிழ்</button>
        <button class="lang-btn" data-lang="bn">বাংলা</button>
        <button class="lang-btn" data-lang="gu">ગુજરાતી</button>
        <button class="lang-btn" data-lang="mr">मराठी</button>
      </div>
    </div>

    <div class="stream-card">
      <div class="clip-info">
        <span class="clip-duration" id="clipDuration">📺 Select language and fetch news</span>
      </div>

      <audio id="audioPlayer" class="audio-player" controls playsinline style="width:100%"></audio>
      
      <div class="volume-control">
        <span class="volume-icon">🔊</span>
        <input type="range" id="volumeSlider" class="volume-slider" min="0" max="1" step="0.01" value="0.8">
        <span class="volume-value" id="volumeValue">80%</span>
      </div>

      <div class="button-group">
        <button class="btn btn-primary" id="fetchBtn">🎙️ Fetch Live News (2s)</button>
        <button class="btn btn-secondary" id="annotateBtn" disabled>✍️ Annotate Clip</button>
      </div>
      
      <div id="loadingIndicator" class="hidden" style="text-align: center; margin-top: 12px; color: #2C6E49;">
        <span class="fetch-indicator"></span> Fetching live stream...
      </div>
    </div>

    <div id="annotationSection" class="hidden">
      <div class="stream-card">
        <h3 style="margin-bottom: 16px;">Annotate Frames</h3>
        
        <button class="play-full-btn" id="playFullBtn">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="white">
            <path d="M8 5v14l11-7z"/>
          </svg>
          Play Full Audio
        </button>

        <div class="akshar-grid" id="aksharGrid"></div>
        
        <div class="multi-bar hidden" id="multiBar">
          <span class="multi-bar-label">0 segments selected</span>
          <button class="multi-bar-btn" id="playSelectedBtn">▶ Play selected</button>
          <button class="multi-bar-btn" id="clearSelectionBtn">✕ Clear</button>
        </div>
        
        <div class="frames-grid" id="framesGrid"></div>
        
        <div class="button-group">
          <button class="btn btn-primary" id="submitBtn">Submit Annotation</button>
          <button class="btn btn-secondary" id="cancelBtn">Cancel</button>
        </div>
      </div>
    </div>
  </div>
  
  <div id="messageArea"></div>
</div>

<script>
const BASE_PATH = "{{ base_path }}";
const CLIP_DURATION = 2;  // 2 seconds for live news chunks
const FRAME_SIZE_MS = 108;
const AKSHAR_SET = [
    "अ", "आ", "इ", "उ", "ए", "ओ",
    "क", "ख", "ग", "घ", "च", "छ", "ज", "झ",
    "ट", "ठ", "ड", "ढ", "त", "थ", "द", "ध",
    "प", "फ", "ब", "भ",
    "न", "म",
    "य", "र", "ल", "व",
    "स", "ह", "ं", "ँ", "ॉ", "०"
];

let currentUsername = '';
let currentLanguage = 'hi';
let currentAudio = null;
let currentAudioBlob = null;
let currentVolume = 0.8;
let audioContext = null;
let gainNode = null;
let currentPlayTimeout = null;
let audioUnlocked = false;
let currentFrames = [];
let selectedSegments = new Set();
let multiPlayQueue = [];
let multiPlayIndex = 0;
let multiPlayTimeout = null;
let activeFrameIndex = null;
let isFetching = false;

async function init() {
  await checkAuth();
  setupEventListeners();
  renderAksharSet();
  setupAudioUnlock();
  document.querySelector('.lang-btn[data-lang="hi"]').classList.add('selected');
}

async function checkAuth() {
  try {
    const r = await fetch(`${BASE_PATH}/api/current-user`);
    const d = await r.json();
    if (!d.logged_in) {
      window.location.href = `${BASE_PATH}/login`;
      return false;
    }
    currentUsername = d.username;
    document.getElementById('usernameDisplay').innerText = d.username;
    return true;
  } catch {
    window.location.href = `${BASE_PATH}/login`;
    return false;
  }
}

function setupAudioUnlock() {
  const h = () => { unlockAudio(); document.removeEventListener('touchstart', h); document.removeEventListener('click', h); };
  document.addEventListener('touchstart', h);
  document.addEventListener('click', h);
}

function unlockAudio() {
  if (audioUnlocked) return;
  if (audioContext && audioContext.state === 'suspended') {
    audioContext.resume().then(() => { audioUnlocked = true; }).catch(() => {});
  }
  if (currentAudio) {
    currentAudio.play().then(() => { currentAudio.pause(); currentAudio.currentTime = 0; }).catch(() => {});
  }
  audioUnlocked = true;
}

function initAudioContext() {
  if (!audioContext && currentAudio) {
    try {
      audioContext = new (window.AudioContext || window.webkitAudioContext)();
      const source = audioContext.createMediaElementSource(currentAudio);
      gainNode = audioContext.createGain();
      source.connect(gainNode);
      gainNode.connect(audioContext.destination);
      gainNode.gain.value = currentVolume;
    } catch (e) { console.warn('Web Audio init failed:', e); }
  }
}

function updateVolume(value) {
  currentVolume = value;
  document.getElementById('volumeValue').innerText = Math.round(value * 100) + '%';
  if (gainNode) gainNode.gain.value = value;
  if (currentAudio && !gainNode) currentAudio.volume = Math.min(value, 1.0);
}

function setupEventListeners() {
  document.querySelectorAll('.lang-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      currentLanguage = btn.dataset.lang;
      showMessage(`Language changed to ${btn.innerText}`, 'info');
      if (currentAudio) {
        currentAudio.pause();
        currentAudio.src = '';
      }
      document.getElementById('clipDuration').innerHTML = `📺 Select "${btn.innerText}" and fetch news`;
      document.getElementById('annotateBtn').disabled = true;
    });
  });
  
  document.getElementById('fetchBtn').addEventListener('click', fetchLiveNews);
  document.getElementById('annotateBtn').addEventListener('click', startAnnotation);
  document.getElementById('submitBtn').addEventListener('click', submitAnnotation);
  document.getElementById('cancelBtn').addEventListener('click', cancelAnnotation);
  document.getElementById('playFullBtn')?.addEventListener('click', playFullAudio);
  
  const playSelectedBtn = document.getElementById('playSelectedBtn');
  const clearSelectionBtn = document.getElementById('clearSelectionBtn');
  if (playSelectedBtn) playSelectedBtn.addEventListener('click', playSelectedSegments);
  if (clearSelectionBtn) clearSelectionBtn.addEventListener('click', clearSelection);
  
  const volumeSlider = document.getElementById('volumeSlider');
  if (volumeSlider) {
    volumeSlider.addEventListener('input', e => updateVolume(parseFloat(e.target.value)));
  }
  updateVolume(0.8);
}

function playFullAudio() {
  if (!currentAudio) { showMessage('No audio loaded. Fetch news first!', 'error'); return; }
  stopPlayback();
  currentAudio.currentTime = 0;
  currentAudio.play().catch(err => showMessage('Tap the play button first', 'info'));
}

function stopPlayback() {
  if (currentPlayTimeout) clearTimeout(currentPlayTimeout);
  if (multiPlayTimeout) clearTimeout(multiPlayTimeout);
  if (currentAudio && !currentAudio.paused) currentAudio.pause();
  document.querySelectorAll('.frame-card.playing').forEach(c => c.classList.remove('playing'));
}

function playSegmentAudio(startMs, endMs) {
  if (!currentAudio) return;
  const startSec = startMs / 1000;
  const durationSec = (endMs - startMs) / 1000;
  if (currentPlayTimeout) clearTimeout(currentPlayTimeout);
  
  const doPlay = () => {
    currentAudio.pause();
    currentAudio.currentTime = startSec;
    currentAudio.play().then(() => {
      currentPlayTimeout = setTimeout(() => {
        if (currentAudio && !currentAudio.paused) currentAudio.pause();
      }, durationSec * 1000);
    }).catch(() => {});
  };
  
  if (audioContext && audioContext.state === 'suspended') audioContext.resume().then(doPlay);
  else doPlay();
}

async function fetchLiveNews() {
  if (isFetching) return;
  
  isFetching = true;
  const fetchBtn = document.getElementById('fetchBtn');
  const loadingIndicator = document.getElementById('loadingIndicator');
  
  fetchBtn.disabled = true;
  loadingIndicator.classList.remove('hidden');
  showMessage(`Fetching live ${currentLanguage} news (2 sec)...`, 'info');
  document.getElementById('annotateBtn').disabled = true;
  
  try {
    const response = await fetch(`${BASE_PATH}/api/live-stream/fetch?lang=${currentLanguage}&duration=2`);
    
    if (!response.ok) {
      const errorData = await response.json();
      throw new Error(errorData.error || 'Failed to fetch news clip');
    }
    
    const data = await response.json();
    
    if (!data.success || !data.audio_blob) {
      throw new Error(data.error || 'No audio received');
    }
    
    const audioBlob = base64ToBlob(data.audio_blob, 'audio/wav');
    currentAudioBlob = audioBlob;
    const audioUrl = URL.createObjectURL(audioBlob);
    
    if (currentAudio) {
      currentAudio.pause();
      URL.revokeObjectURL(currentAudio.src);
    }
    currentAudio = document.getElementById('audioPlayer');
    currentAudio.src = audioUrl;
    currentAudio.load();
    
    const langNames = { hi: 'हिंदी', te: 'తెలుగు', ta: 'தமிழ்', bn: 'বাংলা', gu: 'ગુજરાતી', mr: 'मराठी' };
    document.getElementById('clipDuration').innerHTML = `📺 2 sec live news clip (${langNames[currentLanguage] || currentLanguage.toUpperCase()})`;
    document.getElementById('annotateBtn').disabled = false;
    showMessage(`Live news clip ready! 2 seconds. Click "Annotate Clip" to label.`, 'success');
    
  } catch (err) {
    console.error('Fetch error:', err);
    showMessage('Error fetching news: ' + err.message, 'error');
    document.getElementById('clipDuration').innerHTML = `⚠️ Failed to fetch. Try again!`;
  } finally {
    isFetching = false;
    fetchBtn.disabled = false;
    loadingIndicator.classList.add('hidden');
  }
}

function base64ToBlob(base64, mimeType) {
  const byteCharacters = atob(base64);
  const byteNumbers = new Array(byteCharacters.length);
  for (let i = 0; i < byteCharacters.length; i++) {
    byteNumbers[i] = byteCharacters.charCodeAt(i);
  }
  const byteArray = new Uint8Array(byteNumbers);
  return new Blob([byteArray], { type: mimeType });
}

function startAnnotation() {
  if (!currentAudioBlob) {
    showMessage('No clip to annotate. Fetch news first!', 'error');
    return;
  }
  
  const numFrames = Math.floor((CLIP_DURATION * 1000) / FRAME_SIZE_MS);
  currentFrames = [];
  for (let i = 0; i < numFrames; i++) {
    currentFrames.push({
      index: i,
      start_ms: i * FRAME_SIZE_MS,
      end_ms: (i + 1) * FRAME_SIZE_MS,
      text: ""
    });
  }
  
  renderAnnotationFrames();
  initAudioContext();
  document.getElementById('annotationSection').classList.remove('hidden');
  showMessage(`Ready! ${numFrames} frames to annotate. Click on each frame to play that segment.`, 'success');
}

function renderAksharSet() {
  const container = document.getElementById('aksharGrid');
  if (!container) return;
  container.innerHTML = '';
  AKSHAR_SET.forEach(akshar => {
    const span = document.createElement('span');
    span.className = 'akshar-item';
    span.textContent = akshar;
    span.onclick = () => insertAkshar(akshar);
    container.appendChild(span);
  });
}

function insertAkshar(akshar) {
  if (activeFrameIndex !== null && currentFrames[activeFrameIndex]) {
    const input = document.querySelector(`.frame-input[data-index="${activeFrameIndex}"]`);
    if (input) {
      let newText = (currentFrames[activeFrameIndex].text || '') + akshar;
      if (newText.length <= 4) {
        input.value = newText;
        currentFrames[activeFrameIndex].text = newText;
      } else {
        showMessage('Maximum 2 akshars per frame!', 'warning');
      }
    }
  }
}

function toggleSegmentSelection(frameIndex) {
  const card = document.querySelector(`.frame-card[data-frame-index="${frameIndex}"]`);
  if (!card) return;
  if (selectedSegments.has(frameIndex)) {
    selectedSegments.delete(frameIndex);
    card.classList.remove('selected');
  } else {
    selectedSegments.add(frameIndex);
    card.classList.add('selected');
  }
  updateMultiBar();
}

function updateMultiBar() {
  const bar = document.getElementById('multiBar');
  if (!bar) return;
  if (selectedSegments.size === 0) {
    bar.classList.add('hidden');
  } else {
    bar.classList.remove('hidden');
    bar.querySelector('.multi-bar-label').textContent = `${selectedSegments.size} segment${selectedSegments.size > 1 ? 's' : ''} selected`;
  }
}

function clearSelection() {
  selectedSegments.clear();
  document.querySelectorAll('.frame-card.selected').forEach(c => c.classList.remove('selected'));
  updateMultiBar();
}

function playSelectedSegments() {
  if (selectedSegments.size === 0 || !currentAudio) return;
  stopPlayback();
  multiPlayQueue = Array.from(selectedSegments).sort((a, b) => a - b);
  multiPlayIndex = 0;
  playNextInQueue();
}

function playNextInQueue() {
  if (multiPlayIndex >= multiPlayQueue.length) {
    document.querySelectorAll('.frame-card.playing').forEach(c => c.classList.remove('playing'));
    return;
  }
  const frameIndex = multiPlayQueue[multiPlayIndex];
  const frame = currentFrames[frameIndex];
  if (!frame) { multiPlayIndex++; playNextInQueue(); return; }

  document.querySelectorAll('.frame-card.playing').forEach(c => c.classList.remove('playing'));
  const card = document.querySelector(`.frame-card[data-frame-index="${frameIndex}"]`);
  if (card) card.classList.add('playing');

  playSegmentAudio(frame.start_ms, frame.end_ms);
  
  multiPlayTimeout = setTimeout(() => {
    multiPlayIndex++;
    playNextInQueue();
  }, (frame.end_ms - frame.start_ms) + 50);
}

function playSegmentByIndex(frameIndex) {
  if (!currentFrames || !currentAudio) return;
  const frame = currentFrames[frameIndex];
  if (!frame) return;
  
  stopPlayback();
  const card = document.querySelector(`.frame-card[data-frame-index="${frameIndex}"]`);
  playSegmentAudio(frame.start_ms, frame.end_ms);
  if (card) {
    card.classList.add('playing');
    setTimeout(() => card.classList.remove('playing'), (frame.end_ms - frame.start_ms));
  }
}

function renderAnnotationFrames() {
  const framesGrid = document.getElementById('framesGrid');
  framesGrid.innerHTML = '';
  
  currentFrames.forEach((frame, idx) => {
    const card = document.createElement('div');
    card.className = 'frame-card';
    card.setAttribute('data-frame-index', idx);
    
    const headerDiv = document.createElement('div');
    headerDiv.className = 'frame-header';
    headerDiv.innerHTML = `
      <span class="frame-label"><span class="sel-dot"></span> ${idx+1}</span>
      <span class="frame-time">${(frame.start_ms/1000).toFixed(2)}–${(frame.end_ms/1000).toFixed(2)}s</span>
    `;
    
    const input = document.createElement('input');
    input.type = 'text';
    input.className = 'frame-input';
    input.placeholder = 'Akshars (max 2)';
    input.value = frame.text || '';
    input.setAttribute('data-index', idx);
    
    input.addEventListener('focus', () => { activeFrameIndex = idx; });
    input.addEventListener('input', (e) => {
      let value = e.target.value;
      if (value.length > 4) {
        value = value.slice(0, 4);
        e.target.value = value;
        showMessage('Maximum 2 akshars per frame!', 'warning');
      }
      currentFrames[idx].text = value;
    });
    input.addEventListener('click', (e) => {
      e.stopPropagation();
      playSegmentByIndex(idx);
    });
    
    card.addEventListener('click', (e) => {
      if (e.target === input || input.contains(e.target)) return;
      toggleSegmentSelection(idx);
    });
    
    card.appendChild(headerDiv);
    card.appendChild(input);
    framesGrid.appendChild(card);
  });
}

function showSuccessModal(aksharCount) {
  // Remove any existing modal
  const existingModal = document.querySelector('.modal-overlay');
  if (existingModal) {
    existingModal.remove();
  }
  
  // Create modal overlay
  const modalOverlay = document.createElement('div');
  modalOverlay.className = 'modal-overlay';
  
  // Create modal content
  modalOverlay.innerHTML = `
    <div class="success-modal">
      <div class="success-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="20 6 9 17 4 12"></polyline>
        </svg>
      </div>
      <h3>✓ Submitted!</h3>
      <p>Your annotation has been successfully saved.</p>
      <div class="success-stats">
        <div class="stat-item">
          <span class="stat-label">Akshars Added</span>
          <span class="stat-value">${aksharCount}</span>
        </div>
        <div class="stat-item">
          <span class="stat-label">Duration</span>
          <span class="stat-value">${CLIP_DURATION} sec</span>
        </div>
        <div class="stat-item">
          <span class="stat-label">Language</span>
          <span class="stat-value">${currentLanguage.toUpperCase()}</span>
        </div>
      </div>
      <button class="modal-close-btn" onclick="this.closest('.modal-overlay').remove()">Continue</button>
    </div>
  `;
  
  document.body.appendChild(modalOverlay);
  
  // Close modal when clicking outside
  modalOverlay.addEventListener('click', (e) => {
    if (e.target === modalOverlay) {
      modalOverlay.remove();
    }
  });
  
  // Auto close after 3 seconds
  setTimeout(() => {
    if (modalOverlay && document.body.contains(modalOverlay)) {
      modalOverlay.remove();
    }
  }, 3000);
}

async function submitAnnotation() {
  if (!currentFrames || currentFrames.length === 0) {
    showMessage('No clip to submit', 'error');
    return;
  }
  
  const hasAnnotations = currentFrames.some(f => f.text && f.text.trim().length > 0);
  if (!hasAnnotations) {
    showMessage('Please add annotations to at least one frame before submitting', 'warning');
    return;
  }
  
  showMessage('Submitting...', 'info');
  document.getElementById('submitBtn').disabled = true;
  
  try {
    const formData = new FormData();
    formData.append('audio', currentAudioBlob, `live_${currentLanguage}_${Date.now()}.wav`);
    formData.append('duration', CLIP_DURATION);
    formData.append('language', currentLanguage);
    formData.append('frames', JSON.stringify(currentFrames));
    
    const response = await fetch(`${BASE_PATH}/api/live-stream/submit`, {
      method: 'POST',
      body: formData
    });
    
    const data = await response.json();
    if (data.success) {
      const aksharCount = data.akshar_count || currentFrames.filter(f => f.text && f.text.trim()).length;
      
      // Show beautiful success modal
      showSuccessModal(aksharCount);
      
      // Also show a brief toast message
      showMessage(`✓ Submitted! Added ${aksharCount} akshars`, 'success');
      
      cancelAnnotation();
      if (currentAudio) {
        currentAudio.pause();
        currentAudio.src = '';
      }
      document.getElementById('annotateBtn').disabled = true;
      document.getElementById('clipDuration').innerHTML = `📺 Select language and fetch news`;
    } else {
      throw new Error(data.error || 'Submission failed');
    }
  } catch (err) {
    showMessage('Error: ' + err.message, 'error');
  } finally {
    document.getElementById('submitBtn').disabled = false;
  }
}

function cancelAnnotation() {
  currentFrames = [];
  selectedSegments.clear();
  document.getElementById('annotationSection').classList.add('hidden');
  document.getElementById('framesGrid').innerHTML = '';
  showMessage('Annotation cancelled', 'info');
}

function showMessage(text, type) {
  const msgDiv = document.getElementById('messageArea');
  msgDiv.innerHTML = `<div class="message ${type}">${text}</div>`;
  setTimeout(() => {
    if (msgDiv.firstChild && msgDiv.firstChild.innerText === text) {
      msgDiv.innerHTML = '';
    }
  }, 3000);
}

init();
</script>
