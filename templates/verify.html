<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
<title>Verification Tool</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Helvetica, Arial, sans-serif;
  background: #F5F5F0;
  padding: 16px 0px;
  color: #1C1C1A;
  line-height: 1.4;
}

.container {
  max-width: 100%;
  margin: 0 auto;
  background: #FFFFFF;
  border-radius: 28px;
  box-shadow: 0 4px 20px rgba(0, 0, 0, 0.02), 0 2px 6px rgba(0, 0, 0, 0.05);
  overflow: hidden;
  padding: 20px 18px 28px;
}

.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 18px;
  flex-wrap: wrap;
  gap: 12px;
}

.header-left h2 {
  font-size: 1.65rem;
  font-weight: 590;
  letter-spacing: -0.02em;
  color: #1C1C1A;
  margin: 0;
}

.header-right {
  display: flex;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
}

.user-info {
  display: flex;
  align-items: center;
  gap: 12px;
  background: #F0F0EB;
  padding: 6px 14px;
  border-radius: 40px;
}

.user-name {
  font-weight: 550;
  font-size: 0.85rem;
  color: #2C6E49;
}

.logout-btn {
  background: none;
  border: none;
  color: #8E8E88;
  font-size: 0.75rem;
  cursor: pointer;
  padding: 4px 8px;
  font-weight: 500;
  margin: 0;
  width: auto;
}

.logout-btn:hover { color: #B13E3A; }

.annotation-link {
  background: #6B4E2E;
  border: none;
  color: white;
  font-size: 0.75rem;
  cursor: pointer;
  padding: 6px 14px;
  font-weight: 500;
  margin: 0;
  width: auto;
  border-radius: 40px;
  text-decoration: none;
  display: inline-flex;
  align-items: center;
  gap: 6px;
}

.annotation-link:hover { background: #5A3F24; }

.progress-section {
  margin-bottom: 12px;
}

.progress-bar {
  background: #EBEBE4;
  height: 6px;
  border-radius: 12px;
  overflow: hidden;
}

.progress-fill {
  background: #2C6E49;
  height: 100%;
  width: 0%;
  transition: width 0.25s ease-out;
  border-radius: 12px;
}

.stats-cards {
  display: flex;
  gap: 12px;
  margin: 12px 0 8px;
}

.stat-card {
  flex: 1;
  background: #F8F8F4;
  border-radius: 20px;
  padding: 12px;
  text-align: center;
  border: 1px solid #E9E9E2;
}

.stat-card-label {
  font-size: 0.7rem;
  color: #8E8E88;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 6px;
}

.stat-card-value {
  font-size: 1.3rem;
  font-weight: 600;
  color: #2C6E49;
}

.annotator-selector {
  background: #F8F8F4;
  border-radius: 20px;
  padding: 16px;
  margin: 12px 0;
  border: 1px solid #E9E9E2;
}

.annotator-selector label {
  font-weight: 590;
  font-size: 0.85rem;
  color: #2C6E49;
  display: block;
  margin-bottom: 10px;
}

.annotator-dropdown {
  width: 100%;
  padding: 12px 16px;
  font-size: 1rem;
  border: 1px solid #DCDCD4;
  border-radius: 40px;
  background: white;
  font-family: inherit;
  cursor: pointer;
  outline: none;
}

.load-btn {
  background: #2C6E49;
  color: white;
  margin-top: 12px;
  padding: 10px 20px;
  border-radius: 40px;
  font-size: 0.9rem;
  width: auto;
  flex: none;
}

.audio-wrapper { margin: 16px 0 18px; }

.full-audio-controls {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 12px;
  padding: 10px 16px;
  background: #2C6E49;
  border-radius: 48px;
  justify-content: space-between;
}

.play-full-btn {
  background: white;
  border: none;
  width: 48px;
  height: 48px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: all 0.2s ease;
  box-shadow: 0 2px 8px rgba(0,0,0,0.15);
}

.play-full-btn svg {
  width: 24px;
  height: 24px;
  fill: #2C6E49;
}

.play-full-btn.playing svg {
  fill: #B13E3A;
}

.full-audio-info {
  flex: 1;
  color: white;
  font-size: 0.85rem;
  font-weight: 500;
}

.progress-bar-full {
  flex: 2;
  height: 4px;
  background: rgba(255,255,255,0.3);
  border-radius: 4px;
  cursor: pointer;
  position: relative;
}

.progress-bar-full .progress-fill-full {
  width: 0%;
  height: 100%;
  background: white;
  border-radius: 4px;
  transition: width 0.1s linear;
}

.time-display {
  color: white;
  font-size: 0.75rem;
  font-family: monospace;
  min-width: 80px;
  text-align: center;
}

.volume-control {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-top: 12px;
  padding: 8px 12px;
  background: #F8F8F4;
  border-radius: 40px;
  border: 1px solid #E9E9E2;
}

.volume-icon { font-size: 1.2rem; line-height: 1; color: #6E6E68; }

.volume-slider {
  flex: 1;
  height: 4px;
  -webkit-appearance: none;
  appearance: none;
  background: #DCDCD4;
  border-radius: 4px;
  outline: none;
}

.volume-slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 18px;
  height: 18px;
  border-radius: 50%;
  background: #2C6E49;
  cursor: pointer;
}

.volume-value {
  min-width: 52px;
  font-size: 0.8rem;
  font-weight: 500;
  color: #2C6E49;
  text-align: right;
}

audio {
  width: 100%;
  border-radius: 44px;
  background: #F9F9F6;
  outline: none;
}

.current-file-card {
  background: #F8F8F4;
  border-radius: 24px;
  padding: 14px 18px;
  margin: 12px 0 16px;
  font-size: 0.9rem;
  border: 1px solid #E9E9E2;
  color: #2E2E2A;
}

.current-file-card strong {
  font-weight: 590;
  color: #1A4D3A;
}

/* 3-TIER GRID */
.three-tier-section {
  margin: 16px 0;
  border: 1px solid #eef2f8;
  border-radius: 20px;
  background: #ffffff;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
}

.tier-row {
  display: flex;
  gap: 10px;
  padding: 16px 20px;
  border-bottom: 1px solid #ecf3fa;
  background: white;
  min-width: min-content;
}

.tier-row:last-child { border-bottom: none; }

.tier-header {
  white-space: nowrap;
  padding: 10px 12px;
  background: #EBF2EA;
  border-radius: 16px;
  font-size: 0.75rem;
  font-weight: 550;
  color: #2C6E49;
  text-align: center;
  min-width: 80px;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-right: 10px;
}

.cell-216, .cell-108, .cell-54 {
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  transition: all 0.1s;
  background: white;
}

.cell-216 {
  flex: 0 0 370px;
  min-width: 370px;
  border: 2px solid #d1e0f0;
  border-radius: 16px;
  padding: 16px 10px;
}

.cell-108 {
  flex: 0 0 180px;
  min-width: 180px;
  border: 2px solid #e2edf7;
  border-radius: 14px;
  padding: 14px 8px;
}

.cell-54 {
  flex: 0 0 85px;
  min-width: 85px;
  border: 1.5px solid #e2e8f0;
  border-radius: 12px;
  padding: 12px 4px;
}

.cell-216.selected, .cell-108.selected, .cell-54.selected {
  background: #eff6ff;
  border-color: #3b82f6;
  box-shadow: 0 0 0 2px rgba(59,130,246,0.2);
}

.cell-216.playing, .cell-108.playing, .cell-54.playing {
  background: #e6f7ec;
  border-color: #10b981;
  animation: pulse 0.2s ease;
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.7; }
}

.time-label {
  font-size: 10px;
  background: #f1f5f9;
  padding: 3px 10px;
  border-radius: 30px;
  color: #334155;
  font-weight: 500;
  white-space: nowrap;
}

.grid-input {
  width: 100%;
  text-align: center;
  background: #fafcff;
  border: 1.5px solid #e2e8f0;
  border-radius: 10px;
  font-weight: 600;
  font-family: monospace;
  transition: border-color 0.15s, background 0.15s;
  cursor: text;
}

.cell-54 .grid-input { font-size: 0.9rem; padding: 8px 2px; }
.cell-108 .grid-input { font-size: 1rem; padding: 10px 4px; }
.cell-216 .grid-input { font-size: 1.2rem; padding: 12px 6px; }

.grid-input:focus {
  outline: none;
  border-color: #3b82f6;
  background: white;
  box-shadow: 0 0 0 2px rgba(59,130,246,0.1);
}

.speed-control {
  display: flex;
  gap: 8px;
  margin-top: 12px;
  justify-content: center;
}

.speed-btn {
  padding: 6px 16px;
  border-radius: 30px;
  border: 1.5px solid #cbd5e1;
  background: white;
  cursor: pointer;
  font-size: 13px;
  font-weight: 500;
}

.speed-btn.active {
  background: #2C6E49;
  border-color: #2C6E49;
  color: white;
}

.multi-bar {
  display: none;
  align-items: center;
  justify-content: space-between;
  background: #1A4D3A;
  color: #fff;
  border-radius: 40px;
  padding: 10px 16px;
  margin: 16px 0;
  gap: 10px;
  font-size: 0.82rem;
}

.multi-bar.visible { display: flex; }
.multi-bar-label { flex: 1; }
.multi-bar-btn {
  background: rgba(255,255,255,0.15);
  border: none;
  color: #fff;
  font-size: 0.78rem;
  padding: 6px 14px;
  border-radius: 30px;
  cursor: pointer;
}
.multi-bar-btn.play {
  background: #FFFFFF;
  color: #1A4D3A;
}

.akshar-set-section {
  margin: 8px 0 20px;
  background: #F8F8F4;
  border-radius: 20px;
  padding: 12px 16px;
  border: 1px solid #E9E9E2;
}

.akshar-title {
  font-weight: 590;
  font-size: 0.75rem;
  color: #2C6E49;
  margin-bottom: 10px;
}

.akshar-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}

.akshar-item {
  background: #FFFFFF;
  border: 1px solid #E5E5DE;
  border-radius: 12px;
  padding: 8px 12px;
  font-size: 1rem;
  font-weight: 500;
  color: #1C1C1A;
  min-width: 42px;
  text-align: center;
  font-family: monospace;
  cursor: grab;
  user-select: none;
}

.akshar-item:active { cursor: grabbing; transform: scale(0.95); }

.button-group {
  display: flex;
  gap: 14px;
  margin: 16px 0;
}

.btn {
  flex: 1;
  padding: 14px 8px;
  border: none;
  border-radius: 44px;
  font-size: 1rem;
  font-weight: 520;
  cursor: pointer;
  background: #F2F2EC;
  color: #2C2C2A;
}

.btn-verify {
  background: #2C6E49;
  color: white;
}

.btn-reject {
  background: #B13E3A;
  color: white;
}

.message-area { margin-top: 12px; }
.message {
  padding: 12px;
  border-radius: 20px;
  text-align: center;
  font-size: 0.85rem;
}
.message.success { background: #E0F0E6; color: #1E5631; }
.message.error   { background: #FDE9E7; color: #B13E3A; }
.message.info    { background: #E9EDF2; color: #2B4F6C; }

.loading {
  text-align: center;
  padding: 48px 20px;
  font-size: 1rem;
  color: #6E6E68;
}

.completion-box { text-align: center; padding: 36px 16px; }
.completion-box h2 {
  font-size: 1.9rem;
  font-weight: 560;
  color: #2C6E49;
  margin-bottom: 12px;
}
.completion-box button {
  background: #2C6E49;
  color: white;
  max-width: 220px;
  margin: 16px auto 0;
}

.edit-hint {
  text-align: center;
  font-size: 0.75rem;
  color: #2C6E49;
  margin: 8px 0;
  padding: 6px;
  background: #EBF2EA;
  border-radius: 20px;
}

@media (max-width: 560px) {
  .container { padding: 10px; }
  .tier-row { gap: 6px; padding: 10px; }
  .tier-header { min-width: 45px; font-size: 0.6rem; padding: 5px 4px; margin-right: 6px; }
  .cell-216 { flex: 0 0 180px; min-width: 180px; padding: 10px 6px; }
  .cell-108 { flex: 0 0 90px; min-width: 90px; padding: 8px 4px; }
  .cell-54 { flex: 0 0 50px; min-width: 50px; padding: 6px 3px; }
  .cell-54 .grid-input { font-size: 0.7rem; padding: 4px 1px; }
  .cell-108 .grid-input { font-size: 0.75rem; padding: 6px 2px; }
  .cell-216 .grid-input { font-size: 0.8rem; padding: 8px 3px; }
  .time-label { font-size: 7px; padding: 2px 4px; }
  .header { flex-direction: column; align-items: stretch; }
  .speed-btn { padding: 4px 10px; font-size: 10px; }
  .akshar-item { padding: 5px 8px; font-size: 0.8rem; min-width: 32px; }
  .btn { padding: 10px 6px; font-size: 0.8rem; }
}
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <div class="header-left"><h2>🔍 Verification Tool</h2></div>
    <div class="header-right">
      <a href="{{ url_for_path('') }}" class="annotation-link">Annotate</a>
      <div class="user-info">
        <span class="user-name" id="verifierName">Verifier</span>
        <button class="logout-btn" onclick="logout()">Sign out</button>
      </div>
    </div>
  </div>

  <div class="progress-section">
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  </div>

  <div class="stats-cards">
    <div class="stat-card"><div class="stat-card-label">Verified</div><div class="stat-card-value" id="verifiedCount">0</div></div>
    <div class="stat-card"><div class="stat-card-label">Remaining</div><div class="stat-card-value" id="remainingCount">0</div></div>
    <div class="stat-card"><div class="stat-card-label">Total</div><div class="stat-card-value" id="totalCount">0</div></div>
  </div>

  <div class="annotator-selector">
    <label>👤 Select Annotator to Verify</label>
    <select id="annotatorSelect" class="annotator-dropdown"><option value="">-- Select Annotator --</option></select>
    <button id="loadAnnotatorFiles" class="load-btn">📂 Load Files</button>
  </div>

  <div id="content"><div class="loading">Select an annotator and click "Load Files" to start verification</div></div>
</div>

<script>
const BASE_PATH = "{{ base_path }}";
const AKSHAR_SET = ["अ","आ","इ","उ","ए","ओ","क","ख","ग","घ","च","छ","ज","झ","ट","ठ","ड","ढ","त","थ","द","ध","प","फ","ब","भ","न","म","य","ر","ل","व","س","ह","०"];

let currentData = null, currentAudio = null, currentPlayTimeout = null, audioContext = null, gainNode = null;
let currentVolume = 1.0, audioUnlocked = false, playbackSpeed = 1.0, isFullAudioPlaying = false, fullAudioProgressInterval = null;
let framesData = { tier_216: [], tier_108: [], tier_54: [] };
let selectedSegments = { tier_216: new Set(), tier_108: new Set(), tier_54: new Set() };
let multiPlayQueue = [], multiPlayIndex = 0, multiPlayTimeout = null;
let currentAnnotator = null, annotatorFilesList = [];

function unlockAudio() {
  if (audioUnlocked) return;
  if (audioContext?.state === 'suspended') audioContext.resume().then(() => audioUnlocked = true).catch(()=>{});
  if (currentAudio) currentAudio.play().then(()=>{ currentAudio.pause(); currentAudio.currentTime=0; audioUnlocked=true; }).catch(()=>{});
}

function setupAudioUnlock() {
  const h = () => { unlockAudio(); document.removeEventListener('touchstart',h); document.removeEventListener('click',h); };
  document.addEventListener('touchstart',h); document.addEventListener('click',h);
}

function initAudioContext() {
  if (!audioContext && currentAudio) {
    try {
      audioContext = new (window.AudioContext||window.webkitAudioContext)();
      const source = audioContext.createMediaElementSource(currentAudio);
      gainNode = audioContext.createGain();
      source.connect(gainNode);
      gainNode.connect(audioContext.destination);
      gainNode.gain.value = currentVolume;
    } catch(e) { console.warn('Web Audio init failed:', e); }
  }
}

function updateVolume(v) {
  currentVolume = v;
  const span = document.getElementById('volumeValue');
  if (span) span.innerText = Math.round(v*100)+'%';
  if (gainNode) gainNode.gain.value = v;
  if (currentAudio && !gainNode) currentAudio.volume = Math.min(v,1);
}

function setPlaybackSpeed(speed) {
  playbackSpeed = speed;
  if (currentAudio) currentAudio.playbackRate = speed;
  document.querySelectorAll('.speed-btn').forEach(btn => {
    if (parseFloat(btn.dataset.speed) === speed) btn.classList.add('active');
    else btn.classList.remove('active');
  });
  showMessage(`Speed: ${speed}x`, 'info');
}

function playSegmentAudio(startMs,endMs) {
  if (!currentAudio) return;
  stopFullAudioPlayback();
  const startSec=startMs/1000, durationSec=(endMs-startMs)/1000;
  if(currentPlayTimeout) clearTimeout(currentPlayTimeout);
  const doPlay=()=>{
    currentAudio.pause();
    currentAudio.currentTime=startSec;
    currentAudio.play().then(()=>{
      currentPlayTimeout=setTimeout(()=>{ if(currentAudio && !currentAudio.paused) currentAudio.pause(); }, durationSec*1000/playbackSpeed);
    }).catch(()=>{});
  };
  if(audioContext?.state==='suspended') audioContext.resume().then(doPlay);
  else doPlay();
}

function stopPlayback() {
  if(currentPlayTimeout) clearTimeout(currentPlayTimeout);
  if(multiPlayTimeout) clearTimeout(multiPlayTimeout);
  if(currentAudio && !currentAudio.paused) currentAudio.pause();
  document.querySelectorAll('.cell-216.playing,.cell-108.playing,.cell-54.playing').forEach(c=>c.classList.remove('playing'));
}

function toggleFullAudioPlayback() {
  if(!currentAudio) return;
  if(isFullAudioPlaying) stopFullAudioPlayback();
  else startFullAudioPlayback();
}

function startFullAudioPlayback() {
  if(!currentAudio) return;
  if(currentPlayTimeout) clearTimeout(currentPlayTimeout);
  if(multiPlayTimeout) clearTimeout(multiPlayTimeout);
  const doPlay=()=>{
    currentAudio.playbackRate=playbackSpeed;
    currentAudio.play().then(()=>{ isFullAudioPlaying=true; updatePlayButtonUI(true); startProgressTracking(); }).catch(err=>console.log(err));
  };
  if(audioContext?.state==='suspended') audioContext.resume().then(doPlay);
  else doPlay();
}

function stopFullAudioPlayback() {
  if(!currentAudio) return;
  currentAudio.pause();
  isFullAudioPlaying=false;
  updatePlayButtonUI(false);
  stopProgressTracking();
}

function updatePlayButtonUI(isPlaying) {
  const btn=document.getElementById('playFullBtn');
  if(!btn) return;
  if(isPlaying){
    btn.classList.add('playing');
    btn.innerHTML='<svg viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>';
  } else {
    btn.classList.remove('playing');
    btn.innerHTML='<svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>';
  }
}

function startProgressTracking() {
  if(fullAudioProgressInterval) clearInterval(fullAudioProgressInterval);
  fullAudioProgressInterval=setInterval(()=>{
    if(!currentAudio || currentAudio.paused){
      if(isFullAudioPlaying){ isFullAudioPlaying=false; updatePlayButtonUI(false); }
      stopProgressTracking();
      return;
    }
    const ct=currentAudio.currentTime, dur=currentAudio.duration||0;
    const percent=(ct/dur)*100;
    const fill=document.getElementById('progressFillFull');
    if(fill) fill.style.width=percent+'%';
    const td=document.getElementById('timeDisplay');
    if(td){
      const cm=Math.floor(ct/60), cs=Math.floor(ct%60);
      const dm=Math.floor(dur/60), ds=Math.floor(dur%60);
      td.textContent=`${cm}:${cs.toString().padStart(2,'0')} / ${dm}:${ds.toString().padStart(2,'0')}`;
    }
    if(ct>=dur) stopFullAudioPlayback();
  },100);
}

function stopProgressTracking() {
  if(fullAudioProgressInterval){ clearInterval(fullAudioProgressInterval); fullAudioProgressInterval=null; }
}

function seekToPosition(e) {
  if(!currentAudio) return;
  const bar=document.getElementById('progressBarFull');
  if(!bar) return;
  const rect=bar.getBoundingClientRect();
  const x=e.touches?e.touches[0].clientX:e.clientX;
  const clickX=x-rect.left, width=rect.width;
  const percent=clickX/width;
  currentAudio.currentTime=percent*(currentAudio.duration||0);
}

function playCellAudio(tier,idx){
  const frame=framesData[tier][idx];
  if(!frame) return;
  playSegmentAudio(frame.start_ms,frame.end_ms);
  const cellClass=tier==='tier_216'?'cell-216':(tier==='tier_108'?'cell-108':'cell-54');
  const cell=document.querySelector(`.${cellClass}[data-idx="${idx}"]`);
  if(cell){ cell.classList.add('playing'); setTimeout(()=>cell.classList.remove('playing'),300); }
}

function toggleSegmentSelection(tier,idx){
  const cellClass=tier==='tier_216'?'cell-216':(tier==='tier_108'?'cell-108':'cell-54');
  const cell=document.querySelector(`.${cellClass}[data-idx="${idx}"]`);
  if(!cell) return;
  if(selectedSegments[tier].has(idx)){
    selectedSegments[tier].delete(idx);
    cell.classList.remove('selected');
  } else {
    selectedSegments[tier].add(idx);
    cell.classList.add('selected');
  }
  updateMultiBar();
}

function updateMultiBar(){
  const bar=document.getElementById('multiBar');
  if(!bar) return;
  const total=selectedSegments.tier_216.size+selectedSegments.tier_108.size+selectedSegments.tier_54.size;
  if(total===0) bar.classList.remove('visible');
  else {
    bar.classList.add('visible');
    bar.querySelector('.multi-bar-label').textContent=`${total} segment${total>1?'s':''} selected`;
  }
}

function clearSelection(){
  selectedSegments.tier_216.clear();
  selectedSegments.tier_108.clear();
  selectedSegments.tier_54.clear();
  document.querySelectorAll('.cell-216.selected,.cell-108.selected,.cell-54.selected').forEach(c=>c.classList.remove('selected'));
  updateMultiBar();
}

function playSelectedSegments(){
  let all=[];
  for(let tier of ['tier_216','tier_108','tier_54']){
    for(let idx of selectedSegments[tier]) all.push({tier,index:idx});
  }
  if(all.length===0 || !currentAudio) return;
  stopPlayback(); stopFullAudioPlayback();
  all.sort((a,b)=>framesData[a.tier][a.index].start_ms - framesData[b.tier][b.index].start_ms);
  multiPlayQueue=all; multiPlayIndex=0;
  playNextInQueue();
}

function playNextInQueue(){
  if(multiPlayIndex>=multiPlayQueue.length){
    document.querySelectorAll('.cell-216.playing,.cell-108.playing,.cell-54.playing').forEach(c=>c.classList.remove('playing'));
    return;
  }
  const item=multiPlayQueue[multiPlayIndex];
  const frame=framesData[item.tier][item.index];
  if(!frame){ multiPlayIndex++; playNextInQueue(); return; }
  const cellClass=item.tier==='tier_216'?'cell-216':(item.tier==='tier_108'?'cell-108':'cell-54');
  document.querySelectorAll(`.${cellClass}.playing`).forEach(c=>c.classList.remove('playing'));
  const cell=document.querySelector(`.${cellClass}[data-idx="${item.index}"]`);
  if(cell) cell.classList.add('playing');
  playSegmentAudio(frame.start_ms,frame.end_ms);
  multiPlayTimeout=setTimeout(()=>{ multiPlayIndex++; playNextInQueue(); }, (frame.end_ms-frame.start_ms)/playbackSpeed);
}

// ========== FIXED: generateAllTiersFromFrames - properly splits text between 54ms cells ==========
function generateAllTiersFromFrames(frames, durationMs){
  if(!frames || frames.length === 0){
    frames = [];
    const num = Math.ceil(durationMs / 108);
    for(let i=0;i<num;i++){
      frames.push({start_ms:i*108, end_ms:Math.min((i+1)*108,durationMs), text:""});
    }
  }
  
  const tier108 = frames.map((f,idx)=>({index:idx, start_ms:f.start_ms, end_ms:f.end_ms, text:f.text||""}));
  
  const tier216 = [];
  for(let i=0;i<frames.length;i+=2){
    const start = frames[i].start_ms;
    const end = i+1 < frames.length ? frames[i+1].end_ms : frames[i].end_ms;
    const text1 = frames[i].text||"";
    const text2 = i+1 < frames.length ? (frames[i+1].text||"") : "";
    tier216.push({index:tier216.length, start_ms:start, end_ms:end, text:(text1+text2).slice(0,4)});
  }
  
  const tier54 = [];
  for(let i = 0; i < frames.length; i++){
    const f = frames[i];
    const half = (f.end_ms - f.start_ms) / 2;
    const text = f.text || "";
    
    // Split the text between the two 54ms cells
    // For 4 akshars: first 2 go to first cell, next 2 to second cell
    // For less than 2 akshars: all go to first cell
    const splitPoint = Math.min(2, text.length);
    const firstHalf = text.substring(0, splitPoint);
    const secondHalf = text.substring(splitPoint, 4);
    
    tier54.push({
      index: tier54.length, 
      start_ms: f.start_ms, 
      end_ms: f.start_ms + half, 
      text: firstHalf
    });
    tier54.push({
      index: tier54.length, 
      start_ms: f.start_ms + half, 
      end_ms: f.end_ms, 
      text: secondHalf
    });
  }
  
  return {tier_216:tier216, tier_108:tier108, tier_54:tier54};
}

// ========== UPDATED: loadDataIntoTiers - uses existing 3-tier data if available ==========
function loadDataIntoTiers(audioData){
  // Check if we already have 3-tier data from the server
  if (audioData.frames_54 && audioData.frames_108 && audioData.frames_216) {
    // Use existing 3-tier data directly - no generation needed
    framesData = {
      tier_216: audioData.frames_216.map((f, idx) => ({...f, index: idx})),
      tier_108: audioData.frames_108.map((f, idx) => ({...f, index: idx})),
      tier_54: audioData.frames_54.map((f, idx) => ({...f, index: idx}))
    };
  } else {
    // Generate from frames_108 or frames
    let frames = audioData.frames_108 || audioData.frames || [];
    const durationMs = audioData.duration_ms || 5000;
    const allTiers = generateAllTiersFromFrames(frames, durationMs);
    framesData = allTiers;
  }
  
  renderThreeTierGrid();
  
  if(currentAudio){
    currentAudio.pause();
    const audioUrl = `${BASE_PATH}/mobile-dataset/${audioData.wav_file}`;
    currentAudio.src = audioUrl;
    currentAudio.load();
    initAudioContext();
    updateVolume(currentVolume);
    setPlaybackSpeed(playbackSpeed);
    stopFullAudioPlayback();
  }
}

function renderThreeTierGrid(){
  const r216=document.getElementById('tier216Row');
  const r108=document.getElementById('tier108Row');
  const r54=document.getElementById('tier54Row');
  if(!r216) return;
  r216.innerHTML=''; r108.innerHTML=''; r54.innerHTML='';
  
  const h216=document.createElement('div'); h216.className='tier-header'; h216.innerText='वायु (216ms)'; r216.appendChild(h216);
  const h108=document.createElement('div'); h108.className='tier-header'; h108.innerText='अग्नि (108ms)'; r108.appendChild(h108);
  const h54=document.createElement('div'); h54.className='tier-header'; h54.innerText='आकाश (54ms)'; r54.appendChild(h54);
  
  framesData.tier_216.forEach((f,i)=>{ r216.appendChild(createCell(f,i,'216')); });
  framesData.tier_108.forEach((f,i)=>{ r108.appendChild(createCell(f,i,'108')); });
  framesData.tier_54.forEach((f,i)=>{ r54.appendChild(createCell(f,i,'54')); });
}

function createCell(frame,idx,tier){
  const div=document.createElement('div');
  div.className=`cell-${tier}`;
  div.setAttribute('data-idx',idx);
  div.setAttribute('data-tier',`tier_${tier}`);
  
  const timeSpan=document.createElement('div');
  timeSpan.className='time-label';
  timeSpan.innerText=`${(frame.start_ms/1000).toFixed(2)}s`;
  
  const input=document.createElement('input');
  input.type='text';
  input.className='grid-input';
  input.value=frame.text||'';
  input.setAttribute('data-idx',idx);
  input.setAttribute('data-tier',`tier_${tier}`);
  const maxLen=tier==='216'?4:(tier==='108'?4:2);
  if(maxLen) input.setAttribute('maxlength',maxLen);
  
  input.addEventListener('input',(e)=>{
    let val=e.target.value;
    if(maxLen && val.length>maxLen) val=val.slice(0,maxLen);
    e.target.value=val;
    framesData[`tier_${tier}`][idx].text=val;
  });
  
  div.appendChild(timeSpan);
  div.appendChild(input);
  
  div.addEventListener('click',(e)=>{ if(e.target===input) return; playCellAudio(`tier_${tier}`,idx); });
  input.addEventListener('click',(e)=>{ e.stopPropagation(); playCellAudio(`tier_${tier}`,idx); });
  
  let pressTimer=null;
  div.addEventListener('touchstart',(e)=>{
    if(e.target===input) return;
    pressTimer=setTimeout(()=>{ toggleSegmentSelection(`tier_${tier}`,idx); if(window.navigator?.vibrate) window.navigator.vibrate(50); pressTimer=null; },500);
  });
  div.addEventListener('touchend',()=>{ if(pressTimer){ clearTimeout(pressTimer); pressTimer=null; } });
  div.addEventListener('touchmove',()=>{ if(pressTimer){ clearTimeout(pressTimer); pressTimer=null; } });
  div.addEventListener('mousedown',(e)=>{ if(e.target===input) return; toggleSegmentSelection(`tier_${tier}`,idx); });
  div.addEventListener('contextmenu',(e)=>{ e.preventDefault(); return false; });
  
  return div;
}

async function logout(){
  await fetch(`${BASE_PATH}/verify/api/logout`,{method:'POST'});
  window.location.href=`${BASE_PATH}/verify/login`;
}

async function loadVerificationProgress(){
  try{
    const r=await fetch(`${BASE_PATH}/verify/progress`);
    if(r.status===401){ window.location.href=`${BASE_PATH}/verify/login`; return; }
    const d=await r.json();
    document.getElementById('verifiedCount').innerText=d.verified||0;
    document.getElementById('remainingCount').innerText=d.remaining||0;
    document.getElementById('totalCount').innerText=d.total||0;
    document.getElementById('progressFill').style.width=(d.percent||0)+'%';
  }catch(err){ console.warn(err); }
}

async function loadAnnotators(){
  try{
    const r=await fetch(`${BASE_PATH}/verify/api/annotators`);
    if(r.status===401){ window.location.href=`${BASE_PATH}/verify/login`; return; }
    const data=await r.json();
    const select=document.getElementById('annotatorSelect');
    select.innerHTML='<option value="">-- Select Annotator --</option>';
    data.annotators.forEach(a=>{ const opt=document.createElement('option'); opt.value=a; opt.textContent=a; select.appendChild(opt); });
  }catch(err){ console.error(err); }
}

document.getElementById('loadAnnotatorFiles').addEventListener('click',async()=>{
  const select=document.getElementById('annotatorSelect');
  const annotator=select.value;
  if(!annotator){ showMessage('Please select an annotator first','error'); return; }
  currentAnnotator=annotator;
  showMessage(`Loading files for ${annotator}...`,'info');
  try{
    const r=await fetch(`${BASE_PATH}/verify/api/annotator-files?annotator=${encodeURIComponent(annotator)}`);
    if(r.status===401){ window.location.href=`${BASE_PATH}/verify/login`; return; }
    const data=await r.json();
    if(data.files && data.files.length>0){
      annotatorFilesList=data.files;
      showMessage(`Found ${data.files.length} files for ${annotator}`,'success');
      await loadSpecificFile(annotatorFilesList[0]);
    } else {
      showMessage(`No pending files for ${annotator}`,'info');
      document.getElementById('content').innerHTML='<div class="loading">No files to verify for this annotator</div>';
    }
  }catch(err){ showMessage('Error: '+err,'error'); }
});

async function loadSpecificFile(jsonFile){
  document.getElementById('content').innerHTML='<div class="loading">Loading file...</div>';
  if(audioContext){ await audioContext.close(); audioContext=null; gainNode=null; }
  audioUnlocked=false;
  selectedSegments={tier_216:new Set(),tier_108:new Set(),tier_54:new Set()};
  try{
    const r=await fetch(`${BASE_PATH}/verify/api/get-file/${encodeURIComponent(jsonFile)}?annotator=${encodeURIComponent(currentAnnotator)}`);
    if(r.status===401){ window.location.href=`${BASE_PATH}/verify/login`; return; }
    const d=await r.json();
    if(d.error){ showErrorScreen(d.error); return; }
    currentData=d;
    
    if(currentAudio){
      currentAudio.pause();
      currentAudio.src='';
    } else {
      currentAudio = new Audio();
      currentAudio.crossOrigin = "anonymous";
      setupAudioUnlock();
    }
    
    loadDataIntoTiers(d);
    renderUI();
  }catch(err){ showErrorScreen('Connection issue: '+err); }
}

function showErrorScreen(msg){
  document.getElementById('content').innerHTML=`<div class="message error" style="margin-top:20px;">Error: ${msg}</div><div class="button-group" style="margin-top:20px;"><button class="btn-verify" onclick="location.reload()">Go Back</button></div>`;
}

function renderUI(){
  const sentDisplay=currentData.sentence?`<div><strong>Sentence:</strong> ${escapeHtml(currentData.sentence)}</div>`:'';
  
  document.getElementById('content').innerHTML=`
    <div class="audio-wrapper">
      <div class="full-audio-controls">
        <button id="playFullBtn" class="play-full-btn"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></button>
        <div class="full-audio-info"><span>Full Audio</span></div>
        <div id="progressBarFull" class="progress-bar-full"><div id="progressFillFull" class="progress-fill-full"></div></div>
        <div id="timeDisplay" class="time-display">0:00 / 0:00</div>
      </div>
      <div class="volume-control"><span class="volume-icon">🔊</span><input type="range" id="volumeSlider" class="volume-slider" min="0" max="1" step="0.01" value="1"><span id="volumeValue" class="volume-value">100%</span></div>
      <div class="speed-control"><button class="speed-btn" data-speed="0.5">0.5x</button><button class="speed-btn active" data-speed="1">1x</button><button class="speed-btn" data-speed="1.5">1.5x</button><button class="speed-btn" data-speed="2">2x</button></div>
      <div class="current-file-card"><div><strong>File:</strong> ${currentData.json_file}</div><div><strong>Word:</strong> ${currentData.word||'—'}</div>${sentDisplay}<div style="margin-top:8px;"><strong>Original Annotator:</strong> ${currentData.submitted_by||'unknown'}</div><div style="margin-top:4px;"><strong>Progress:</strong> ${annotatorFilesList.indexOf(currentData.json_file)+1} of ${annotatorFilesList.length} files</div></div>
    </div>
    <div class="three-tier-section"><div class="tier-row tier-row-216" id="tier216Row"></div><div class="tier-row tier-row-108" id="tier108Row"></div><div class="tier-row tier-row-54" id="tier54Row"></div></div>
    <div class="edit-hint">✏️ <strong>Verifiers can edit:</strong> Click any cell → Type to edit | Drag & drop akshars below</div>
    <div id="multiBar" class="multi-bar"><span class="multi-bar-label">0 segments selected</span><button class="multi-bar-btn play">▶ Play Selected</button><button class="multi-bar-btn">Clear</button></div>
    <div class="akshar-set-section"><div class="akshar-title">Drag & drop akshars to edit cells</div><div class="akshar-grid" id="aksharGrid"></div></div>
    <div class="button-group"><button class="btn btn-verify" id="verifyBtn">✅ Verify & Save</button><button class="btn btn-reject" id="rejectBtn">❌ Reject & Delete</button></div>
    <div id="messageArea" class="message-area"></div>`;
  
  // Re-attach event listeners
  const playBtn=document.getElementById('playFullBtn');
  if(playBtn) playBtn.onclick=toggleFullAudioPlayback;
  
  const progressBar=document.getElementById('progressBarFull');
  if(progressBar){
    progressBar.onclick=seekToPosition;
    progressBar.ontouchstart=seekToPosition;
  }
  
  const volumeSlider=document.getElementById('volumeSlider');
  if(volumeSlider) volumeSlider.oninput=(e)=>updateVolume(parseFloat(e.target.value));
  
  document.querySelectorAll('.speed-btn').forEach(btn=>{
    btn.onclick=()=>setPlaybackSpeed(parseFloat(btn.dataset.speed));
  });
  
  const playSelectedBtn=document.querySelector('#multiBar .play');
  if(playSelectedBtn) playSelectedBtn.onclick=playSelectedSegments;
  
  const clearBtn=document.querySelector('#multiBar .clear');
  if(clearBtn) clearBtn.onclick=clearSelection;
  
  const aksharGrid=document.getElementById('aksharGrid');
  AKSHAR_SET.forEach(akshar=>{
    const span=document.createElement('span');
    span.className='akshar-item';
    span.textContent=akshar;
    span.setAttribute('draggable','true');
    span.setAttribute('data-akshar',akshar);
    span.ondragstart=(e)=>{ e.dataTransfer.setData('text/plain',akshar); e.dataTransfer.effectAllowed='copy'; };
    span.onclick=()=>{
      const active=document.activeElement;
      if(active && active.tagName==='INPUT' && active.classList.contains('grid-input')){
        const start=active.selectionStart, end=active.selectionEnd, val=active.value;
        const tier=active.getAttribute('data-tier');
        let maxLen=tier==='tier_54'?2:4;
        if(val.length<maxLen){
          active.value=val.substring(0,start)+akshar+val.substring(end);
          active.dispatchEvent(new Event('input',{bubbles:true}));
          active.focus();
          showMessage(`Added "${akshar}"`,'success');
        } else showMessage('Maximum characters reached!','warning');
      } else showMessage('Click on a grid cell first','info');
    };
    aksharGrid.appendChild(span);
  });
  
  document.ondragover=(e)=>e.preventDefault();
  document.ondrop=(e)=>{
    e.preventDefault();
    const t=e.target;
    if(t && t.tagName==='INPUT' && t.classList.contains('grid-input')){
      const akshar=e.dataTransfer.getData('text/plain');
      if(akshar){
        const start=t.selectionStart, end=t.selectionEnd, val=t.value;
        const tier=t.getAttribute('data-tier');
        let maxLen=tier==='tier_54'?2:4;
        if(val.length<maxLen){
          t.value=val.substring(0,start)+akshar+val.substring(end);
          t.dispatchEvent(new Event('input',{bubbles:true}));
          t.focus();
          showMessage(`Added "${akshar}"`,'success');
        } else showMessage('Maximum characters reached!','warning');
      }
    }
  };
  
  document.getElementById('verifyBtn').onclick=()=>submitVerification('verify');
  document.getElementById('rejectBtn').onclick=()=>submitVerification('reject');
  
  // Re-render grid after UI is built
  renderThreeTierGrid();
}

function escapeHtml(t){ if(!t) return ''; const d=document.createElement('div'); d.textContent=t; return d.innerHTML; }

function showMessage(text,type){
  const div=document.getElementById('messageArea');
  if(!div) return;
  div.innerHTML=`<div class="message ${type}">${text}</div>`;
  setTimeout(()=>{ if(div.firstChild?.innerText===text) div.innerHTML=''; },2800);
}

async function submitVerification(action){
  if(!currentData){ showMessage('No data','error'); return; }
  
  const f54=framesData.tier_54.map(f=>({text:f.text,start_ms:f.start_ms,end_ms:f.end_ms}));
  const f108=framesData.tier_108.map(f=>({text:f.text,start_ms:f.start_ms,end_ms:f.end_ms}));
  const f216=framesData.tier_216.map(f=>({text:f.text,start_ms:f.start_ms,end_ms:f.end_ms}));
  
  const payload={
    json_file:currentData.json_file, wav_file:currentData.wav_file, word:currentData.word,
    sentence:currentData.sentence, full_sequence:f108.map(f=>f.text).filter(t=>t).join(' '),
    frames_54:f54, frames_108:f108, frames_216:f216,
    duration_ms:currentData.duration_ms||0, submitted_by:currentData.submitted_by,
    action:action, annotator_filter:currentAnnotator, is_three_tier:true
  };
  
  showMessage(action==='verify'?'Verifying...':'Rejecting...','info');
  try{
    const r=await fetch(`${BASE_PATH}/verify/submit`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
    if(r.status===401){ window.location.href=`${BASE_PATH}/verify/login`; return; }
    const d=await r.json();
    showMessage(action==='verify'?'File verified and saved!':'File rejected and removed.','success');
    const idx=annotatorFilesList.indexOf(currentData.json_file);
    if(idx!==-1) annotatorFilesList.splice(idx,1);
    await loadVerificationProgress();
    if(annotatorFilesList.length>0) setTimeout(()=>loadSpecificFile(annotatorFilesList[0]),1200);
    else document.getElementById('content').innerHTML=`<div class="completion-box"><h2>All files verified for ${currentAnnotator}</h2><p>All done!</p><button class="btn-verify" onclick="location.reload()">Select Another Annotator</button></div>`;
  }catch(err){ showMessage('Error: '+err,'error'); }
}

async function init(){
  setupAudioUnlock();
  const nameSpan=document.getElementById('verifierName');
  if(nameSpan) nameSpan.innerText='{{ verifier_name }}';
  await loadVerificationProgress();
  await loadAnnotators();
  setInterval(loadVerificationProgress,10000);
}

init();
</script>
