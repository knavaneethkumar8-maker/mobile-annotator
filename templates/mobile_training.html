<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Mobile Training · Akshar Certification</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&family=Noto+Sans+Devanagari:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
            background: #F5F5F0;
            color: #1C1C1A;
            line-height: 1.4;
        }

        /* Header */
        .mobile-header {
            background: #FFFFFF;
            border-bottom: 1px solid #E8ECF0;
            position: sticky;
            top: 0;
            z-index: 100;
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .logo h1 {
            font-size: 1.2rem;
            font-weight: 600;
            color: #2C6E49;
        }

        .logo p {
            font-size: 0.65rem;
            color: #8E8E88;
            margin-top: 2px;
        }

        .user-controls {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .cert-badge {
            font-size: 0.7rem;
            padding: 4px 10px;
            border-radius: 20px;
            background: #2C6E49;
            color: white;
            font-weight: 500;
        }

        .cert-badge.pending {
            background: #E8E8E3;
            color: #6C7A89;
        }

        .cert-badge.in-progress {
            background: #4A6FA5;
            color: white;
        }

        .cert-badge.completed {
            background: #2C6E49;
            color: white;
        }

        .back-btn {
            background: #F0F0EB;
            border: none;
            padding: 6px 12px;
            border-radius: 30px;
            font-size: 0.75rem;
            font-weight: 500;
            cursor: pointer;
            text-decoration: none;
            color: #2C6E49;
        }

        /* Main Content - Mobile Optimized */
        .training-container {
            padding: 16px;
            max-width: 100%;
            margin: 0 auto;
        }

        /* Progress Card */
        .progress-card {
            background: white;
            border-radius: 20px;
            padding: 16px;
            margin-bottom: 16px;
            border: 1px solid #E9E9E2;
        }

        .progress-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .progress-title {
            font-weight: 600;
            font-size: 0.85rem;
            color: #2C6E49;
        }

        .progress-percent {
            font-size: 0.75rem;
            color: #8E8E88;
        }

        .progress-bar-bg {
            background: #EBEBE4;
            height: 6px;
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-bar-fill {
            background: #2C6E49;
            height: 100%;
            border-radius: 10px;
            transition: width 0.3s ease;
            width: 0%;
        }

        /* Module Accordion */
        .module-accordion {
            background: white;
            border-radius: 20px;
            border: 1px solid #E9E9E2;
            overflow: hidden;
            margin-bottom: 12px;
        }

        .module-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px;
            cursor: pointer;
            background: white;
            transition: background 0.2s;
        }

        .module-header:active {
            background: #F8F8F4;
        }

        .module-title {
            font-weight: 600;
            font-size: 0.9rem;
            color: #1C1C1A;
        }

        .module-meta {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .module-badge {
            font-size: 0.7rem;
            padding: 2px 8px;
            border-radius: 12px;
            background: #EBEBE4;
            color: #6C7A89;
        }

        .module-badge.completed {
            background: #E0F0E6;
            color: #2C6E49;
        }

        .module-badge.active {
            background: #E3F2FD;
            color: #4A6FA5;
        }

        .module-arrow {
            font-size: 1rem;
            transition: transform 0.2s;
        }

        .module-accordion.open .module-arrow {
            transform: rotate(180deg);
        }

        .module-steps {
            display: none;
            padding: 0 16px 16px 16px;
            border-top: 1px solid #E9E9E2;
            background: #FAFAF8;
        }

        .module-accordion.open .module-steps {
            display: block;
        }

        .step-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 0;
            border-bottom: 1px solid #EEEEE8;
            cursor: pointer;
        }

        .step-item:last-child {
            border-bottom: none;
        }

        .step-icon {
            width: 32px;
            height: 32px;
            border-radius: 30px;
            background: #F0F0EB;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9rem;
            flex-shrink: 0;
        }

        .step-icon.completed {
            background: #2C6E49;
            color: white;
        }

        .step-icon.active {
            background: #4A6FA5;
            color: white;
        }

        .step-info {
            flex: 1;
        }

        .step-title {
            font-size: 0.85rem;
            font-weight: 500;
            color: #1C1C1A;
        }

        .step-desc {
            font-size: 0.7rem;
            color: #8E8E88;
        }

        .step-status {
            font-size: 0.7rem;
            color: #2C6E49;
        }

        /* Content Card */
        .content-card {
            background: white;
            border-radius: 24px;
            border: 1px solid #E9E9E2;
            overflow: hidden;
            margin-bottom: 16px;
        }

        .content-header {
            padding: 18px;
            border-bottom: 1px solid #E9E9E2;
            background: #FAFAF8;
        }

        .content-step-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: #1C1C1A;
            margin-bottom: 4px;
        }

        .content-step-meta {
            font-size: 0.7rem;
            color: #8E8E88;
        }

        .content-body {
            padding: 18px;
        }

        /* Video Player */
        .video-container {
            background: #1a1a2e;
            border-radius: 16px;
            overflow: hidden;
            margin-bottom: 16px;
        }

        .video-container video {
            width: 100%;
            display: block;
        }

        /* Exercise Area */
        .exercise-area {
            background: #F8F8F4;
            border-radius: 20px;
            padding: 20px;
            margin: 16px 0;
        }

        .audio-player-card {
            background: white;
            border-radius: 60px;
            padding: 10px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 20px;
            border: 1px solid #E9E9E2;
        }

        .play-circle {
            background: #2C6E49;
            border: none;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .play-circle:active {
            transform: scale(0.95);
        }

        .play-circle svg {
            width: 22px;
            height: 22px;
            fill: white;
        }

        .speed-group {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .speed-chip {
            padding: 6px 14px;
            border-radius: 30px;
            border: 1px solid #CBD5E1;
            background: white;
            font-size: 0.7rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .speed-chip.active {
            background: #2C6E49;
            border-color: #2C6E49;
            color: white;
        }

        /* Cell Inputs */
        .cell-single {
            text-align: center;
            margin: 20px 0;
        }

        .cell-input-large {
            width: 120px;
            padding: 16px;
            text-align: center;
            font-family: 'Noto Sans Devanagari', monospace;
            font-size: 1.5rem;
            border: 2px solid #E9E9E2;
            border-radius: 20px;
            background: white;
        }

        .cell-input-large:focus {
            outline: none;
            border-color: #2C6E49;
        }

        .multi-cells {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
            margin: 20px 0;
        }

        .cell-small {
            text-align: center;
        }

        .cell-small .cell-label {
            font-size: 0.65rem;
            color: #8E8E88;
            margin-bottom: 6px;
        }

        .cell-small input {
            width: 80px;
            padding: 10px;
            text-align: center;
            font-family: 'Noto Sans Devanagari', monospace;
            font-size: 1rem;
            border: 1.5px solid #E9E9E2;
            border-radius: 12px;
        }

        /* Three Tier Grid - Mobile Optimized */
        .three-tier-mobile {
            margin: 16px 0;
        }

        .tier-mobile {
            margin-bottom: 16px;
            background: white;
            border-radius: 16px;
            border: 1px solid #E9E9E2;
            overflow: hidden;
        }

        .tier-title {
            background: #F8F8F4;
            padding: 10px 14px;
            font-weight: 600;
            font-size: 0.75rem;
            color: #2C6E49;
            border-bottom: 1px solid #E9E9E2;
        }

        .tier-cells-scroll {
            overflow-x: auto;
            white-space: nowrap;
            padding: 12px;
            -webkit-overflow-scrolling: touch;
        }

        .tier-cells-container {
            display: inline-flex;
            gap: 8px;
        }

        .tier-cell {
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            background: #FAFAF8;
            border-radius: 12px;
            padding: 8px;
            min-width: 80px;
            border: 1px solid #E9E9E2;
            cursor: pointer;
            transition: all 0.1s ease;
        }

        .tier-cell.playing {
            background: #E6F7EC;
            border-color: #10b981;
            animation: pulse 0.2s ease;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .tier-cell.tier-216 { min-width: 100px; }
        .tier-cell.tier-108 { min-width: 75px; }
        .tier-cell.tier-54 { min-width: 60px; }

        .tier-time {
            font-size: 0.6rem;
            color: #8E8E88;
            white-space: nowrap;
        }

        .tier-input {
            width: 100%;
            text-align: center;
            font-family: 'Noto Sans Devanagari', monospace;
            font-size: 0.85rem;
            padding: 8px;
            border: 1px solid #E9E9E2;
            border-radius: 10px;
            background: white;
        }

        .tier-input:focus {
            outline: none;
            border-color: #2C6E49;
        }

        .tier-input.saved {
            border-color: #2C6E49;
            background: #E0F0E6;
        }

        .tier-input.incorrect {
            border-color: #e67e22 !important;
            background: #fef3e0 !important;
        }

        .tier-input.kb-active {
            border-color: #10b981;
            box-shadow: 0 0 0 2px rgba(16,185,129,0.2);
        }

        /* Quiz */
        .quiz-question {
            margin-bottom: 24px;
            padding: 16px;
            background: #F8F8F4;
            border-radius: 16px;
        }

        .quiz-question-text {
            font-weight: 600;
            margin-bottom: 12px;
            font-size: 0.9rem;
        }

        .quiz-options {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .quiz-option {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px;
            border-radius: 12px;
            background: white;
            cursor: pointer;
        }

        .quiz-option input {
            width: 18px;
            height: 18px;
        }

        /* Game */
        .game-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            margin: 20px 0;
        }

        .game-card {
            width: 70px;
            height: 70px;
            background: white;
            border: 2px solid #E9E9E2;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            font-family: 'Noto Sans Devanagari', monospace;
            cursor: pointer;
            transition: all 0.2s;
        }

        .game-card:active {
            transform: scale(0.95);
            background: #E0F0E6;
            border-color: #2C6E49;
        }

        .game-card.correct {
            background: #E0F0E6;
            border-color: #2C6E49;
        }

        .game-card.incorrect {
            background: #FEF3E0;
            border-color: #e67e22;
        }

        .game-card.disabled {
            pointer-events: none;
            opacity: 0.6;
        }

        .game-progress {
            margin: 16px 0;
        }

        .game-progress-bar {
            width: 100%;
            height: 8px;
            background: #E2E8F0;
            border-radius: 4px;
            overflow: hidden;
            margin-top: 8px;
        }

        .game-progress-fill {
            height: 100%;
            background: #2C6E49;
            border-radius: 4px;
            transition: width 0.3s ease;
        }

        .game-score {
            font-size: 1rem;
            font-weight: 600;
            color: #2C6E49;
            margin-bottom: 16px;
            padding: 12px;
            background: #F8F8F4;
            border-radius: 16px;
            text-align: center;
        }

        .play-sound-btn {
            background: #2C6E49;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 0.85rem;
            cursor: pointer;
            margin: 10px 0;
        }

        /* Tour */
        .tour-items {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .tour-item {
            padding: 14px;
            background: #F8F8F4;
            border-radius: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: all 0.2s;
            border: 2px solid transparent;
        }

        .tour-item:active {
            background: #E3F2FD;
        }

        .tour-item.completed {
            background: #E0F0E6;
            border-color: #2C6E49;
        }

        .tour-icon {
            font-size: 1.3rem;
        }

        .tour-text {
            flex: 1;
        }

        .tour-title {
            font-weight: 600;
            font-size: 0.85rem;
        }

        .tour-desc {
            font-size: 0.7rem;
            color: #8E8E88;
        }

        .tour-check {
            color: #2C6E49;
            font-size: 1.1rem;
        }

        /* Keyboard */
        .mobile-keyboard {
            background: #1e293b;
            border-radius: 28px;
            padding: 14px 12px;
            margin: 16px 0;
            overflow-x: auto;
            position: sticky;
            bottom: 0;
            z-index: 50;
        }

        .kb-status-bar {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            gap: 6px;
            margin-bottom: 10px;
            font-size: 11px;
            color: #94a3b8;
        }

        .kb-target-name {
            color: #10b981;
            font-weight: 600;
        }

        .kb-target-name.none {
            color: #64748b;
        }

        .kb-row {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 6px;
            margin-bottom: 6px;
        }

        .kb-key {
            min-width: 44px;
            height: 48px;
            background: #334155;
            border-radius: 14px;
            font-size: 1rem;
            font-family: 'Noto Sans Devanagari', monospace;
            color: white;
            border: none;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.05s linear;
        }

        .kb-key:active {
            transform: scale(0.92);
            background: #4f46e5;
        }

        .kb-key-special {
            background: #1e40af;
            font-size: 12px;
            font-weight: bold;
            min-width: 70px;
        }

        .kb-key-special.del {
            background: #7f1d1d;
        }

        .kb-key-special.clr {
            background: #78350f;
        }

        /* Buttons */
        .btn {
            padding: 14px 20px;
            border: none;
            border-radius: 60px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
        }

        .btn-primary {
            background: #2C6E49;
            color: white;
        }

        .btn-primary:active {
            background: #215A3A;
            transform: scale(0.98);
        }

        .btn-secondary {
            background: #F0F0EB;
            color: #2C6E49;
        }

        .btn-secondary:active {
            background: #E4E4DC;
        }

        .btn-warning {
            background: #e67e22;
            color: white;
        }

        .button-group {
            display: flex;
            gap: 12px;
            margin: 20px 0;
        }

        .button-group .btn {
            flex: 1;
        }

        /* Feedback */
        .feedback {
            padding: 14px;
            border-radius: 16px;
            margin: 16px 0;
            font-size: 0.85rem;
        }

        .feedback-success {
            background: #E0F0E6;
            color: #2C6E49;
            border-left: 3px solid #2C6E49;
        }

        .feedback-error {
            background: #FDE9E7;
            color: #B13E3A;
            border-left: 3px solid #B13E3A;
        }

        .feedback-info {
            background: #E3F2FD;
            color: #4A6FA5;
            border-left: 3px solid #4A6FA5;
        }

        /* Loading */
        .loading {
            text-align: center;
            padding: 40px;
            color: #8E8E88;
        }

        @media (max-width: 480px) {
            .kb-key { min-width: 38px; height: 44px; font-size: 14px; }
            .kb-key-special { min-width: 55px; font-size: 10px; }
            .game-card { width: 60px; height: 60px; font-size: 1.2rem; }
        }
    </style>
</head>
<body>
    <div class="mobile-header">
        <div class="logo">
            <h1>Akshar Training</h1>
            <p>Mobile Certification</p>
        </div>
        <div class="user-controls">
            <span class="cert-badge pending" id="certBadge">Training</span>
            <a href="/" class="back-btn">← Back</a>
        </div>
    </div>

    <div class="training-container" id="trainingContainer">
        <div class="progress-card">
            <div class="progress-header">
                <span class="progress-title">Overall Progress</span>
                <span class="progress-percent" id="overallPercent">0%</span>
            </div>
            <div class="progress-bar-bg">
                <div class="progress-bar-fill" id="overallFill"></div>
            </div>
        </div>

        <div id="modulesList"></div>

        <div id="contentArea">
            <div class="loading">Select a module to begin...</div>
        </div>
    </div>

    <script>
        const BASE_PATH = "";
        const USERNAME = "{{ user }}";

        // Training modules structure (matching desktop)
        const modules = [
            {
                id: 1, title: "Introduction to Audio Annotation", estimated_time: "5-10 min",
                steps: [
                    { id: "1.1", type: "video", title: "What is Audio Annotation?", duration: "2:30" },
                    { id: "1.2", type: "quiz", title: "Check Your Understanding", 
                      questions: [{ text: "What is the main purpose of audio annotation?", options: ["Speech recognition training", "Music analysis", "Background noise removal", "Audio compression"], correct: 0 }] },
                    { id: "1.3", type: "video", title: "Platform Overview", duration: "2:00" },
                    { id: "1.4", type: "interactive", title: "Interface Tour", interactive_type: "tour" }
                ]
            },
            {
                id: 2, title: "Understanding Akshars", estimated_time: "10-15 min",
                steps: [
                    { id: "2.1", type: "video", title: "What are Akshars? The 40 Characters", duration: "3:00" },
                    { id: "2.2", type: "game", title: "Match the Sound", game_type: "flashcard", items: ["अ", "क", "म", "स", "त"] },
                    { id: "2.3", type: "video", title: "Vowels vs Consonants", duration: "2:30" },
                    { id: "2.4", type: "quiz", title: "Akshar Recognition", 
                      questions: [{ text: "Which of these is a vowel?", options: ["क", "त", "अ", "म"], correct: 2 }] }
                ]
            },
            {
                id: 3, title: "Single Tier Annotation", estimated_time: "15-20 min",
                steps: [
                    { id: "3.1", type: "video", title: "108ms Tier = One Sound Unit", duration: "2:00" },
                    { id: "3.2", type: "exercise", title: "Practice: 108ms Tier Annotation", exercise_type: "single_cell_practice_dynamic", audio_file: "three_2.wav" },
                    { id: "3.3", type: "video", title: "Using Slowed Audio for Clarity", duration: "1:30" }
                ]
            },
            {
                id: 4, title: "The Three-Tier System", estimated_time: "20-25 min",
                steps: [
                    { id: "4.1", type: "video", title: "Understanding 216ms, 108ms, 54ms", duration: "3:00" },
                    { id: "4.2", type: "exercise", title: "Practice: 216ms Tier", exercise_type: "three_tier", audio_file: "word_3cells.wav", required_duration: 0.324 },
                    { id: "4.3", type: "exercise", title: "Practice: All Three Tiers", exercise_type: "three_tier_complete", audio_file: "namaste_full.wav", required_duration: 1.3 }
                ]
            },
            {
                id: 5, title: "Practice & Mastery", estimated_time: "30-40 min",
                steps: [
                    { id: "5.1", type: "video", title: "Common Mistakes", duration: "2:30" },
                    { id: "5.2", type: "exercise", title: "Practice: Short Sentence", exercise_type: "three_tier_complete", audio_file: "short_sentence.wav", required_duration: 0.54 },
                    { id: "5.3", type: "exercise", title: "Practice: Medium Sentence", exercise_type: "three_tier_complete", audio_file: "medium_sentence.wav", required_duration: 0.86 },
                    { id: "5.4", type: "quiz", title: "Scenario Questions", 
                      questions: [

        // Audio functions
        async function initAudioContext() {
            if (!currentAudioContext) {
                currentAudioContext = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (currentAudioContext.state === 'suspended') {
                await currentAudioContext.resume();
            }
            return currentAudioContext;
        }

        async function playAudio(audioUrl, duration = null, cellElement = null) {
            try {
                if (currentSourceNode) {
                    currentSourceNode.stop();
                    currentSourceNode.disconnect();
                    currentSourceNode = null;
                }

                if (currentPlayingCell && currentPlayingCell !== cellElement) {
                    currentPlayingCell.classList.remove('playing');
                }

                if (cellElement) {
                    currentPlayingCell = cellElement;
                    cellElement.classList.add('playing');
                }

                const audioContext = await initAudioContext();
                const response = await fetch(audioUrl);
                const arrayBuffer = await response.arrayBuffer();
                const audioBuffer = await audioContext.decodeAudioData(arrayBuffer);

                currentSourceNode = audioContext.createBufferSource();
                currentSourceNode.buffer = audioBuffer;
                currentSourceNode.playbackRate.value = currentSpeed;
                currentSourceNode.connect(audioContext.destination);

                const playDuration = duration ? Math.min(duration, audioBuffer.duration) : audioBuffer.duration;
                currentSourceNode.start(0, 0, playDuration);
                isAudioPlaying = true;

                currentSourceNode.onended = () => {
                    isAudioPlaying = false;
                    currentSourceNode = null;
                    if (cellElement) {
                        cellElement.classList.remove('playing');
                    }
                    currentPlayingCell = null;
                };

                return true;
            } catch (error) {
                console.error('Audio error:', error);
                if (cellElement) {
                    cellElement.classList.remove('playing');
                }
                return false;
            }
        }

        async function playTrimmedAudio(audioFile, startSec, durationSec, cellElement = null) {
            try {
                if (currentSourceNode) {
                    currentSourceNode.stop();
                    currentSourceNode.disconnect();
                    currentSourceNode = null;
                }

                if (currentPlayingCell && currentPlayingCell !== cellElement) {
                    currentPlayingCell.classList.remove('playing');
                }

                if (cellElement) {
                    currentPlayingCell = cellElement;
                    cellElement.classList.add('playing');
                }

                const audioContext = await initAudioContext();
                const response = await fetch(`/mobile-training/audio/${audioFile}`);
                const arrayBuffer = await response.arrayBuffer();
                const audioBuffer = await audioContext.decodeAudioData(arrayBuffer);

                currentSourceNode = audioContext.createBufferSource();
                currentSourceNode.buffer = audioBuffer;
                currentSourceNode.playbackRate.value = currentSpeed;
                currentSourceNode.connect(audioContext.destination);

                const actualDuration = Math.min(durationSec, audioBuffer.duration - startSec);
                currentSourceNode.start(0, startSec, actualDuration);
                isAudioPlaying = true;

                currentSourceNode.onended = () => {
                    isAudioPlaying = false;
                    currentSourceNode = null;
                    if (cellElement) {
                        cellElement.classList.remove('playing');
                    }
                    currentPlayingCell = null;
                };

                return true;
            } catch (error) {
                console.error('Audio error:', error);
                if (cellElement) {
                    cellElement.classList.remove('playing');
                }
                return false;
            }
        }

        function typeIntoActive(char) {
            if (!activeInputElement) {
                const feedback = document.getElementById('practiceFeedback') || document.getElementById('exerciseFeedback');
                if (feedback) {
                    feedback.innerHTML = `<div class="feedback feedback-info">Tap a cell first, then use keyboard!</div>`;
                    feedback.style.display = 'block';
                    setTimeout(() => feedback.style.display = 'none', 1500);
                }
                return;
            }
            
            let cur = activeInputElement.value || '';
            let next;
            
            if (char === '⌫') {
                next = cur.slice(0, -1);
            } else if (char === '🗑') {
                next = '';
            } else {
                let filtered = filterAkshars(cur + char);
                if (filtered.length > 3) {
                    const feedback = document.getElementById('practiceFeedback') || document.getElementById('exerciseFeedback');
                    if (feedback) {
                        feedback.innerHTML = `<div class="feedback feedback-error">Max 3 akshars per cell!</div>`;
                        feedback.style.display = 'block';
                        setTimeout(() => feedback.style.display = 'none', 1000);
                    }
                    return;
                }
                next = filtered;
            }
            
            activeInputElement.value = next;
            activeInputElement.classList.remove('saved');
            
            const inputEvent = new Event('input', { bubbles: true });
            activeInputElement.dispatchEvent(inputEvent);
        }

        function setupKeyboardListeners() {
            const keys = document.querySelectorAll('.kb-key');

                newBtn.addEventListener('click', (e) => {
                    e.preventDefault();
                    e.stopPropagation();
                    const char = newBtn.getAttribute('data-char');
                    typeIntoActive(char);
                });
            });
        }

                    step.questions.forEach((q, idx) => {

                        if (selected && parseInt(selected.value) === q.correct) correct++;
                    });
                    const score = (correct / step.questions.length) * 100;
                    const feedback = document.getElementById('quizFeedback');
                    if (score >= 80) {
                        feedback.innerHTML = `<div class="feedback feedback-success">✓ Great job! You scored ${Math.round(score)}%.</div>`;
                        markStepComplete(step);
                    } else {
                        feedback.innerHTML = `<div class="feedback feedback-error">You scored ${Math.round(score)}%. Need 80% to pass. Review and try again.</div>`;
                    }
                };
            }
            
            // Speed buttons
            document.querySelectorAll('.speed-chip').forEach(btn => {
                btn.onclick = () => {
                    document.querySelectorAll('.speed-chip').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentSpeed = parseFloat(btn.dataset.speed);
                    if (isAudioPlaying) {
                        stopAudio();
                        const playBtn = document.getElementById('playFullAudioBtn');
                        if (playBtn) playBtn.innerHTML = `<svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>`;
                    }
                    showMessage(`Speed: ${currentSpeed}x`, 'info');
                };
            });
            
            // Exercise handlers
            if (step.exercise_type === 'single_cell_practice_dynamic') {
                await attachSingleCellPractice(step);
            } else if (step.exercise_type === 'three_tier' || step.exercise_type === 'three_tier_complete') {
                await attachThreeTierExercise(step);
            }
            
            // Play audio button
            const playBtn = document.getElementById('playFullAudioBtn');
            if (playBtn && step.audio_file) {
                playBtn.onclick = async () => {
                    if (isAudioPlaying) {
                        stopAudio();
                        playBtn.innerHTML = `<svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>`;
                    } else {
                        await playAudio(`/mobile-training/audio/${step.audio_file}`, step.required_duration);
                        playBtn.innerHTML = `<svg viewBox="0 0 24 24"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>`;
                    }
                };
            }
            
            // Game
            if (step.type === 'game') {
                attachGameListeners(step);
            }
            
            // Interactive tour
            if (step.type === 'interactive') {
                attachInteractiveListeners(step);
            }
            
            // Assessment start
            const startAssessment = document.getElementById('startAssessmentBtn');
            if (startAssessment) {
                startAssessment.onclick = () => {
                    const container = document.getElementById('assessmentContainer');
                    container.innerHTML = `<div class="feedback feedback-success">Assessment completed! Great work!</div>`;
                    setTimeout(() => markStepComplete(step), 2000);
                };
            }
            
            // Setup keyboard
            setupKeyboardListeners();
            
            // Global keyboard active input management
            document.addEventListener('click', (e) => {
                if (e.target.classList && e.target.classList.contains('tier-input')) {
                    setActiveInput(e.target);
                }
            });
        }

        async function attachSingleCellPractice(step) {
            const audioFile = step.audio_file;
            const practiceKey = `${trainingState.currentModule}_${step.id}`;
            const savedState = trainingState.stepData[practiceKey] || {};
            const userAnswers = savedState.answers || {};
            
            const container = document.getElementById('practiceCellsRow');
            const loadingDiv = document.getElementById('loadingIndicator');
            const feedbackDiv = document.getElementById('practiceFeedback');
            
            if (!container) return;
            if (loadingDiv) loadingDiv.style.display = 'block';
            container.innerHTML = '<div style="padding: 20px; text-align: center;">📱 Loading exercise...</div>';
            
            let cells = [];
            let correctAnswers = [];
            
            try {
                const response = await fetch(`/api/mobile-training/exercise-data/${audioFile}`);
                const data = await response.json();
                
                if (!data.success) throw new Error(data.error);
                
                const numCells = data.num_cells || 3;
                correctAnswers = data.correct_answers || ["न", "म", "स्"];
                
                cells = [];
                for (let i = 0; i < numCells; i++) {
                    cells.push({
                        index: i,
                        label: `Cell ${i + 1}`,
                        correct: correctAnswers[i] || "",
                        duration: 0.108
                    });
                }
                
                container.innerHTML = cells.map((cell, idx) => {
                    const savedValue = userAnswers[idx] || '';
                    const wasIncorrect = savedState.incorrectCells && savedState.incorrectCells[idx];
                    return `
                        <div class="tier-cell tier-108" data-idx="${idx}" data-tier="108">
                            <span class="tier-time">${cell.label}</span>
                            <input type="text" class="tier-input ${wasIncorrect ? 'incorrect' : ''}" data-idx="${idx}" data-tier="108" value="${savedValue.replace(/"/g, '&quot;')}" maxlength="3" placeholder="___">
                        </div>
                    `;
                }).join('');
                
            } catch (error) {
                console.error('Error loading exercise:', error);
                correctAnswers = ["न", "म", "स्"];
                cells = correctAnswers.map((ans, i) => ({ index: i, label: `Cell ${i+1}`, correct: ans }));
                container.innerHTML = cells.map((cell, idx) => {
                    const savedValue = userAnswers[idx] || '';
                    return `
                        <div class="tier-cell tier-108" data-idx="${idx}" data-tier="108">
                            <span class="tier-time">${cell.label}</span>
                            <input type="text" class="tier-input" data-idx="${idx}" data-tier="108" value="${savedValue}" maxlength="3" placeholder="___">
                        </div>
                    `;
                }).join('');
            }
            
            if (loadingDiv) loadingDiv.style.display = 'none';
            
            const inputs = document.querySelectorAll('.tier-input');
            const cellDivs = document.querySelectorAll('.tier-cell');
            
            // Cell click to play audio
            cellDivs.forEach((div, idx) => {
                div.addEventListener('click', async (e) => {
                    if (e.target.tagName === 'INPUT') return;
                    const startTime = idx * 0.108;
                    await playTrimmedAudio(audioFile, startTime, 0.108, div);
                });
            });
            
            // Input handlers
            inputs.forEach((input, idx) => {
                input.addEventListener('input', (e) => {
                    let val = filterAkshars(e.target.value);
                    if (val !== e.target.value) e.target.value = val;
                    input.classList.remove('saved', 'incorrect');
                    
                    if (!trainingState.stepData[practiceKey]) trainingState.stepData[practiceKey] = {};
                    if (!trainingState.stepData[practiceKey].answers) trainingState.stepData[practiceKey].answers = {};
                    trainingState.stepData[practiceKey].answers[idx] = val;
                    saveProgress();
                });
            });
            
            // Check button
            const checkBtn = document.getElementById('checkPracticeBtn');
            const showAnswersBtn = document.getElementById('showAnswersBtn');
            const resetBtn = document.getElementById('resetPracticeBtn');
            
            if (checkBtn) {
                checkBtn.onclick = () => {
                    let correctCount = 0;
                    let wrongCells = [];
                    
                    cells.forEach((cell, idx) => {
                        const input = inputs[idx];
                        if (!input) return;
                        
                        const userAnswer = input.value.trim();
                        const expectedAnswer = correctAnswers[idx] || "";
                        const isCorrect = (userAnswer === expectedAnswer);
                        
                        if (isCorrect) {
                            correctCount++;
                            input.classList.add('saved');
                            input.classList.remove('incorrect');
                        } else {
                            input.classList.remove('saved');
                            input.classList.add('incorrect');
                            wrongCells.push(idx + 1);
                        }
                        
                        if (!trainingState.stepData[practiceKey]) trainingState.stepData[practiceKey] = {};
                        if (!trainingState.stepData[practiceKey].answers) trainingState.stepData[practiceKey].answers = {};
                        trainingState.stepData[practiceKey].answers[idx] = userAnswer;
                    });
                    
                    trainingState.stepData[practiceKey].incorrectCells = {};
                    wrongCells.forEach(idx => { trainingState.stepData[practiceKey].incorrectCells[idx - 1] = true; });
                    saveProgress();
                    
                    const totalCells = cells.length;
                    const passed = (correctCount === totalCells);
                    
                    if (feedbackDiv) {
                        feedbackDiv.style.display = 'block';
                        if (passed) {
                            feedbackDiv.innerHTML = `<div class="feedback feedback-success">🎉 Perfect! All ${totalCells} cells are correct! 🎉</div>`;
                            markStepComplete(step);
                        } else {
                            const wrongCount = totalCells - correctCount;
                            feedbackDiv.innerHTML = `<div class="feedback feedback-error">❌ ${wrongCount} incorrect answer(s). Wrong cells: ${wrongCells.join(', ')}</div>`;
                        }
                        setTimeout(() => { if (feedbackDiv.innerHTML) feedbackDiv.style.display = 'none'; }, 3000);
                    }
                };
            }
            
            if (showAnswersBtn) {
                showAnswersBtn.onclick = () => {
                    cells.forEach((cell, idx) => {
                        const input = inputs[idx];
                        if (input) {
                            input.value = correctAnswers[idx] || "";
                            input.classList.add('saved');
                            input.classList.remove('incorrect');
                        }
                        if (!trainingState.stepData[practiceKey]) trainingState.stepData[practiceKey] = {};
                        if (!trainingState.stepData[practiceKey].answers) trainingState.stepData[practiceKey].answers = {};
                        trainingState.stepData[practiceKey].answers[idx] = correctAnswers[idx] || "";
                    });
                    saveProgress();
                    if (feedbackDiv) {
                        feedbackDiv.innerHTML = `<div class="feedback feedback-info">📝 Correct answers filled in.</div>`;
                        feedbackDiv.style.display = 'block';
                        setTimeout(() => feedbackDiv.style.display = 'none', 2000);
                    }
                };
            }
            
            if (resetBtn) {
                resetBtn.onclick = () => {
                    inputs.forEach((input, idx) => {
                        if (input) {
                            input.value = '';
                            input.classList.remove('saved', 'incorrect');
                        }
                        if (trainingState.stepData[practiceKey]?.answers) {
                            delete trainingState.stepData[practiceKey].answers[idx];
                        }
                    });
                    if (trainingState.stepData[practiceKey]) {
                        delete trainingState.stepData[practiceKey].incorrectCells;
                    }
                    saveProgress();
                    if (feedbackDiv) feedbackDiv.style.display = 'none';
                };
            }
        }

        async function attachThreeTierExercise(step) {
            const audioFile = step.audio_file;
            const requiredDuration = step.required_duration || 1.3;
            const container = document.getElementById('threeTierContainer');
            
            if (!container) return;
            
            // Calculate number of frames
            const count108 = Math.ceil(requiredDuration / WINDOW_108);
            const count216 = Math.ceil(count108 / 2);
            const count54 = count108 * 2;
            
            container.innerHTML = `
                <div class="tier-mobile">
                    <div class="tier-title">🌬️ 216ms (Merged)</div>
                    <div class="tier-cells-scroll">
                        <div class="tier-cells-container" id="tier216Cells"></div>
                    </div>
                </div>
                <div class="tier-mobile">
                    <div class="tier-title">🔥 108ms (Original)</div>
                    <div class="tier-cells-scroll">
                        <div class="tier-cells-container" id="tier108Cells"></div>
                    </div>
                </div>
                <div class="tier-mobile">
                    <div class="tier-title">💧 54ms (Split)</div>
                    <div class="tier-cells-scroll">
                        <div class="tier-cells-container" id="tier54Cells"></div>
                    </div>
                </div>
            `;
            
            // Create cells
            const tier216Container = document.getElementById('tier216Cells');
            const tier108Container = document.getElementById('tier108Cells');
            const tier54Container = document.getElementById('tier54Cells');
            
            for (let i = 0; i < count216; i++) {
                const startTime = (i * WINDOW_216).toFixed(2);
                const div = document.createElement('div');
                div.className = 'tier-cell tier-216';
                div.setAttribute('data-idx', i);
                div.setAttribute('data-tier', '216');
                div.innerHTML = `
                    <span class="tier-time">${startTime}s</span>
                    <input type="text" class="tier-input" data-idx="${i}" data-tier="216" maxlength="3" placeholder="___">
                `;
                tier216Container.appendChild(div);
            }
            
            for (let i = 0; i < count108; i++) {
                const startTime = (i * WINDOW_108).toFixed(2);
                const div = document.createElement('div');
                div.className = 'tier-cell tier-108';
                div.setAttribute('data-idx', i);
                div.setAttribute('data-tier', '108');
                div.innerHTML = `
                    <span class="tier-time">${startTime}s</span>
                    <input type="text" class="tier-input" data-idx="${i}" data-tier="108" maxlength="3" placeholder="___">
                `;
                tier108Container.appendChild(div);
            }
            
            for (let i = 0; i < count54; i++) {
                const startTime = (i * WINDOW_54).toFixed(2);
                const div = document.createElement('div');
                div.className = 'tier-cell tier-54';
                div.setAttribute('data-idx', i);
                div.setAttribute('data-tier', '54');
                div.innerHTML = `
                    <span class="tier-time">${startTime}s</span>
                    <input type="text" class="tier-input" data-idx="${i}" data-tier="54" maxlength="3" placeholder="___">
                `;
                tier54Container.appendChild(div);
            }
            
            // Click handlers for cells
            const allCells = document.querySelectorAll('.tier-cell');
            allCells.forEach(cell => {
                const tier = cell.dataset.tier;
                const idx = parseInt(cell.dataset.idx);
                const windowSize = tier === '216' ? WINDOW_216 : (tier === '108' ? WINDOW_108 : WINDOW_54);
                const startTime = idx * windowSize;
                
                cell.addEventListener('click', async (e) => {
                    if (e.target.tagName === 'INPUT') return;
                    await playTrimmedAudio(audioFile, startTime, windowSize, cell);
                });
            });
            
            // Check button
            const checkBtn = document.getElementById('checkExerciseBtn');
            if (checkBtn) {
                checkBtn.onclick = () => {
                    const feedback = document.getElementById('exerciseFeedback');
                    if (feedback) {
                        feedback.innerHTML = `<div class="feedback feedback-success">🎉 Great work! Three-tier exercise completed.</div>`;
                        feedback.style.display = 'block';
                    }
                    markStepComplete(step);
                };
            }
        }

        function attachGameListeners(step) {
            const gameKey = `${trainingState.currentModule}_${step.id}`;
            const targetAkshars = step.items || ["अ", "क", "म", "स", "त"];
            
            let currentIndex = 0;
            let score = 0;
            let canSelect = true;
            let currentAudio = null;
            
            const savedState = trainingState.stepData[gameKey];
            if (savedState && !savedState.completed) {
                currentIndex = savedState.currentIndex || 0;
                score = savedState.score || 0;
            }
            
            const aksharCards = document.querySelectorAll('.game-card');
            const scoreElement = document.getElementById('gameScore');
            const progressFill = document.getElementById('gameProgressFill');
            const gameFeedback = document.getElementById('gameFeedback');
            const playBtn = document.getElementById('playGameSoundBtn');
            
            function updateUI() {
                if (scoreElement) scoreElement.innerHTML = `Score: ${score}/${targetAkshars.length}`;
                if (progressFill) progressFill.style.width = `${(currentIndex / targetAkshars.length) * 100}%`;
            }
            
            function saveGameState() {
                trainingState.stepData[gameKey] = {
                    currentIndex: currentIndex,
                    score: score,
                    completed: currentIndex >= targetAkshars.length
                };
                saveProgress();
            }
            
            async function playSound(akshar) {
                const audioMap = {
                    'अ': '/mobile-training/audio/game_sounds/a.wav',
                    'क': '/mobile-training/audio/game_sounds/ka.wav',
                    'म': '/mobile-training/audio/game_sounds/ma.wav',
                    'स': '/mobile-training/audio/game_sounds/sa.wav',
                    'त': '/mobile-training/audio/game_sounds/ta.wav'
                };
                
                const audioFile = audioMap[akshar];
                if (!audioFile) return;
                
                if (currentAudio) {
                    currentAudio.pause();
                    currentAudio = null;
                }
                
                currentAudio = new Audio(audioFile);
                
                if (gameFeedback) {
                    gameFeedback.innerHTML = `<div class="feedback feedback-info">🔊 Playing sound for: ${akshar}</div>`;
                }
                
                return new Promise((resolve) => {
                    currentAudio.onended = () => {
                        if (gameFeedback) {
                            gameFeedback.innerHTML = `<div class="feedback feedback-info">🎧 Tap the akshar you heard!</div>`;
                        }
                        resolve();
                    };
                    currentAudio.play();
                });
            }
            
            async function playCurrentSound() {
                if (currentIndex >= targetAkshars.length) return;
                
                canSelect = false;
                aksharCards.forEach(card => {
                    card.style.pointerEvents = 'none';
                    card.classList.add('disabled');
                });
                
                const currentAkshar = targetAkshars[currentIndex];
                await playSound(currentAkshar);
                
                aksharCards.forEach(card => {
                    card.style.pointerEvents = 'auto';
                    card.classList.remove('disabled');
                });
                canSelect = true;
            }
            
            function handleAnswer(selectedAkshar, cardElement) {
                if (!canSelect) return;
                if (currentIndex >= targetAkshars.length) return;
                
                const correctAkshar = targetAkshars[currentIndex];
                const isCorrect = (selectedAkshar === correctAkshar);
                
                if (isCorrect) {
                    cardElement.classList.add('correct');
                    score++;
                    if (gameFeedback) {
                        gameFeedback.innerHTML = `<div class="feedback feedback-success">✅ Correct! ${selectedAkshar} is right!</div>`;
                    }
                } else {
                    cardElement.classList.add('incorrect');
                    if (gameFeedback) {
                        gameFeedback.innerHTML = `<div class="feedback feedback-error">❌ Wrong! The correct sound was "${correctAkshar}".</div>`;
                    }
                }
                
                canSelect = false;
                updateUI();
                saveGameState();
                
                setTimeout(() => {
                    cardElement.classList.remove('correct', 'incorrect');
                    currentIndex++;
                    updateUI();
                    
                    if (currentIndex < targetAkshars.length) {
                        saveGameState();
                        canSelect = true;
                        playCurrentSound();
                    } else {
                        saveGameState();
                        if (gameFeedback) {
                            const finalMessage = score === targetAkshars.length 
                                ? `<div class="feedback feedback-success">🏆 Perfect! You've mastered all sounds!</div>`
                                : `<div class="feedback feedback-info">📊 Game finished! Score: ${score}/${targetAkshars.length}.</div>`;
                            gameFeedback.innerHTML = finalMessage;
                        }
                        
                        if (score === targetAkshars.length) {
                            setTimeout(() => markStepComplete(step), 1500);
                        }
                    }
                    
                    canSelect = true;
                }, 1500);
            }
            
            aksharCards.forEach(card => {
                card.onclick = () => {
                    const selectedAkshar = card.dataset.akshar;
                    handleAnswer(selectedAkshar, card);
                };
            });
            
            if (playBtn) {
                playBtn.onclick = () => {
                    if (currentIndex < targetAkshars.length) {
                        if (currentAudio) {
                            currentAudio.pause();
                            currentAudio = null;
                        }
                        playCurrentSound();
                    }
                };
            }
            
            if (currentIndex === 0 && !trainingState.stepData[gameKey]?.completed) {
                setTimeout(() => playCurrentSound(), 500);
            }
        }

        function attachInteractiveListeners(step) {
            const tourKey = `${trainingState.currentModule}_${step.id}`;
            const tourItems = document.querySelectorAll('.tour-item');
            const tourFeedback = document.getElementById('tourFeedback');
            let completedCount = 0;
            const totalItems = tourItems.length;
            
            function updateTourProgress() {
                if (completedCount === totalItems) {
                    tourFeedback.innerHTML = `<div class="feedback feedback-success">✓ Tour completed! You're ready to annotate!</div>`;
                    trainingState.tourCompleted[tourKey] = true;
                    saveProgress();
                    markStepComplete(step);
                }
            }
            
            tourItems.forEach(item => {
                const isCompleted = item.dataset.completed === 'true';
                if (isCompleted) {
                    completedCount++;
                    item.classList.add('completed');
                }
                
                item.onclick = () => {
                    if (item.dataset.completed === 'true') return;
                    
                    item.dataset.completed = 'true';
                    item.classList.add('completed');
                    completedCount++;
                    updateTourProgress();
                    
                    if (tourFeedback) {
                        tourFeedback.innerHTML = `<div class="feedback feedback-success">✓ Learned about ${item.querySelector('.tour-title')?.innerText || 'feature'}!</div>`;
                        tourFeedback.style.display = 'block';
                        setTimeout(() => tourFeedback.style.display = 'none', 1500);
                    }
                };
            });
        }

        function markStepComplete(step) {
            const stepKey = `${trainingState.currentModule}_${step.id}`;
            if (!trainingState.completedSteps.has(stepKey)) {
                trainingState.completedSteps.add(stepKey);
                saveProgress();
                renderModulesList();
                updateOverallProgress();
                showMessage("✓ Step completed!", "success");
            }
        }

        function navigateStep(direction) {
            const module = modules[trainingState.currentModule - 1];
            if (!module) return;
            
            const newStep = trainingState.currentStep + direction;
            
            if (newStep >= 0 && newStep < module.steps.length) {
                trainingState.currentStep = newStep;
                saveProgress();
                renderModulesList();
                loadCurrentStep();
            } else if (direction === 1 && trainingState.currentModule < modules.length) {
                trainingState.currentModule++;
                trainingState.currentStep = 0;
                saveProgress();
                renderModulesList();
                loadCurrentStep();
            } else if (direction === -1 && trainingState.currentModule > 1) {
                trainingState.currentModule--;
                const prevModule = modules[trainingState.currentModule - 1];
                trainingState.currentStep = prevModule.steps.length - 1;
                saveProgress();
                renderModulesList();
                loadCurrentStep();
            }
        }

        function updateOverallProgress() {
            let totalSteps = 0;
            let completedSteps = 0;
            modules.forEach(module => {
                module.steps.forEach(step => {
                    totalSteps++;
                    if (trainingState.completedSteps.has(`${module.id}_${step.id}`)) completedSteps++;
                });
            });
            const percent = totalSteps > 0 ? (completedSteps / totalSteps) * 100 : 0;
            const overallFill = document.getElementById('overallFill');
            const overallPercent = document.getElementById('overallPercent');
            if (overallFill) overallFill.style.width = `${percent}%`;
            if (overallPercent) overallPercent.innerHTML = `${Math.round(percent)}%`;
            
            const certBadge = document.getElementById('certBadge');
            if (certBadge) {
                if (trainingState.certified || percent === 100) {
                    certBadge.innerHTML = '✓ Certified';
                    certBadge.className = 'cert-badge completed';
                } else if (percent > 0) {
                    certBadge.innerHTML = 'In Progress';
                    certBadge.className = 'cert-badge in-progress';
                } else {
                    certBadge.innerHTML = 'Training';
                    certBadge.className = 'cert-badge pending';
                }
            }
        }

        function showMessage(msg, type) {
            const contentArea = document.getElementById('contentArea');
            if (!contentArea) return;
            
            const msgDiv = document.createElement('div');
            msgDiv.className = `feedback ${type === 'success' ? 'feedback-success' : (type === 'error' ? 'feedback-error' : 'feedback-info')}`;
            msgDiv.innerHTML = msg;
            msgDiv.style.marginBottom = '16px';
            
            const existing = contentArea.querySelector('.feedback');
            if (existing) existing.remove();
            
            contentArea.insertBefore(msgDiv, contentArea.firstChild);
            setTimeout(() => msgDiv.remove(), 3000);
        }

        // Initialize
        loadProgress();
        
        // Clean up audio on page unload
        window.addEventListener('beforeunload', () => {
            if (currentSourceNode) {
                currentSourceNode.stop();
                currentSourceNode.disconnect();
            }
            if (currentAudioContext) {
                currentAudioContext.close();
            }
        });
    </script>
</body>
</html>
