                        const savedValue = userAnswers216[idx] || '';
                        container216.innerHTML += `
                            <div class="tier-cell tier-216" data-idx="${idx}" data-tier="216">
                                <span class="tier-time">${(idx * 0.216).toFixed(2)}s</span>
                                <input type="text" class="tier-input" data-idx="${idx}" data-tier="216" value="${(savedValue || '').replace(/"/g, '&quot;')}" maxlength="3" placeholder="___">
                            </div>
                        `;
                    }
                } else container216.innerHTML = '<div style="padding: 16px;">No cells</div>';
                
                if (numCells108 > 0) {
                    container108.innerHTML = '';
                    for (let idx = 0; idx < numCells108; idx++) {
                        const savedValue = userAnswers108[idx] || '';
                        container108.innerHTML += `
                            <div class="tier-cell tier-108" data-idx="${idx}" data-tier="108">
                                <span class="tier-time">${(idx * 0.108).toFixed(2)}s</span>
                                <input type="text" class="tier-input" data-idx="${idx}" data-tier="108" value="${(savedValue || '').replace(/"/g, '&quot;')}" maxlength="3" placeholder="___">
                            </div>
                        `;
                    }
                } else container108.innerHTML = '<div style="padding: 16px;">No cells</div>';
                
                if (numCells54 > 0) {
                    container54.innerHTML = '';
                    for (let idx = 0; idx < numCells54; idx++) {
                        const savedValue = userAnswers54[idx] || '';
                        container54.innerHTML += `
                            <div class="tier-cell tier-54" data-idx="${idx}" data-tier="54">
                                <span class="tier-time">${(idx * 0.054).toFixed(2)}s</span>
                                <input type="text" class="tier-input" data-idx="${idx}" data-tier="54" value="${(savedValue || '').replace(/"/g, '&quot;')}" maxlength="3" placeholder="___">
                            </div>
                        `;
                    }
                } else container54.innerHTML = '<div style="padding: 16px;">No cells</div>';
                
                attachInputHandlers();
                
            } catch (error) {
                console.error('Error loading language data:', error);
                container216.innerHTML = `<div style="padding: 16px; color: red;">Error loading ${language}</div>`;
                container108.innerHTML = `<div style="padding: 16px; color: red;">Make sure ${audioFilename} exists</div>`;
                container54.innerHTML = `<div style="padding: 16px;">Please add audio file for ${language}</div>`;
            } finally {
                if (loadingDiv) loadingDiv.style.display = 'none';
            }
        }
        
        function attachInputHandlers() {
            const inputs216 = document.querySelectorAll('#tier216Row .tier-input');
            const inputs108 = document.querySelectorAll('#tier108Row .tier-input');
            const inputs54 = document.querySelectorAll('#tier54Row .tier-input');
            const cellDivs216 = document.querySelectorAll('#tier216Row .tier-cell');
            const cellDivs108 = document.querySelectorAll('#tier108Row .tier-cell');
            const cellDivs54 = document.querySelectorAll('#tier54Row .tier-cell');
            
            if (sentenceInput) {
                const newSentenceInput = sentenceInput.cloneNode(true);
                sentenceInput.parentNode.replaceChild(newSentenceInput, sentenceInput);
                const finalSentenceInput = document.getElementById('sentenceInput');
                finalSentenceInput.addEventListener('focus', () => { setActiveInput(null); isActiveInputSentence = true; });
                finalSentenceInput.addEventListener('input', (e) => {
                    if (!trainingState.stepData[practiceKey]) trainingState.stepData[practiceKey] = {};
                    trainingState.stepData[practiceKey][`sentence_${currentLanguage}`] = e.target.value;
                    saveProgress();
                });
            }
            
            cellDivs216.forEach((div, idx) => {
                const newDiv = div.cloneNode(true);
                div.parentNode.replaceChild(newDiv, div);
                newDiv.addEventListener('click', async (e) => {
                    if (e.target.tagName === 'INPUT') return;
                    await playTrimmedAudio(currentAudioFile, idx * 0.216, 0.216, newDiv);
                });
            });
            
            cellDivs108.forEach((div, idx) => {
                const newDiv = div.cloneNode(true);
                div.parentNode.replaceChild(newDiv, div);
                newDiv.addEventListener('click', async (e) => {
                    if (e.target.tagName === 'INPUT') return;
                    await playTrimmedAudio(currentAudioFile, idx * 0.108, 0.108, newDiv);
                });
            });
            
            cellDivs54.forEach((div, idx) => {
                const newDiv = div.cloneNode(true);
                div.parentNode.replaceChild(newDiv, div);
                newDiv.addEventListener('click', async (e) => {
                    if (e.target.tagName === 'INPUT') return;
                    await playTrimmedAudio(currentAudioFile, idx * 0.054, 0.054, newDiv);
                });
            });
            
            function setupInputListeners(inputs, tier) {
                inputs.forEach((input, idx) => {
                    const newInput = input.cloneNode(true);
                    input.parentNode.replaceChild(newInput, input);
                    newInput.addEventListener('focus', () => setActiveInput(newInput));
                    newInput.addEventListener('click', (e) => { e.stopPropagation(); setActiveInput(newInput); });
                    newInput.addEventListener('input', (e) => {
                        let val = filterAkshars(e.target.value);
                        if (val !== e.target.value) e.target.value = val;
                        newInput.classList.remove('saved', 'incorrect');
                        
                        if (!trainingState.stepData[practiceKey]) trainingState.stepData[practiceKey] = {};
                        const answersKey = `answers${tier}_${currentLanguage}`;
                        if (!trainingState.stepData[practiceKey][answersKey]) trainingState.stepData[practiceKey][answersKey] = {};
                        trainingState.stepData[practiceKey][answersKey][idx] = val;
                        saveProgress();
                    });
                });
            }
            
            setupInputListeners(Array.from(inputs216), '216');
            setupInputListeners(Array.from(inputs108), '108');
            setupInputListeners(Array.from(inputs54), '54');
        }
        
        const languageButtons = document.querySelectorAll('.lang-select-btn');
        languageButtons.forEach(btn => {
            const newBtn = btn.cloneNode(true);
            btn.parentNode.replaceChild(newBtn, btn);
            
            const lang = newBtn.dataset.lang;
            if (lang === currentLanguage) newBtn.classList.add('active');
            
            newBtn.addEventListener('click', async () => {
                document.querySelectorAll('.lang-select-btn').forEach(b => b.classList.remove('active'));
                newBtn.classList.add('active');
                currentLanguage = lang;
                if (displayEl) displayEl.textContent = `Selected: ${lang.toUpperCase()}`;
                await loadLanguageData(lang);
            });
        });
        
        if (displayEl) displayEl.textContent = `Selected: ${currentLanguage.toUpperCase()}`;
        await loadLanguageData(currentLanguage);
    }

    // ==================== SIMPLE EXERCISE ====================
    
    function attachSimpleExerciseListeners(step) {
        const answerInput = document.getElementById('exerciseAnswer');
        const feedbackDiv = document.getElementById('exerciseFeedback');
        
        if (answerInput) {
            answerInput.addEventListener('focus', () => setActiveInput(answerInput));
            answerInput.addEventListener('click', (e) => { e.stopPropagation(); setActiveInput(answerInput); });
            answerInput.addEventListener('input', (e) => {
                let val = filterAkshars(e.target.value);
                if (val !== e.target.value) e.target.value = val;
            });
        }
        
        const checkBtn = document.getElementById('checkExerciseBtn');
        if (checkBtn && step.correct_answer) {
            checkBtn.onclick = () => {
                const userAnswer = answerInput ? answerInput.value.trim() : '';
                if (feedbackDiv) {
                    if (userAnswer === step.correct_answer) {
                        feedbackDiv.innerHTML = `<div class="feedback feedback-success">Correct! "${userAnswer}" is the right answer.</div>`;
                        feedbackDiv.style.display = 'block';
                        markStepComplete(step);
                    } else {
                        feedbackDiv.innerHTML = `<div class="feedback feedback-error">Incorrect. Expected "${step.correct_answer}", got "${userAnswer || 'empty'}".</div>`;
                        feedbackDiv.style.display = 'block';
                    }
                }
            };
        }
    }

    // ==================== GAME LISTENERS ====================
    
    function attachGameListeners(step) {
        const gameKey = `${trainingState.currentModule}_${step.id}`;
        const targetAkshars = step.items || ["अ", "क", "म", "स", "त"];
        
        let currentIndex = 0;
        let score = 0;
        let canSelect = true;
        let currentAudio = null;
        
        const savedState = trainingState.stepData[gameKey];
        if (savedState && !savedState.completed) {
            currentIndex = savedState.currentIndex || 0;
            score = savedState.score || 0;
        }
        
        const aksharCards = document.querySelectorAll('.game-card');
        const scoreElement = document.getElementById('gameScore');
        const progressFill = document.getElementById('gameProgressFill');
        const currentSoundLabel = document.getElementById('currentSoundLabel');
        const gameMessage = document.getElementById('gameMessage');
        const playBtn = document.getElementById('playGameSoundBtn');
        
        function updateUI() {
            if (scoreElement) scoreElement.innerHTML = `Score: ${score}/${targetAkshars.length}`;
            if (progressFill) progressFill.style.width = `${(currentIndex / targetAkshars.length) * 100}%`;
            if (currentSoundLabel) {
                currentSoundLabel.innerHTML = currentIndex < targetAkshars.length ? `Sound ${currentIndex + 1} of ${targetAkshars.length}` : 'Game Complete!';
            }
        }
        
        function saveGameState() {
            trainingState.stepData[gameKey] = { currentIndex, score, completed: currentIndex >= targetAkshars.length };
            saveProgress();
        }
        
        function playSound(akshar) {
            return new Promise((resolve, reject) => {
                const audioMap = {
                    'अ': '/mobile-training/audio/game_sounds/a.wav',
                    'क': '/mobile-training/audio/game_sounds/ka.wav',
                    'म': '/mobile-training/audio/game_sounds/ma.wav',
                    'स': '/mobile-training/audio/game_sounds/sa.wav',
                    'त': '/mobile-training/audio/game_sounds/ta.wav'
                };
                
                const audioFile = audioMap[akshar];
                if (!audioFile) { reject('No audio file'); return; }
                
                if (currentAudio) { currentAudio.pause(); currentAudio = null; }
                
                currentAudio = new Audio(audioFile);
                if (gameMessage) gameMessage.innerHTML = `<div class="feedback feedback-info">Playing sound for: ${akshar}</div>`;
                
                currentAudio.onended = () => {
                    if (gameMessage) gameMessage.innerHTML = `<div class="feedback feedback-info">Tap the akshar you heard!</div>`;
                    resolve();
                };
                
                currentAudio.onerror = () => { reject('Audio error'); };
                currentAudio.play().catch(reject);
            });
        }
        
        async function playCurrentSound() {
            if (currentIndex >= targetAkshars.length) return;
            
            canSelect = false;
            aksharCards.forEach(card => { card.style.pointerEvents = 'none'; card.classList.add('disabled'); });
            
            try {
                await playSound(targetAkshars[currentIndex]);
                aksharCards.forEach(card => { card.style.pointerEvents = 'auto'; card.classList.remove('disabled'); });
                canSelect = true;
            } catch (error) {
                aksharCards.forEach(card => { card.style.pointerEvents = 'auto'; card.classList.remove('disabled'); });
                canSelect = true;
            }
        }
        
        function handleAnswer(selectedAkshar, cardElement) {
            if (!canSelect) return;
            if (currentIndex >= targetAkshars.length) return;
            
            const correctAkshar = targetAkshars[currentIndex];
            const isCorrect = (selectedAkshar === correctAkshar);
            
            if (isCorrect) {
                cardElement.classList.add('correct');
                score++;
                if (gameMessage) gameMessage.innerHTML = `<div class="feedback feedback-success">Correct! ${selectedAkshar} is right! +1 point</div>`;
            } else {
                cardElement.classList.add('incorrect');
                if (gameMessage) gameMessage.innerHTML = `<div class="feedback feedback-error">Wrong! The correct sound was "${correctAkshar}".</div>`;
            }
            
            canSelect = false;
            updateUI();
            saveGameState();
            
            setTimeout(() => {
                cardElement.classList.remove('correct', 'incorrect');
                currentIndex++;
                updateUI();
                
                if (currentIndex < targetAkshars.length) {
                    saveGameState();
                    canSelect = true;
                    playCurrentSound();
                } else {
                    saveGameState();
                    if (gameMessage) {
                        gameMessage.innerHTML = score === targetAkshars.length 
                            ? `<div class="feedback feedback-success">🎉 Perfect! You've mastered all sounds!</div>`
                            : `<div class="feedback feedback-info">Game finished! Score: ${score}/${targetAkshars.length}.</div>`;
                    }
                    
                    aksharCards.forEach(card => { card.style.pointerEvents = 'none'; });
                    
                    if (score === targetAkshars.length) {
                        setTimeout(() => markStepComplete(step), 1500);
                    } else {
                        const retryBtn = document.createElement('button');
                        retryBtn.className = 'btn btn-primary';
                        retryBtn.innerHTML = 'Play Again';
                        retryBtn.style.marginTop = '14px';
                        retryBtn.style.width = '100%';
                        retryBtn.onclick = () => {
                            currentIndex = 0; score = 0; canSelect = true;
                            aksharCards.forEach(card => { card.classList.remove('correct', 'incorrect', 'disabled'); card.style.pointerEvents = 'auto'; });
                            updateUI();
                            saveGameState();
                            if (gameMessage) gameMessage.innerHTML = '';
                            setTimeout(() => playCurrentSound(), 500);
                        };
                        if (gameMessage) gameMessage.appendChild(retryBtn);
                    }
                }
                
                canSelect = true;
            }, 1500);
        }
        
        aksharCards.forEach(card => {
            card.onclick = () => handleAnswer(card.dataset.akshar, card);
        });
        
        if (playBtn) {
            playBtn.onclick = () => {
                if (currentIndex < targetAkshars.length) {
                    if (currentAudio) { currentAudio.pause(); currentAudio = null; }
                    playCurrentSound();
                }
            };
        }
        
        if (currentIndex === 0 && !trainingState.stepData[gameKey]?.completed) {
            setTimeout(() => playCurrentSound(), 500);
        }
    }

    // ==================== INTERACTIVE TOUR ====================
    
    function attachInteractiveListeners(step) {
        const tourKey = `${trainingState.currentModule}_${step.id}`;
        const tourItems = document.querySelectorAll('.tour-item');
        const tourFeedback = document.getElementById('tourFeedback');
        let completedCount = 0;
        const totalItems = tourItems.length;
        
        function updateTourProgress() {
            if (completedCount === totalItems) {
                tourFeedback.innerHTML = `<div class="feedback feedback-success">✓ Tour completed! You're ready to annotate!</div>`;
                tourFeedback.style.display = 'block';
                trainingState.tourCompleted[tourKey] = true;
                saveProgress();
                markStepComplete(step);
            }
        }
        
        tourItems.forEach(item => {
            const isCompleted = item.dataset.completed === 'true';
            if (isCompleted) { completedCount++; item.classList.add('completed'); }
            
            item.onclick = () => {
                if (item.dataset.completed === 'true') return;
                item.dataset.completed = 'true';
                item.classList.add('completed');
                item.querySelector('.tour-check').textContent = '✓';
                completedCount++;
                updateTourProgress();
                
                if (tourFeedback) {
                    tourFeedback.innerHTML = `<div class="feedback feedback-success">✓ Learned about ${item.querySelector('.tour-title')?.innerText || 'feature'}!</div>`;
                    tourFeedback.style.display = 'block';
                    setTimeout(() => tourFeedback.style.display = 'none', 1500);
                }
            };
        });
        
        updateTourProgress();
    }

    // ==================== NAVIGATION & PROGRESS ====================
    
    function markStepComplete(step) {
        const stepKey = `${trainingState.currentModule}_${step.id}`;
        if (!trainingState.completedSteps.has(stepKey)) {
            trainingState.completedSteps.add(stepKey);
            saveProgress();
            renderModulesList();
            updateOverallProgress();
            updateStepBar();
            showMessage("✓ Step completed!", "success");
        }
    }

    function navigateStep(direction) {
        const module = modules[trainingState.currentModule - 1];
        if (!module) return;
        
        const newStep = trainingState.currentStep + direction;
        
        if (newStep >= 0 && newStep < module.steps.length) {
            trainingState.currentStep = newStep;
            saveProgress();
            renderModulesList();
            loadCurrentStep();
            updateStepBar();
        } else if (direction === 1 && trainingState.currentModule < modules.length) {
            trainingState.currentModule++;
            trainingState.currentStep = 0;
            saveProgress();
            renderModulesList();
            loadCurrentStep();
            updateStepBar();
        } else if (direction === -1 && trainingState.currentModule > 1) {
            trainingState.currentModule--;
            trainingState.currentStep = 0;
            saveProgress();
            renderModulesList();
            loadCurrentStep();
            updateStepBar();
        }
    }

    function updateOverallProgress() {
        let totalSteps = 0, completedSteps = 0;
        modules.forEach(module => {
            module.steps.forEach(step => {
                totalSteps++;
                if (trainingState.completedSteps.has(`${module.id}_${step.id}`)) completedSteps++;
            });
        });
        const percent = totalSteps > 0 ? (completedSteps / totalSteps) * 100 : 0;
        
        const overallFill = document.getElementById('overallFill');
        if (overallFill) overallFill.style.width = `${percent}%`;
        
        const drawerFill = document.getElementById('drawerFill');
        if (drawerFill) drawerFill.style.width = `${percent}%`;
        
        const drawerPercent = document.getElementById('drawerPercent');
        if (drawerPercent) drawerPercent.textContent = `${Math.round(percent)}%`;
        
        const certBadge = document.getElementById('certBadge');
        if (certBadge) {
            if (trainingState.certified || percent === 100) {
                certBadge.innerHTML = '✓ Certified';
                certBadge.className = 'cert-badge completed';
            } else if (percent > 0) {
                certBadge.innerHTML = 'In Progress';
                certBadge.className = 'cert-badge in-progress';
            } else {
                certBadge.innerHTML = 'Training';
                certBadge.className = 'cert-badge pending';
            }
        }
    }

    function showMessage(msg, type) {
        const contentArea = document.getElementById('contentArea');
        if (!contentArea) return;
        
        const msgDiv = document.createElement('div');
        msgDiv.className = `feedback ${type === 'success' ? 'feedback-success' : (type === 'error' ? 'feedback-error' : 'feedback-info')}`;
        msgDiv.innerHTML = msg;
        msgDiv.style.margin = '0 0 10px';
        
        const existing = contentArea.querySelector('.feedback');
        if (existing) existing.remove();
        
        contentArea.insertBefore(msgDiv, contentArea.firstChild);
        setTimeout(() => msgDiv.remove(), 3000);
    }

    // ==================== INITIALIZE ====================
    
    loadProgress();
    
    window.addEventListener('beforeunload', () => {
        if (currentSourceNode) { currentSourceNode.stop(); currentSourceNode.disconnect(); }
        if (currentAudioContext) currentAudioContext.close();
    });
</script>
